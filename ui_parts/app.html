    </div>}
    {expanded&&<div className="task-card-log">
      {(task.log||[]).length===0?<div className="task-card-log-line" style={{color:'#888'}}>â€” waiting for activity â€”</div>:
        (task.log||[]).slice(-30).map((line,i)=><div key={i} className="task-card-log-line">â†’ {line}</div>)}
    </div>}
  </div>);
}
function TaskTray({tasks,onCancel,onView}){
  const[expanded,setExpanded]=useState({});
  const[collapsed,setCollapsed]=useState(false);
  const sorted=[...tasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const running=sorted.filter(t=>(t.status||'running')==='running').length;
  const total=sorted.length;
  if(total===0)return null;
  if(collapsed){
    return(<div className="task-tray-pill" onClick={()=>setCollapsed(false)}>
      {running>0?<><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginRight:6,verticalAlign:'middle',boxShadow:'0 0 5px rgba(245,158,11,0.7)'}}/>{running} task{running===1?'':'s'} running</>:total+' task'+(total===1?'':'s')}
    </div>);
  }
  return(<div className="task-tray">
    <div className="task-tray-header">
      <span>{running>0?`${running}/${total} TASKS Â· LIVE`:`${total} TASKS`}</span>
      <button className="task-card-btn" style={{padding:'1px 6px'}} onClick={()=>setCollapsed(true)} title="Collapse">_</button>
    </div>

}

        )}

        {step===1&&(
          <div style={{maxHeight:340,overflowY:'auto',paddingRight:4,display:'flex',flexDirection:'column',gap:8}}>
            {(distros.length?distros:[{name:'default',description:'Standard Agent Friday â€” balanced for general use'}]).map(d=>{
              const sel=(data.distribution||'default')===d.name;
              return(
                <div key={d.name} onClick={()=>onChange({distribution:d.name})}
                  style={{padding:'14px 18px',borderRadius:8,border:'1px solid '+(sel?'rgba(0,212,255,0.55)':'rgba(255,255,255,0.08)'),background:sel?'rgba(0,212,255,0.07)':'rgba(255,255,255,0.02)',cursor:'pointer',transition:'all .15s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{fontFamily:'Orbitron',fontSize:13,color:sel?'#00d4ff':'#ddd',textTransform:'capitalize'}}>{d.name}</div>

        {step===2&&(
          <div style={{maxHeight:360,overflowY:'auto',paddingRight:4,display:'flex',flexDirection:'column',gap:10}}>
            {(provList.length?provList:[{name:'anthropic',label:'Anthropic (Claude)',type:'anthropic',available:false}]).map(p=>{
              const local=p.type==='ollama';

                <div key={p.name} style={{padding:'12px 14px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>

              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:5,lineHeight:1.5}}>Connect one or more Google accounts so Friday can read mail, manage your calendar and reach your files. Secure OAuth â€” tokens are encrypted at rest.</div>
              <div style={{fontSize:10,color:'rgba(0,212,255,0.55)',marginTop:8,fontFamily:'JetBrains Mono'}}>Set up in Settings â†’ Connected Services after launch.</div>
            </div>
            <div style={{padding:'14px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
              <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ddd'}}>MCP Connectors</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:5,lineHeight:1.5}}>Slack, Notion, GitHub and hundreds more connect over MCP â€” one click each, governed by Friday's security rings.</div>
              <div style={{fontSize:10,color:'rgba(0,212,255,0.55)',marginTop:8,fontFamily:'JetBrains Mono'}}>Manage in Settings â†’ Connected Services.</div>
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',fontFamily:'JetBrains Mono'}}>This step is optional â€” Continue to skip for now.</div>
          </div>
        )}

        {step===4&&(
          <div>
            {!hw&&<div style={{fontSize:12,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono'}}>Detecting hardwareâ€¦</div>}
            {hw&&(
              <div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
                  <div style={{padding:'12px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono'}}>GPU</div>
                    <div style={{fontSize:12,color:hw.gpu?'#34d399':'rgba(255,255,255,0.5)',marginTop:4}}>{hw.gpu||'None detected'}</div>
                  </div>

                    <div style={{fontSize:12,color:'#ddd',marginTop:4}}>{hw.ram_gb?hw.ram_gb+' GB RAM':'â€”'}{hw.vram_gb?' Â· '+hw.vram_gb+' GB VRAM':''}</div>
                  </div>

                {(hw.suggested_models&&hw.suggested_models.length)?(
                  <div>
                    <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:'JetBrains Mono',marginBottom:8}}>SUGGESTED LOCAL MODELS</div>

                )}

        )}

        {step===5&&(
          <div style={{textAlign:'center',padding:'14px 0'}}>
            <div style={{fontSize:64,marginBottom:18,filter:'drop-shadow(0 0 20px rgba(0,212,255,0.4))'}}>âš¡</div>
            <div style={{fontFamily:'Orbitron',fontSize:20,color:'#00d4ff',marginBottom:12,letterSpacing:'0.06em'}}>{data.agent_name||'AGENT FRIDAY'}</div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:40}}>

                onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,0.12)'}>

function useSettings(){
  const[s,setS]=useState({});
  const[msg,setMsg]=useState('');
  const load=()=>{apiFetch('/api/settings').then(r=>r.json()).then(d=>{if(d&&d.status!=='error')setS(d)}).catch(()=>{})};
  useEffect(load,[]);
  const save=async(patch)=>{
    try{
      const r=await apiFetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
      const d=await r.json();
      if(d.status==='ok'){setS(prev=>({...prev,...patch}));setMsg('Saved ✓');setTimeout(()=>setMsg(''),2000);}
      else{setMsg('Error');setTimeout(()=>setMsg(''),2000);}
    }catch(e){setMsg('Error');setTimeout(()=>setMsg(''),2000);}
  };
  return{s,save,msg,reload:load};
}

function GoogleAccountsPanel(){
  const[accounts,setAccounts]=useState([]);
  const[msg,setMsg]=useState('');
  const[label,setLabel]=useState('');
  const[loading,setLoading]=useState(false);
  const refresh=()=>apiFetch('/api/google/accounts').then(r=>r.json()).then(d=>{if(d.status==='ok')setAccounts(d.accounts||[])}).catch(()=>{});
  useEffect(refresh,[]);
  const addAccount=async()=>{
    setLoading(true);
    try{
      const r=await apiFetch('/api/google/accounts/connect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({label})});
      const d=await r.json();
      if(d.status==='ok'&&d.auth_url){window.open(d.auth_url,'_blank','width=600,height=700');setMsg('Complete the OAuth flow in the popup, then click ↻.');setLabel('');}
      else setMsg(d.message||'Failed to start OAuth.');
    }catch(e){setMsg('Error: '+e.message);}
    setLoading(false);
  };
  const removeAccount=async(id,email)=>{
    if(!window.confirm('Remove '+email+'? This revokes access.'))return;
    try{await apiFetch('/api/google/accounts/'+id+'/remove',{method:'POST'});setAccounts(a=>a.filter(x=>x.id!==id));setMsg('Removed.');}
    catch(e){setMsg('Error.');}
  };
  const toggleSvc=async(id,svc,current)=>{
    const acc=accounts.find(a=>a.id===id);if(!acc)return;
    const services={...(acc.services||{}),[svc]:!current};
    try{await apiFetch('/api/google/accounts/'+id+'/services',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({services})});setAccounts(a=>a.map(x=>x.id===id?{...x,services}:x));}
    catch(e){}
  };
  return <div>
    {accounts.length===0&&<div style={{color:'rgba(255,255,255,0.38)',fontSize:12,marginBottom:12}}>No Google accounts connected yet.</div>}
    {accounts.map(acc=>(
      <div key={acc.id} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:8,padding:14,marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div style={{width:32,height:32,borderRadius:16,background:acc.color||'#00d4ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#000',flexShrink:0}}>{(acc.email||acc.label||'G').charAt(0).toUpperCase()}</div>
            <div>
              <div style={{color:'#fff',fontSize:13,fontWeight:600}}>{acc.email||acc.label||'Unknown'}</div>
              <div style={{color:'rgba(255,255,255,0.4)',fontSize:11}}>{acc.label||''}{acc.last_sync?' · synced '+new Date(acc.last_sync).toLocaleTimeString():''}</div>
            </div>
          </div>
          <button className="settings-btn" style={{fontSize:11,color:'#ff6060'}} onClick={()=>removeAccount(acc.id,acc.email||acc.label||'account')}>Remove</button>
        </div>
        <div style={{display:'flex',gap:6,marginTop:10}}>
          {['gmail','calendar','drive'].map(svc=>{const on=acc.services?.[svc]!==false;return(
            <button key={svc} className={`settings-btn ${on?'active':''}`} style={{fontSize:11,padding:'3px 10px'}} onClick={()=>toggleSvc(acc.id,svc,on)}>
              {svc==='gmail'?'✉️ Gmail':svc==='calendar'?'📅 Cal':'📁 Drive'}
            </button>
          );})}
        </div>
      </div>
    ))}
    <div style={{display:'flex',gap:8,marginTop:8,alignItems:'center'}}>
      <input className="input" style={{flex:1,fontSize:12}} value={label} onChange={e=>setLabel(e.target.value)} placeholder="Label (e.g. Personal, Work)"/>
      <button className="settings-btn" style={{padding:'6px 14px',color:'#00d4ff',fontSize:12,whiteSpace:'nowrap'}} onClick={addAccount} disabled={loading}>{loading?'…':'+ Add Account'}</button>
      <button className="settings-btn" style={{padding:'6px 10px'}} onClick={refresh} title="Refresh">↻</button>
    </div>
    {msg&&<div style={{fontSize:11,color:'#00d4ff',marginTop:8}}>{msg}</div>}
  </div>;
}

            </div>

            {isExpanded&&tgt&&!isCreationNotif&&<div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}>
              <button className="notif-open-btn" onClick={e=>{e.stopPropagation();openTarget()}}>{notifTargetLabel(tgt)} {tgt.url&&!tgt.workspace?'â†—':'â†’'}</button>

      </div>
      {qdLoading&&!qdResult&&<div style={{fontSize:11,color:'#a8a8b4',fontStyle:'italic',marginBottom:6}}>â³ Running in background â€” progress visible in the bell menu</div>}
      {qdResult&&<div style={{maxHeight:220,overflowY:'auto',background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,212,255,0.1)',borderRadius:8,padding:'14px 16px'}}>
        {qdResult.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{fontFamily:'Inter',fontSize:i===0?13:12,lineHeight:1.75,color:i===0?'#e8e8f0':'#ccc',marginBottom:10,whiteSpace:'pre-wrap'}}>{p}</p>)}
      </div>}
    </div>}

    {/* Dock â€” grouped (Life / Work / System) */}
    <div className={`dock ${dockHidden?'hidden':''}`}>
      {DOCK_GROUPS.map((g,gi)=>(<React.Fragment key={g.name}>
        {gi>0&&<div className="dock-sep"/>}
        <div className="dock-group">
          <div className="dock-group-btns">
            {g.items.filter(w=>showAllWorkspaces||w.core).map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''} ${(suggestedWs.has(w.id)&&!openWins.has(w.id))?'suggested':''}`} onClick={()=>toggle(w.id)} title={(suggestedWs.has(w.id)&&!openWins.has(w.id))?'Suggested â€” Friday predicts youâ€™ll want this':undefined} style={{position:'relative'}}>
              <span className="ico"><img src={`assets/icons/${w.id}.svg`} alt={w.label} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='inline'}}/><span style={{display:'none'}}>{w.ico}</span></span><span>{w.label}</span><span className="dot"/>
              {w.id==='wiki'&&wikiPending>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#f59e0b',color:'#0a0a0f',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(245,158,11,0.7)'}}>{wikiPending}</span>}
              {w.id==='messages'&&msgActionable>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#00d4ff',color:'#031018',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(0,212,255,0.7)'}}>{msgActionable}</span>}
            </button>)}
          </div>
          <div className="dock-group-label">{g.name}</div>
        </div>
      </React.Fragment>))}
    </div>
    {paletteOpen&&<CommandPalette onClose={()=>setPaletteOpen(false)} onOpenWs={id=>{toggle(id);setPaletteOpen(false)}} openWins={openWins}/>}

    {/* Background tasks now live in the bell-icon dropdown above */}

    {/* Task Result Modal */}
    {taskResultModal&&<div onClick={()=>setTaskResultModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(720px, 90vw)',maxHeight:'85vh',overflowY:'auto',background:'rgba(10,10,18,0.96)',border:'1px solid rgba(0,212,255,0.25)',borderRadius:12,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.8)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00d4ff',letterSpacing:'.08em'}}>TASK RESULT Â· {(taskResultModal.status||'').toUpperCase()}</div>
            <div style={{fontSize:14,color:'#fff',marginTop:3}}>{taskResultModal.name}</div>
          </div>
          <button className="btn" onClick={()=>setTaskResultModal(null)}>Close</button>
        </div>
        {taskResultModal.description&&<div style={{fontSize:11,color:'#888',marginBottom:10,fontStyle:'italic'}}>{taskResultModal.description}</div>}
        {taskResultModal.result
          ?<FridayDoc compact text={taskResultModal.result} style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)'}}/>
          :<div style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)',color:'#888',fontSize:12,fontStyle:'italic'}}>This process didn't return a written result â€” see the activity log below for what it did.</div>}
        {(taskResultModal.log||[]).length>0&&<div style={{marginTop:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',letterSpacing:'.08em',marginBottom:6}}>ACTIVITY LOG</div>
          <div style={{background:'rgba(0,0,0,0.4)',padding:8,borderRadius:6,maxHeight:180,overflowY:'auto'}}>
            {(taskResultModal.log||[]).map((l,i)=><div key={i} style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(200,200,220,0.7)',padding:'1px 0'}}>â†’ {l}</div>)}
          </div>
        </div>}
      </div>
    </div>}
  </WsCustomCtx.Provider>);
}

// Mount with error surface so mobile failures are visible instead of a blank dock.
(function mountFriday(){
  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
