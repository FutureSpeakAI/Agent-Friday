  if(tok)headers['X-Friday-Token']=tok;
  return fetch(url,Object.assign({},opts,{headers}));
}

// â•â•â• CONNECTOR HEALTH BUS â•â•â•
// One app-wide poll of /api/connectors/health â†’ a workspace-id â†’ status map, so
// any workspace window can show whether its data source is live without each
// mounting its own fetch. {wsId: 'connected'|'error'|'connecting'|'off'}.
window.__fridayConnByWs=window.__fridayConnByWs||{};
const _connSubs=new Set();
function useConnByWs(){
  const[map,setMap]=useState(window.__fridayConnByWs);
  useEffect(()=>{const fn=m=>setMap({...m});_connSubs.add(fn);return()=>_connSubs.delete(fn)},[]);
  return map;
}
(function pollConnHealth(){
  const tick=()=>{fetch('/api/connectors/health').then(r=>r.json()).then(d=>{
    const conns=(d&&d.health&&d.health.connectors)||[];const byWs={};
    conns.forEach(c=>{(c.workspaces||[]).forEach(w=>{
      const cur=byWs[w],s=c.status;
      // Precedence: connected > connecting > error > off, so a live source wins.
      const rank={connected:3,connecting:2,error:1};
      if(!cur||(rank[s]||0)>(rank[cur]||0))byWs[w]=s;
    })});
    window.__fridayConnByWs=byWs;_connSubs.forEach(fn=>{try{fn(byWs)}catch(_){}});
  }).catch(()=>{})};
  tick();setInterval(tick,20000);
})();

// â•â•â• DEEP-LINK NAVIGATION BUS â•â•â•
// Notifications (and any other clickable surface) carry a `target` describing
// where to go: {workspace, tab, lane, thread_id, event_id, date, url, ...}.
// fridayNavigate(target) stashes it on window and fires a `friday-nav` event.
// Workspaces that support deep-linking subscribe via useNavTarget(); a freshly
// opened workspace â€” mounted by the very click that fired the event â€” picks up
// the stashed target on its first render, so the "open window then apply target"
// race is handled either way (already-open â†’ event; just-opened â†’ stash).
function fridayNavigate(target){
  if(!target||!target.workspace)return;
  window.__fridayNavTarget=target;
  try{window.dispatchEvent(new CustomEvent('friday-nav',{detail:target}))}catch(_){}
}
function useNavTarget(workspace,handler){
  const handlerRef=useRef(handler);handlerRef.current=handler;
  useEffect(()=>{
    const apply=(t)=>{
      if(!t||t.workspace!==workspace)return;
      handlerRef.current(t);
      if(window.__fridayNavTarget&&window.__fridayNavTarget.workspace===workspace)window.__fridayNavTarget=null;
    };
    apply(window.__fridayNavTarget); // pending target from the click that opened us
    const onNav=(e)=>apply(e.detail||{});
    window.addEventListener('friday-nav',onNav);
    return()=>window.removeEventListener('friday-nav',onNav);
  },[workspace]);
}
// â•â•â• ACTION BUS â•â•â•
// The chat backend can return structured actions alongside its text reply:
//   {actions:[{type:'navigate', workspace:'studio'}, {type:'open_path', path:'â€¦'}]}
// This is what makes Friday an agent, not a chatbot â€” "open Studio" actually
// switches the UI, "open my Downloads" actually reveals the folder. Each action
// is dispatched here. Unknown action types are ignored so the backend can add
// new ones without breaking older clients.
function fridayRunActions(actions){
  if(!Array.isArray(actions)||!actions.length)return;
  try{console.info('[friday] running '+actions.length+' action(s):',actions);}catch(_){}
  for(const a of actions){
    if(!a||typeof a!=='object')continue;
    try{
      if(a.type==='navigate'&&a.workspace){
        // openWs (mount the window) + deep-link in one call. If the global opener
        // isn't mounted yet (very early in app boot), retry on the next frame
        // instead of falling back to fridayNavigate, which only deep-links an
        // ALREADY-open workspace and would silently no-op for a closed one.
        const go=()=>{
          if(window.fridayOpenWorkspace)window.fridayOpenWorkspace({...a,workspace:a.workspace});
          else{fridayNavigate({...a,workspace:a.workspace});setTimeout(()=>{if(window.fridayOpenWorkspace)window.fridayOpenWorkspace({...a,workspace:a.workspace});},120);}
        };
        go();
      }else if(a.type==='open_path'&&(a.path||a.target)){
        fetch('/api/computer/open',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({path:a.path||a.target})}).catch(()=>{});
      }else if(a.type==='open_url'&&a.url){
        try{window.open(a.url,'_blank','noopener');}catch(_){}
      }else if(a.type==='open_last_source'){
        // News Anchor fallback: "open that story" â†’ open the most recent source
        // chip the voice session surfaced (text-fragment URL highlights the passage).
        const u=window._fridayLastVoiceSource;
        if(u){try{window.open(u,'_blank','noopener');}catch(_){}}
      }
    }catch(err){try{console.warn('[friday] action failed',a,err);}catch(_){}}
  }
}
// Human label for an "Open â€¦" button given a target descriptor.
function notifTargetLabel(t){
  if(!t)return'Open';
  if(t.url&&!t.workspace)return'Open link';
  const w=WS.find(x=>x.id===t.workspace);

}

// â•â•â• FRIDAY-DOC â€” branded markdown renderer â•â•â•
// Single source of truth for rendering any markdown/plain-text content inside
// Friday's UI. Prefers marked.js (loaded via CDN in head.html) and falls back
// to a tiny regex parser if marked isn't ready yet. Output is always wrapped
// in .friday-doc so the holographic CSS in head.html takes over.
function fridayEscapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fridayFallbackMd(md){
  const lines=String(md||'').replace(/\r\n/g,'\n').split('\n');
  let html='',inCode=false,codeBuf=[],inList=null,listBuf=[];
  const flushList=()=>{if(inList){html+='<'+inList+'>'+listBuf.join('')+'</'+inList+'>';listBuf=[];inList=null}};
  const inline=(t)=>fridayEscapeHtml(t)
    .replace(/`([^`]+)`/g,(_,c)=>'<code>'+c+'</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  for(const raw of lines){
    if(/^```/.test(raw)){if(inCode){html+='<pre><code>'+fridayEscapeHtml(codeBuf.join('\n'))+'</code></pre>';codeBuf=[];inCode=false}else{flushList();inCode=true}continue;}
    if(inCode){codeBuf.push(raw);continue;}
    const h=raw.match(/^(#{1,6})\s+(.*)$/);
    if(h){flushList();html+='<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>';continue;}
    if(/^\s*[-*]\s+/.test(raw)){if(inList!=='ul'){flushList();inList='ul'}listBuf.push('<li>'+inline(raw.replace(/^\s*[-*]\s+/,''))+'</li>');continue;}
    if(/^\s*\d+\.\s+/.test(raw)){if(inList!=='ol'){flushList();inList='ol'}listBuf.push('<li>'+inline(raw.replace(/^\s*\d+\.\s+/,''))+'</li>');continue;}
    if(/^>\s?/.test(raw)){flushList();html+='<blockquote>'+inline(raw.replace(/^>\s?/,''))+'</blockquote>';continue;}
    if(/^\s*---+\s*$/.test(raw)){flushList();html+='<hr/>';continue;}
    if(raw.trim()===''){flushList();continue;}
    flushList();html+='<p>'+inline(raw)+'</p>';
  }
  flushList();
  if(inCode)html+='<pre><code>'+fridayEscapeHtml(codeBuf.join('\n'))+'</code></pre>';
  return html;
}
// Source Production System â€” turn inline citation tokens into clickable chips.
// Friday emits [wiki:page], [news:outlet/date/title], [memory:date/"quote"],
// [conversation:date/"quote"], and [web:https://url#:~:text=...]. We rewrite
// these to styled HTML *before* the markdown parser runs, so (a) gfm autolink
// won't mangle the raw URL inside a [web:...] token, and (b) the chips survive
// as inline HTML. Web citations become real links that open in a new tab (the
// #:~:text= fragment highlights the cited passage on the page); the rest render
// as labelled chips with the full source string in the tooltip.
function fridayCitationize(src){
  if(!src||src.indexOf('[')<0)return src;
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const base='display:inline-block;font-size:0.82em;line-height:1.45;padding:0 5px;margin:0 1px;border-radius:4px;font-family:JetBrains Mono,monospace;vertical-align:baseline;white-space:nowrap;';
  const chip=(bg,bd,fg,label,title)=>'<span class="friday-cite" title="'+esc(title)+'" style="'+base+'background:'+bg+';border:1px solid '+bd+';color:'+fg+';cursor:help;">'+esc(label)+'</span>';
  let out=src;
  out=out.replace(/\[web:(https?:\/\/[^\]\s]+)\]/g,(_,url)=>{
    let host='link';try{host=url.replace(/^https?:\/\//,'').split('/')[0]}catch(e){}
    return '<a href="'+esc(url)+'" target="_blank" rel="noopener" class="friday-cite" title="'+esc(url)+'" style="'+base+'background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.4);color:#00d4ff;text-decoration:none;">ðŸ”— '+esc(host)+'</a>';
  });
  out=out.replace(/\[wiki:([^\]]+)\]/g,(_,p)=>chip('rgba(124,58,237,0.14)','rgba(124,58,237,0.45)','#b794f6','ðŸ“„ '+p.trim(),'Wiki Â· '+p.trim()));
  out=out.replace(/\[news:([^\]]+)\]/g,(_,p)=>{const outlet=p.split('/')[0].trim();return chip('rgba(245,158,11,0.14)','rgba(245,158,11,0.45)','#fbbf24','ðŸ“° '+outlet,'News Â· '+p.trim())});
  out=out.replace(/\[(?:memory|conversation):([^\]]+)\]/g,(_,p)=>{const when=p.split('/')[0].trim();return chip('rgba(52,211,153,0.14)','rgba(52,211,153,0.45)','#34d399','ðŸ’¬ '+when,'From a past conversation Â· '+p.trim())});
  return out;
}
if(typeof window!=='undefined'){window.fridayCitationize=fridayCitationize;}
function renderFridayMarkdown(mdText,opts){
  const compact=!!(opts&&opts.compact);
  const src=mdText==null?'':String(mdText);
  if(!src.trim())return'<div class="friday-doc'+(compact?' compact':'')+'"></div>';
  if(/^\s*<(?:!DOCTYPE|html|head|body)\b/i.test(src))return src;
  const psrc=fridayCitationize(src);
  let body;
  try{
    if(typeof marked!=='undefined'&&marked&&typeof marked.parse==='function'){
      body=marked.parse(psrc,{breaks:true,gfm:true});
    }else{
      body=fridayFallbackMd(psrc);
    }
  }catch(e){body=fridayFallbackMd(psrc);}
  body=body.replace(/<a\s+(?![^>]*\btarget=)([^>]*)>/gi,'<a target="_blank" rel="noopener" $1>');
  return'<div class="friday-doc'+(compact?' compact':'')+'">'+body+'</div>';
}
if(typeof window!=='undefined'){window.renderFridayMarkdown=renderFridayMarkdown;}

// â•â•â• VOICE TRANSCRIPT SANITIZER â•â•â•
// Live voice replies sometimes carry the personality engine's internal
// scaffolding alongside the spoken words: affective stage directions
// (*chuckles*, (softly)), mood/affect annotations ([mood: playful], Tone: warm),
// and reasoning / system markers (<thinking>â€¦</thinking>, [internal: â€¦]). Those
// steer HOW Friday speaks â€” they must never appear in the chat transcript. Strip
// them here, leaving only the words Friday actually said. Conservative on purpose:
// only bracketed/parenthetical fragments that read as cues are removed, so real
// content like "(see your calendar)" survives.
function sanitizeVoiceTranscript(raw){
  if(raw==null)return'';
  let t=String(raw);
  const KIND='thinking|thought|reasoning|internal|mood|emotion|emotional|affect|tone|voice|persona|personality|system|meta|stage';
  // 1. Reasoning / personality XML-ish blocks â€” drop tag AND contents.
  t=t.replace(new RegExp('<('+KIND+')\\b[^>]*>[\\s\\S]*?<\\/\\1>','gi'),' ');
  // 2. Orphan tags of the same kind (streamed / unclosed).
  t=t.replace(new RegExp('<\\/?(?:'+KIND+')\\b[^>]*>','gi'),' ');
  // 3. Asterisk stage directions: *chuckles*, *pauses warmly*.
  t=t.replace(/\*[^*\n]{0,60}\*/g,' ');
  // 4. Bracketed annotations that read as cues (not content).
  const CUE=/\b(mood|tone|affect|emotion|emotional|feeling|internal|reasoning|thinking|system|persona|personality|voice|note|stage|aside|whisper|softly|warmly|gently|laugh|chuckle|sigh|pause|beat|smil|grin|wink|excited|playful|warm|calm|cheer|sarcas|dramatic|breath|nervous|teasing)\b/i;
  t=t.replace(/\[[^\]\n]{0,80}\]/g,(m)=>CUE.test(m)?' ':m);
  // 5. Parenthetical stage directions â€” short verb/adverb cues only.
  const PCUE=/\b(mood|tone|affect|emotion|laugh|laughs|laughing|chuckle|chuckles|chuckling|sigh|sighs|pause|pauses|beat|smil|smiles|smiling|grin|grins|wink|winks|softly|warmly|gently|quietly|cheerfully|playfully|excitedly|teasingly|whisper|whispers|breath|breathes|exhal|inhal|nervously)\b/i;
  t=t.replace(/\([^()\n]{0,40}\)/g,(m)=>PCUE.test(m)?' ':m);
  // 6. Leading "label:" cue lines (Mood:/Tone:/Affect:/Internal:/Reasoning:â€¦).
  t=t.replace(/^[ \t]*(?:mood|tone|affect|emotion|emotional|feeling|internal|reasoning|thinking|persona|personality|voice|system|note|stage direction)[ \t]*[:\-â€“][ \t]*.*$/gim,' ');
  // 7. Collapse whitespace the removals left behind.
  t=t.replace(/[ \t]{2,}/g,' ').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/^\s+|\s+$/g,'');
  return t;
}
if(typeof window!=='undefined'){window.sanitizeVoiceTranscript=sanitizeVoiceTranscript;}

function FridayDoc({text,compact,style,className}){
  const html=renderFridayMarkdown(text||'',{compact:!!compact});
  return <div className={className} style={style} dangerouslySetInnerHTML={{__html:html}}/>;
}

// Live "data source" indicator shown in a workspace title bar when a connector
// powers it. Green = a source is live; amber = connecting; red = configured but
// failing. Nothing renders when no connector feeds this workspace.
function ConnectorDot({wsId}){
  const map=useConnByWs();
  const s=map[wsId];
  if(!s||s==='off')return null;
  const col=s==='connected'?'#00ff80':s==='connecting'?'#f59e0b':'#ff5470';
  const tip=s==='connected'?'Live data source connected':s==='connecting'?'Connecting data sourceâ€¦':'Data source error â€” check Settings â†’ Connectors';
  return <span title={tip} style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,boxShadow:`0 0 6px ${col}`,marginLeft:7,verticalAlign:'middle'}}/>;
}

function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){
  // Size & position persist per workspace and are clamped to the viewport so a
  // window can never be dragged or resized off-screen.
  const LSK='friday_fwin_'+id;
  const vw=()=>window.innerWidth||document.documentElement.clientWidth||1280;
  const vh=()=>window.innerHeight||document.documentElement.clientHeight||800;
  const clampW=w=>Math.max(400,Math.min(w,vw()-20));
  const clampH=h=>Math.max(280,Math.min(h,vh()-50));
  const clampX=x=>Math.max(0,Math.min(x,vw()-120));
  const clampY=y=>Math.max(30,Math.min(y,vh()-60));
  const saved=(()=>{try{return JSON.parse(localStorage.getItem(LSK))}catch(_){return null}})();
  const[pos,setPos]=useState(saved&&saved.x!=null?{x:clampX(saved.x),y:clampY(saved.y)}:{x:60+Math.random()*300,y:40+Math.random()*80});
  const[size,setSize]=useState(saved&&saved.w!=null?{w:clampW(saved.w),h:clampH(saved.h)}:{w:660,h:460});
  const[dragging,setDragging]=useState(false);const[resizing,setResizing]=useState(false);
  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});

  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:clampW(rStart.current.w+e.clientX-rStart.current.x),h:clampH(rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  // Persist geometry whenever it settles.
  useEffect(()=>{try{localStorage.setItem(LSK,JSON.stringify({x:pos.x,y:pos.y,w:size.w,h:size.h}))}catch(_){}},[pos.x,pos.y,size.w,size.h]);
  // â”€â”€ Live customization Friday applied to THIS workspace via the ðŸ’¬ chat â”€â”€
  const {map:wsCustMap}=useContext(WsCustomCtx);
  const cust=wsCustMap[id]||{};
  const customized=cust&&Object.keys(cust).length>0;
  const scope=`.ws-custom-root[data-ws="${id}"]`;
  let custCss='';
  if(cust.css)custCss+=cust.css.split('.ws-custom-root').join(scope)+'\n';
  if(cust.hidden&&cust.hidden.length)custCss+=cust.hidden.map(s=>`${scope} ${s}`).join(',')+'{display:none!important}\n';
  if(cust.density==='compact')custCss+=`${scope} .card{padding:7px 9px!important;margin-bottom:4px!important}${scope}{font-size:12px}\n`;
  if(cust.accent)custCss+=`${scope}{--ws-accent:${cust.accent}}${scope} .card-title{color:${cust.accent}}${scope}>.ws-accent-bar{background:${cust.accent}}\n`;
  const openWsChat=(seed)=>window.fridayOpenWorkspaceChat&&window.fridayOpenWorkspaceChat(id,title,emoji,seed);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>
      <span className="fwin-title">{emoji} {title}<ConnectorDot wsId={id}/>{customized&&<span title="Friday has customized this workspace â€” open ðŸ’¬ to tweak or revert" style={{marginLeft:6,fontSize:10,opacity:.85}}>ðŸ› ï¸</span>}</span><div className="fwin-btns"><button title={`Chat with Friday about ${title} â€” tweak the layout, add features, undo changes`} aria-label={`Workspace chat for ${title}`} onClick={e=>{e.stopPropagation();openWsChat()}} style={{fontSize:12}}>ðŸ’¬</button><button title={`Talk to Friday about ${title}`} aria-label={`Start voice for ${title}`} onClick={e=>{e.stopPropagation();window.fridayStartWorkspaceVoice&&window.fridayStartWorkspaceVoice(id)}} style={{fontSize:12}}>ðŸŽ¤</button><button onClick={onClose}>Ã—</button></div>
    </div><div className="fwin-body"><div className="ws-custom-root" data-ws={id} style={{position:'relative'}}>
      {custCss&&<style dangerouslySetInnerHTML={{__html:custCss}}/>}
      {cust.accent&&<div className="ws-accent-bar" style={{position:'absolute',left:0,right:0,top:-2,height:2,opacity:.75,borderRadius:2}}/>}
      {cust.note&&<div style={{background:'rgba(255,84,112,0.08)',border:'1px solid rgba(255,84,112,0.25)',borderRadius:8,padding:'7px 10px',marginBottom:10,fontSize:12,color:'#ffd0d8',display:'flex',gap:8,alignItems:'flex-start'}}><span style={{flexShrink:0}}>ðŸ› ï¸</span><div style={{flex:1,minWidth:0}}><FridayDoc text={cust.note} style={{margin:0}}/></div><button onClick={()=>openWsChat('remove the pinned note')} title="Ask Friday to remove this note" style={{background:'none',border:'none',color:'#ff8aa0',cursor:'pointer',fontSize:13,lineHeight:1,flexShrink:0}}>Ã—</button></div>}
      {cust.actions&&cust.actions.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>{cust.actions.map((a,i)=><button key={i} className="btn" style={{fontSize:11}} onClick={()=>openWsChat(a.prompt)}>{a.label}</button>)}</div>}

// â•â•â• COMMAND PALETTE (Ctrl+K) â•â•â•
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'ðŸ‘¤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'âš¡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routinesâ€¦"
        value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}
        </div>))})()}
      </div>
    </div>
  </div>);
}

// â•â•â• SEND-TO DROPDOWN (Data Flow) â•â•â•
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'ðŸ“‹'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'ðŸ”—',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'ðŸ“…',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'ðŸ“°'},
    {label:'Draft Email',dest:'gmail_draft',ico:'âœ‰ï¸'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'âœ“':status==='fail'?'âœ—':status==='sending'?'â³':'ðŸ“¤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

  const load=(s,f)=>{const fn=typeof f==='string'?f:(f.filename||f.name);
    setPath(`${s}/${fn}`);setEditing(false);setDraft('');setContent('Loading...');

  const deleteFile=async()=>{

        </div>}

        {struct?.sections?.map(s=><div key={s.name}>
          <div style={{fontSize:11,color:'#00d4ff',fontFamily:'Orbitron',margin:'8px 0 3px',letterSpacing:'.05em'}}>{s.name} <span style={{color:'#a8a8b4'}}>({(s.files||[]).length})</span></div>
          {(s.files||[]).map(f=>{const fn=typeof f==='string'?f:(f.filename||f.name);const p=`${s.name}/${fn}`;return(<div key={fn} onClick={()=>load(s.name,f)} style={{fontSize:11,color:path===p?'#00d4ff':'#a8a8b4',cursor:'pointer',padding:'2px 0',transition:'color .15s'}} onMouseOver={e=>e.currentTarget.style.color='#00d4ff'} onMouseOut={e=>{if(path!==p)e.currentTarget.style.color='#a8a8b4'}}>{fn}</div>)})}
        </div>)}
      </div>

      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        {path&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:11,color:'#999',fontFamily:'JetBrains Mono'}}>wiki/{path}</div>
          <div style={{display:'flex',gap:4}}>
            {!editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={beginEdit}>âœŽ Edit</button>}
            {editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#00ff80',borderColor:'rgba(0,255,128,0.4)'}} disabled={saving} onClick={saveEdit}>{saving?'Saving...':'ðŸ’¾ Save'}</button>}
            {editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={cancelEdit}>Cancel</button>}
            {!editing&&path&&<button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#ff0080',borderColor:'rgba(255,0,128,0.4)'}} onClick={()=>{setConfirmDelete(path);setConfirmText('')}}>ðŸ—‘ Delete</button>}
          </div>
        </div>}
        {editing
          ?<textarea value={draft} onChange={e=>setDraft(e.target.value)} spellCheck={false}
            style={{flex:1,minHeight:300,width:'100%',background:'rgba(0,0,0,0.35)',color:'#ddd',border:'1px solid rgba(0,212,255,0.22)',borderRadius:6,padding:10,fontFamily:'JetBrains Mono',fontSize:12,lineHeight:1.6,resize:'vertical',outline:'none'}}/>
          :<FridayDoc text={content} style={{margin:0}}/>}
      </div>
    </div>

    {/* Delete confirmation modal */}
    {confirmDelete&&<div onClick={()=>{setConfirmDelete(null);setConfirmText('')}} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(440px,90vw)',background:'rgba(15,5,15,0.97)',border:'1px solid rgba(255,0,128,0.45)',borderRadius:10,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.85)'}}>
        <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ff0080',letterSpacing:'.1em',marginBottom:8}}>âš  DELETE WIKI FILE</div>
        <div style={{fontSize:12,color:'#ddd',marginBottom:10,lineHeight:1.5}}>This will permanently delete <strong style={{color:'#ff0080'}}>{confirmDelete}</strong>. Type <strong>DELETE</strong> to confirm.</div>
        <input value={confirmText} onChange={e=>setConfirmText(e.target.value)} placeholder="DELETE" autoFocus
          style={{width:'100%',background:'rgba(0,0,0,0.4)',color:'#fff',border:'1px solid rgba(255,0,128,0.4)',borderRadius:6,padding:'8px 10px',fontFamily:'JetBrains Mono',fontSize:13,outline:'none',marginBottom:10}}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" style={{fontSize:11}} onClick={()=>{setConfirmDelete(null);setConfirmText('')}}>Cancel</button>
          <button className="btn" style={{fontSize:11,color:'#ff0080',borderColor:'rgba(255,0,128,0.5)'}} disabled={confirmText!=='DELETE'} onClick={deleteFile}>Delete Permanently</button>
        </div>
      </div>
    </div>}
  </div>);
}
// â•â•â• FUTURESPEAK STUDIO â€” portfolio project / deployment cockpit â•â•â•

const FS_DEPLOY_META={
  green:{c:'#00ff80',label:'DEPLOYED'},
  yellow:{c:'#f59e0b',label:'UNCOMMITTED'},
  red:{c:'#ff0080',label:'ERROR'},
  remote:{c:'#00d4ff',label:'REPLIT-ONLY'},
};
const FS_CAT_META={
  company:{c:'#00d4ff',ico:'ðŸš€'},
  client:{c:'#f59e0b',ico:'ðŸ¤'},
  personal:{c:'#7c3aed',ico:'ðŸ’œ'},
};
function FSProjectCard({p,onToast,onChanged}){
  const[expanded,setExpanded]=useState(false);
  const[editing,setEditing]=useState(false);
  const[instr,setInstr]=useState('');
  const[deploy,setDeploy]=useState(false);

  const st=p.status||{};

  const cat=FS_CAT_META[p.category]||FS_CAT_META.company;
  const cloned=st.cloned;
  const runEdit=async()=>{
    if(!instr.trim())return;setBusy(true);
    try{const r=await fetch('/api/futurespeak/project/'+encodeURIComponent(p.name)+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:instr,deploy})});
      const d=await r.json();
      if(d.status==='ok'){onToast((deploy?'Deploy':'Quick Edit')+' launched for '+p.name+' â€” track in Code workspace');setInstr('');setEditing(false);setDeploy(false)}
      else onToast(d.message||'Launch failed')}

    catch(e){onToast('Remove failed')}

    onMouseEnter={e=>e.currentTarget.style.borderColor=ds.c+'88'} onMouseLeave={e=>e.currentTarget.style.borderColor=ds.c+'33'}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>

          <span style={{width:8,height:8,borderRadius:'50%',background:ds.c,boxShadow:'0 0 8px '+ds.c}}/>{ds.label}
        </span>
        <span style={{fontSize:11,color:cat.c,textTransform:'uppercase',letterSpacing:.5}}>{p.category}</span>
      </div>
    </div>
    <div style={{fontSize:11,color:'#a8a8b4',lineHeight:1.4}}>{p.description}</div>
    {cloned?<div style={{fontSize:11,color:'#999',fontFamily:'JetBrains Mono',background:'rgba(0,0,0,0.25)',borderRadius:4,padding:'5px 7px',lineHeight:1.5}}>
      <div style={{color:'#bbb'}}>âŽ‡ {st.branch||'â€”'}{st.last_commit_rel?' Â· '+st.last_commit_rel:''}</div>
      <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{st.last_commit_msg||'(no commits)'}</div>
      <div style={{display:'flex',gap:10,marginTop:3,color:'#888'}}>
        <span style={{color:st.uncommitted>0?'#f59e0b':'#888'}}>â— {st.uncommitted} changed</span>

        {st.has_replit&&<span style={{color:'#00ff80'}}>âš¡ replit</span>}
      </div>
    </div>:<div style={{fontSize:11,color:'#00d4ff',fontFamily:'JetBrains Mono',background:'rgba(0,212,255,0.06)',borderRadius:4,padding:'5px 7px'}}>Live on Replit Â· not cloned locally</div>}
    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
      {p.url&&<a className="btn" style={{fontSize:11,textDecoration:'none'}} href={p.url} target="_blank" rel="noopener">ðŸŒ View Site</a>}
      {p.replit_url&&<button className="btn" style={{fontSize:11}} onClick={()=>window.open(p.replit_url,'_blank','noopener')}>âš¡ Open in Replit</button>}

    </div>
    {editing&&cloned&&<div style={{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:6}}>
      <textarea className="input" style={{width:'100%',height:54,resize:'vertical',fontSize:11}} value={instr} onChange={e=>setInstr(e.target.value)} placeholder={'Describe the change to '+p.name+'â€¦ (e.g. "update the hero headline")'}/>
      <div style={{display:'flex',gap:6,alignItems:'center',marginTop:5,flexWrap:'wrap'}}>
        <label style={{fontSize:11,color:'#aaa',display:'flex',alignItems:'center',gap:4,cursor:'pointer'}}>

      </div>
      <div style={{fontSize:11,color:'#666',marginTop:4}}>Opens a scoped Claude Code terminal in {p.repo}. {deploy?'Pushes to GitHub â†’ Replit auto-deploys.':'Diff stays local until you commit.'}</div>
    </div>}
    {expanded&&<div style={{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:6,fontSize:11,color:'#999',fontFamily:'JetBrains Mono'}}>
      <div>repo: {p.repo||'â€”'}</div>

      {st.behind>0&&<div style={{color:'#f59e0b'}}>â†“ {st.behind} behind remote</div>}
      {st.error&&<div style={{color:'#ff0080'}}>error: {st.error}</div>}
      <button className="btn btn-magenta" style={{fontSize:11,marginTop:6,padding:'2px 8px'}} onClick={removeProject}>ðŸ—‘ Remove from portfolio</button>
    </div>}
  </div>);
}
function FSStudio(){

  const poll=(id)=>fetch('/api/pipelines/runs/'+id).then(r=>r.json()).then(d=>{const rn=d.run||d;setRun(rn);return rn;}).catch(()=>null);
  useEffect(()=>{if(!runId)return;let stop=false;const tick=async()=>{if(stop)return;const rn=await poll(runId);if(rn&&['completed','failed'].includes(rn.state)){onCreated&&onCreated();return;}setTimeout(tick,2000);};tick();return()=>{stop=true;};},[runId]);

  const stages=(run&&run.stages)||[];const idx=run?run.stage_index:0;const state=run&&run.state;

    {stages.length>0&&<div>

        {stages.map((s,i)=>{const done=i<idx||state==='completed';const active=i===idx&&state!=='completed';const checkpoint=active&&state==='awaiting_checkpoint';
          const col=state==='failed'&&active?'#ff0080':done?'#22c55e':checkpoint?'#f59e0b':active?'#00d4ff':'#5a7a86';
          return(<div key={i} style={{flex:'1 1 90px',minWidth:80}}>

              {i<stages.length-1&&<div style={{flex:1,height:2,background:done?'#22c55e':'rgba(127,182,201,0.2)'}}/>}
            </div>
            <div style={{fontSize:9,color:col,marginTop:4,fontFamily:'JetBrains Mono',lineHeight:1.2}}>{s.name}{checkpoint&&' â¸'}</div>
          </div>);})}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:11,color:'#ccc'}}>Stage {Math.min(idx+(state==='completed'?0:1),stages.length)}/{stages.length}</span>
        <span style={{fontSize:10,fontFamily:'Orbitron',color:PIPE_STATE_COL[state]||'#888'}}>{state}</span>

        <video controls src={prodFile.url} style={{width:'100%',borderRadius:8,background:'#0a0a0f',marginTop:4}}/>}
    </div>}
  </div>);

function DefederationPanel(){
  const[assessments,setAssessments]=React.useState([]);
  const[myAssessments,setMyAssessments]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[form,setForm]=React.useState({agent_pubkey:'',harm_category:'coordinated_harassment',severity_score:0.5,recommendation:'MONITOR',reasoning:'',evidence_hash:'',evidence_ts:''});
  const[submitting,setSubmitting]=React.useState(false);
  const[msg,setMsg]=React.useState('');
  const HARM_CATS=['H1','H2','H3','H4','coordinated_harassment','radicalization_pattern','deceptive_content','epistemic_manipulation','sockpuppet_cluster'];
  const RECS=['MONITOR','RESTRICT','DEFEDERATE'];
  const recColor={MONITOR:'#f5a623',RESTRICT:'#ff6b35',DEFEDERATE:'#ff2244'};
  const statusColor={CLEAN:'#00cc88',MONITOR:'#f5a623',RESTRICT:'#ff6b35',DEFEDERATE:'#ff2244'};
  const load=()=>{
    setLoading(true);
    try{
      const identity=JSON.parse(sessionStorage.getItem('friday_identity')||'null');
      const myKey=identity?.agent_id||'';
      Promise.all([
        myKey?fetch(`/api/defederation/assessments?assessor_pubkey=${encodeURIComponent(myKey)}`).then(r=>r.json()).catch(()=>({assessments:[]})):Promise.resolve({assessments:[]}),
      ]).then(([mine])=>{
        setMyAssessments(mine.assessments||[]);
        setLoading(false);
      });
    }catch{setLoading(false);}
  };
  React.useEffect(()=>{
    fetch('/api/federation/identity').then(r=>r.json()).then(d=>{
      if(d.identity)sessionStorage.setItem('friday_identity',JSON.stringify(d.identity));
    }).catch(()=>{}).finally(()=>load());
  },[]);
  const submit=async()=>{
    if(!form.agent_pubkey.trim()||!form.reasoning.trim()||!form.evidence_hash.trim()){setMsg('agent_pubkey, reasoning, and at least one evidence hash are required');return;}
    setSubmitting(true);setMsg('');
    try{
      const evidence=[{content_hash:form.evidence_hash.trim(),timestamp:form.evidence_ts||new Date().toISOString(),violation_type:form.harm_category}];
      const r=await fetch('/api/defederation/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...form,severity_score:parseFloat(form.severity_score),evidence})});
      const d=await r.json();
      if(d.ok){setMsg('Assessment submitted. Consensus: '+d.consensus?.status);load();}
      else setMsg('Error: '+(d.error||'unknown'));
    }catch(e){setMsg('Error: '+e.message);}
    setSubmitting(false);
  };
  const withdraw=async(id)=>{
    if(!confirm('Withdraw this assessment? The signed withdrawal will be recorded.'))return;
    try{
      const r=await fetch(`/api/defederation/withdraw/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
      const d=await r.json();
      if(d.ok)load();else alert('Withdraw failed: '+(d.error||'unknown'));
    }catch(e){alert('Error: '+e.message);}
  };
  if(loading)return<div style={{color:'#999',fontSize:12,padding:'8px 0'}}>Loading defederation data...</div>;
  return(<div>
    <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',lineHeight:1.6,marginBottom:12}}>
      Defederation assessments are governed by the cLaws â€” evidence is required, political disagreement cannot be a harm category. Consensus requires â‰¥3 independent assessors spanning â‰¥24 hours before DEFEDERATE takes effect.
    </div>
    {/* New assessment form */}
    <div className="settings-subtitle">Submit Assessment</div>
    <div style={{display:'grid',gap:6,marginBottom:10}}>

  const load=()=>{
    setLoading(true);

  };
  React.useEffect(()=>load(),[]);
  const toggle=async(pack)=>{
    if(pack.always_on)return;
    setMsg('');
    try{
      let r,d;
      if(pack.subscribed){
        r=await fetch(`/api/policies/unsubscribe/${encodeURIComponent(pack.pack_id)}`,{method:'DELETE'});
        d=await r.json();
        if(!d.ok&&!r.ok){setMsg(d.error||'Unsubscribe failed');return;}

        r=await fetch('/api/policies/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pack_id:pack.pack_id})});

        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:'#dde',display:'flex',alignItems:'center',gap:5}}>

            <div style={{fontSize:10,color:'#666',marginTop:3}}>v{pack.version} Â· {pack.rules?.length||0} rules Â· {pack.subscribers||0} subscribers</div>
          </div>
          <div style={{flexShrink:0}}>
            {pack.always_on
              ?<span style={{fontSize:10,color:'#00d4ff',fontFamily:'JetBrains Mono'}}>ðŸ”’ Required</span>
              :<button
                onClick={()=>toggle(pack)}
                style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
                  background:isOn?'rgba(0,200,100,0.15)':'rgba(255,255,255,0.06)',
                  color:isOn?'#00cc66':'#aaa',
                  transition:'all 0.15s'}}>
                {isOn?'Subscribed âœ“':'Subscribe'}
              </button>
            }
          </div>
        </div>

          <summary style={{fontSize:10,color:'#666',cursor:'pointer'}}>Rules ({pack.rules.length})</summary>
          <div style={{marginTop:4,paddingLeft:8}}>

                <span style={{color:'rgba(255,255,255,0.3)',fontSize:9}}>{r.description}</span>
              </div>);
            })}

        </details>}
      </div>);
    })}
    {available.length===0&&<div style={{fontSize:11,color:'#666'}}>No packs found.</div>}
  </div>);

// â•â•â• WORK LOG PANEL â•â•â•
function WorkLogPanel(){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[expanded,setExpanded]=useState(null);
  const[filter,setFilter]=useState({workspace:'',worker_type:'',since:'',until:''});
  const[page,setPage]=useState(0);
  const PAGE=20;
  const load=()=>{
    setLoading(true);
    const active=Object.fromEntries(Object.entries(filter).filter(([,v])=>v));
    const p=new URLSearchParams({limit:PAGE,offset:page*PAGE,...active}).toString();

  };

  const statusColor={SUCCESS:'#00ff80',FAILED:'#ef4444',CANCELLED:'rgba(255,255,255,0.3)',RUNNING:'#00d4ff',PENDING:'#f59e0b'};

    </div>
    {loading&&<div style={{fontSize:11,color:'#999',fontStyle:'italic'}}>Loadingâ€¦</div>}
    {!loading&&entries.length===0&&<div style={{fontSize:11,color:'#555',fontStyle:'italic'}}>No work log entries match these filters.</div>}
    {entries.map(e=>(
      <div key={e.work_id} style={{marginBottom:5,background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:6,overflow:'hidden'}}>
        <div onClick={()=>toggleExp(e.work_id)} style={{cursor:'pointer',padding:'7px 10px',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:9,color:statusColor[e.status]||'#aaa',fontFamily:'JetBrains Mono',flexShrink:0,minWidth:52}}>{e.status||'â€”'}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:'#ccc',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'JetBrains Mono'}}>{e.workspace||'default'} Â· {e.worker_type||'â€”'}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',marginTop:1}}>{e.started_at?new Date(e.started_at).toLocaleString():''}</div>
          </div>
          <div style={{flexShrink:0,textAlign:'right'}}>
            {e.duration_seconds!=null&&<div style={{fontSize:9,color:'#f59e0b',fontFamily:'JetBrains Mono'}}>{fmtDur(e.duration_seconds)}</div>}
            {e.cost_mÏˆ!=null&&<div style={{fontSize:9,color:'rgba(255,255,255,0.35)',fontFamily:'JetBrains Mono'}}>{e.cost_mÏˆ}mÏˆ</div>}
          </div>
          <span style={{color:'rgba(255,255,255,0.3)',fontSize:10,flexShrink:0}}>{expanded===e.work_id?'â–¾':'â–¸'}</span>
        </div>
        {expanded===e.work_id&&<div style={{padding:'8px 12px 10px',borderTop:'1px solid rgba(255,255,255,0.05)',background:'rgba(0,0,0,0.3)'}}>
          {e.adapter_type&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',fontFamily:'JetBrains Mono',marginBottom:3}}>Adapter: {e.adapter_type}</div>}
          {e.tokens_used!=null&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',fontFamily:'JetBrains Mono',marginBottom:3}}>Tokens: {(e.tokens_used||0).toLocaleString()}</div>}
          {e.quality_score!=null&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',fontFamily:'JetBrains Mono',marginBottom:3}}>Quality: {Math.round((e.quality_score||0)*100)}%</div>}
          {e.artifacts&&e.artifacts.length>0&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',fontFamily:'JetBrains Mono',marginBottom:3}}>Artifacts: {e.artifacts.join(', ')}</div>}
          {e.goal_ancestry&&e.goal_ancestry.length>0&&<div style={{fontSize:10,color:'rgba(255,255,255,0.45)',fontFamily:'JetBrains Mono',marginBottom:3}}>Goals: {e.goal_ancestry.join(' â†’ ')}</div>}
          {e.error&&<div style={{fontSize:10,color:'#ef4444',fontFamily:'JetBrains Mono',marginTop:4,padding:'4px 8px',background:'rgba(239,68,68,0.06)',borderRadius:4}}>Error: {e.error}</div>}

      {page>0&&<button className="settings-btn" style={{fontSize:10}} onClick={()=>setPage(p=>p-1)}>â† Prev</button>}
      {entries.length===PAGE&&<button className="settings-btn" style={{fontSize:10}} onClick={()=>setPage(p=>p+1)}>Next â†’</button>}
    </div>
  </div>);

// â•â•â• FEDERATION PANEL (embedded in Settings) â•â•â•
function FederationPanel(){
  const[identity,setIdentity]=useState(null);const[peers,setPeers]=useState([]);
  const[discoverUrl,setDiscoverUrl]=useState('');const[discovering,setDiscovering]=useState(false);
  const[toast,setToast]=useState('');const[loading,setLoading]=useState(true);
  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2800)};
  const load=()=>{
    Promise.all([
      fetch('/api/federation/identity').then(r=>r.json()).then(d=>{if(d.ok||d.identity)setIdentity(d.identity||d)}).catch(()=>{}),
      fetch('/api/federation/peers').then(r=>r.json()).then(d=>setPeers(d.peers||[])).catch(()=>{})
    ]).finally(()=>setLoading(false));
  };
  useEffect(()=>{load()},[]);
  const discover=async()=>{
    if(!discoverUrl.trim())return;
    setDiscovering(true);
    try{
      const r=await fetch('/api/federation/discover',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:discoverUrl.trim()})});
      const d=await r.json();
      if(d.ok){flash('Peer discovered: '+(d.peer?.label||d.peer?.agent_id||'unknown'));setDiscoverUrl('');load();}
      else flash('Discovery failed: '+(d.error||'unknown error'));
    }catch(e){flash('Discovery failed')}
    setDiscovering(false);
  };
  const setPref=async(agentId,pref)=>{
    try{await fetch('/api/federation/peers/'+encodeURIComponent(agentId)+'/pref',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fed_pref:pref})});load()}
    catch(e){}
  };
  const copyPeerCard=()=>{
    if(!identity)return;
    navigator.clipboard.writeText(JSON.stringify(identity,null,2)).then(()=>flash('Peer card copied to clipboard')).catch(()=>flash('Copy failed'));
  };
  const trunc=(s,n)=>(s||'').length>n?(s||'').slice(0,n)+'...':s||'â€”';
  const prefColor={ask:'#f59e0b',allow:'#00ff80',block:'#ff5470'};
  if(loading)return<div style={{color:'#999',fontSize:12,padding:'8px 0'}}>Loading federation data...</div>;
  return(<div>
    {toast&&<div style={{marginBottom:8,padding:'5px 8px',borderRadius:5,background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.2)',fontSize:11,color:'#00d4ff'}}>{toast}</div>}
    {/* Agent Identity Card */}
    <div className="settings-subtitle">Agent Identity</div>
    {identity?<div style={{background:'rgba(0,212,255,0.04)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div style={{fontFamily:'Orbitron',fontSize:13,color:'#00d4ff',marginBottom:3}}>{identity.display_name||'Friday'}</div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>{trunc(identity.agent_id,16)} {identity.agent_id&&identity.agent_id.length>16?'...':''}</div>
        </div>
        <button className="settings-btn" style={{fontSize:10,padding:'3px 8px'}} onClick={copyPeerCard}>Copy Peer Card</button>
      </div>
      <div style={{fontSize:11,color:'#a8a8b4',marginBottom:6}}>Federation v{identity.federation_version||'1.0'}</div>
      {identity.capabilities&&identity.capabilities.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {identity.capabilities.map((c,i)=><span key={i} style={{fontSize:9,padding:'1px 6px',borderRadius:10,background:'rgba(124,58,237,0.15)',border:'1px solid rgba(124,58,237,0.35)',color:'#b794f6',fontFamily:'JetBrains Mono'}}>{c}</span>)}
      </div>}
    </div>:<div style={{fontSize:11,color:'#888',marginBottom:12}}>No identity data â€” federation not configured.</div>}
    {/* Peer Discovery */}
    <div className="settings-subtitle">Peer Discovery</div>
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <input className="input" style={{flex:1,fontSize:12}} value={discoverUrl} onChange={e=>setDiscoverUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&discover()} placeholder="https://agent.example.com/api/federation/identity"/>
      <button className="settings-btn" style={{flexShrink:0}} disabled={discovering||!discoverUrl.trim()} onClick={discover}>{discovering?'Discovering...':'Discover Agent'}</button>
    </div>
    {/* Known Peers */}
    <div className="settings-subtitle">Known Peers ({peers.length})</div>
    {peers.length===0?<div style={{fontSize:11,color:'#888',marginBottom:8}}>No peers discovered yet.</div>:
    <div style={{marginBottom:8}}>
      {peers.map((p,i)=><div key={p.agent_id||i} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:11}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:'#dde',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label||p.display_name||'Unknown'}</div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#888'}}>{trunc(p.agent_id,20)}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>{typeof p.overall_score==='number'?(p.overall_score*100).toFixed(0)+'%':'â€”'}</div>
          {p.last_handshake&&<div style={{fontSize:9,color:'#666'}}>{new Date(p.last_handshake).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>}
        </div>
        <select value={p.fed_pref||'ask'} onChange={e=>setPref(p.agent_id,e.target.value)}
          style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:4,color:prefColor[p.fed_pref||'ask']||'#ccc',fontSize:10,padding:'2px 4px',fontFamily:'JetBrains Mono',cursor:'pointer',outline:'none'}}>
          {['ask','allow','block'].map(v=><option key={v} value={v} style={{background:'#0a0a14',color:'#ccc'}}>{v}</option>)}
        </select>
      </div>)}
    </div>}
  </div>);
}

function SystemWS(){
  const[sys,setSys]=useState(null);const[loading,setLoading]=useState(true);
  // Context log state
  const[ctxStats,setCtxStats]=useState(null);
  const[ctxQuery,setCtxQuery]=useState('');
  const[ctxFrom,setCtxFrom]=useState('');
  const[ctxTo,setCtxTo]=useState('');
  const[ctxType,setCtxType]=useState('');
  const[ctxResults,setCtxResults]=useState(null);
  const[ctxSearching,setCtxSearching]=useState(false);
  const[ctxToast,setCtxToast]=useState('');
  const[ctxDelOpen,setCtxDelOpen]=useState(false);
  const[ctxDelConfirm,setCtxDelConfirm]=useState('');

  const showCtxToast=(m)=>{setCtxToast(m);setTimeout(()=>setCtxToast(''),2200)};
  const refreshCtxStats=()=>fetch('/api/context/stats').then(r=>r.json()).then(setCtxStats).catch(()=>{});
  const[compStats,setCompStats]=useState(null);
  // â”€â”€ Weekly self-improvement report â”€â”€
  const[selfImp,setSelfImp]=useState(null);const[siBusy,setSiBusy]=useState(false);
  const siRef=useRef(null);
  const refreshSelfImp=()=>fetch('/api/self-improvement/latest').then(r=>r.json()).then(d=>setSelfImp(d?.report||null)).catch(()=>{});
  const runSelfImp=async()=>{if(siBusy)return;setSiBusy(true);
    // The run is async â€” it surfaces as a floating process orb. Poll until the
    // orb finishes (a cold ChromaDB load can make this take a couple of minutes),
    // then refresh the card. A `seen` guard avoids stopping before it registers.
    try{await fetch('/api/self-improvement/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})}catch(e){setSiBusy(false);return}
    let tries=0,seen=false;
    const poll=setInterval(async()=>{
      tries++;let active=false;
      try{const pr=await fetch('/api/processes').then(r=>r.json());active=(pr.processes||[]).some(p=>String(p.id||'').startsWith('selfimprove')&&p.status==='running')}catch(e){}
      if(active)seen=true;
      if((seen&&!active)||(!seen&&tries>=6)||tries>150){clearInterval(poll);await refreshSelfImp();setSiBusy(false)}
    },2000);
  };
  // Deep-link: notifications target {workspace:'system',tab:'self-improvement'} â†’ scroll the card into view.
  useNavTarget('system',t=>{if(t.tab==='self-improvement'&&siRef.current)setTimeout(()=>siRef.current.scrollIntoView({behavior:'smooth',block:'start'}),120)});

  useEffect(()=>{
    let done=false;
    const finish=(data)=>{if(done)return;done=true;setSys(data);setLoading(false)};
    fetch('/api/system').then(r=>r.json()).then(finish).catch(()=>finish(null));
    // Hard fallback so the UI never gets stuck on the loading state if the endpoint hangs.
    setTimeout(()=>finish(null),6000);
    refreshCtxStats();
    fetch('/api/context/compression-stats').then(r=>r.json()).then(d=>setCompStats(d.compression||null)).catch(()=>{});
    refreshSelfImp();
  },[]);

  const runCtxSearch=async()=>{setCtxSearching(true);
    try{const r=await fetch('/api/context/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:ctxQuery.trim(),date_from:ctxFrom||null,date_to:ctxTo||null,type:ctxType||null,limit:200})});
      const d=await r.json();setCtxResults(d.results||[])}catch{setCtxResults([])}
    setCtxSearching(false);
  };
  const toggleLogging=async()=>{
    const next=!ctxStats?.enabled;
    try{await fetch(next?'/api/context/resume':'/api/context/pause',{method:'POST'});showCtxToast(next?'Logging resumed':'Logging paused');refreshCtxStats()}catch{showCtxToast('Toggle failed')}
  };
  const deleteRange=async()=>{
    if(ctxDelConfirm!=='DELETE'){showCtxToast('Type DELETE to confirm');return}
    try{const r=await fetch('/api/context/range',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({date_from:ctxFrom||null,date_to:ctxTo||null,confirm:'DELETE'})});
      const d=await r.json();showCtxToast(`Deleted ${d.count} day${d.count===1?'':'s'}`);setCtxDelOpen(false);setCtxDelConfirm('');refreshCtxStats();setCtxResults(null)}catch{showCtxToast('Delete failed')}
  };
  const exportLog=()=>{window.open('/api/context/export','_blank')};

  const fmtBytes=(n)=>{if(!n)return'0 B';if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB'};
  const fmtTs=(s)=>{try{return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}catch{return s}};
  const typeColor=(t)=>({chat_user:'#7c3aed',chat_agent:'#00d4ff',tool_call:'#f59e0b',wiki_edit:'#00ff80',wiki_delete:'#ff0080',file_read:'#a8a8b4',task_spawn:'#ff6dd9'}[t]||'#888');

  if(loading)return <div style={{color:'#bbb',textAlign:'center',padding:40,fontFamily:'JetBrains Mono',fontSize:12}}>Scanning system...</div>;
  const disks=(sys?.disk||sys?.disks||[]);
  const procs=(sys?.processes||[]);
  return(<div>
    {compStats&&<div className="card" style={{marginBottom:10,padding:10}}>
      <div className="card-title">Context Compression (Headroom)</div>
      {compStats.available
        ?<div style={{display:'flex',gap:12,fontSize:11,color:'#aaa',flexWrap:'wrap'}}>
          <span>{compStats.calls||0} compressions</span>
          <span style={{color:'#00ff80'}}>{((compStats.tokens_saved||0)/1000).toFixed(1)}k tokens saved</span>
          <span>{Math.round((compStats.compression_ratio||0)*100)}% overall ratio</span>
          <span>last call {Math.round((compStats.last_ratio||0)*100)}%</span>
        </div>
        :<div style={{fontSize:11,color:'#888'}}>Headroom core not installed â€” compression passthrough (pip install headroom-ai).</div>}
    </div>}

    {/* â”€â”€â”€ Weekly Self-Improvement â”€â”€â”€ */}
    <div ref={siRef} className="card" style={{marginBottom:10,padding:10,border:'1px solid rgba(0,212,255,0.18)'}}>
      <div className="card-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>ðŸªž Weekly Self-Improvement</span>
        <button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={runSelfImp} disabled={siBusy}>{siBusy?'Reviewingâ€¦':'â†» Run now'}</button>
      </div>
      {!selfImp
        ?<div style={{fontSize:11,color:'#888',padding:'8px 2px'}}>No self-review yet. Friday reviews her own recent responses every Sunday â€” or run one now.</div>
        :(()=>{
          const epi=selfImp.epistemic||{};const syc=selfImp.sycophancy||{};
          const eo=epi.overall;const eCol=eo==null?'#888':eo>0.6?'#00ff80':eo>=0.4?'#f59e0b':'#ff0080';
          const si=syc.sycophancy_index;const sCol=si==null?'#888':syc.danger_zone?'#ff0080':syc.healthy?'#00ff80':'#f59e0b';
          const focus=selfImp.focus_areas||[];
          return(<>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono',marginBottom:8}}>
              {selfImp.week_id} Â· {selfImp.responses_analyzed||0} responses Â· {String(selfImp.generated_at||'').slice(0,10)}
            </div>
            <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>

function DevDiff({diff}){
  const lines=String(diff||'').split('\n');
  return(<pre style={{margin:0,maxHeight:'46vh',overflow:'auto',fontFamily:'JetBrains Mono',fontSize:11,lineHeight:1.5,background:'rgba(0,0,0,0.35)',borderRadius:8,padding:'8px 10px'}}>
    {lines.map((ln,i)=>{
      let col='#9aa';
      if(/^\+\+\+|^---/.test(ln))col='#888';
      else if(/^@@/.test(ln))col='#ff6dd9';
      else if(/^\+/.test(ln))col='#00ff80';
      else if(/^-/.test(ln))col='#ff5a7a';
      return <div key={i} style={{color:col,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{ln||' '}</div>;
    })}
  </pre>);
}
function CodeViewer({content,lang}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.textContent=content||'';
    ref.current.className='language-'+(lang||'plaintext');
    ref.current.removeAttribute('data-highlighted');
    try{if(window.hljs)window.hljs.highlightElement(ref.current)}catch(e){}
  },[content,lang]);
  return(<pre style={{margin:0,maxHeight:'60vh',overflow:'auto',borderRadius:8,fontSize:12,lineHeight:1.55}}>
    <code ref={ref} className={'language-'+(lang||'plaintext')}/>
  </pre>);
}

// â”€â”€â”€ Vibe coding: NL â†’ plan â†’ diff â†’ apply â†’ commit â”€â”€â”€
function DevVibe({repos,onLog}){
  const[repo,setRepo]=useState('');const[instr,setInstr]=useState('');
  const[plan,setPlan]=useState(null);const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');const[applied,setApplied]=useState(null);
  const[openFile,setOpenFile]=useState(0);const[committing,setCommitting]=useState(false);const[commitMsg,setCommitMsg]=useState('');
  useEffect(()=>{if(!repo&&repos.length)setRepo(repos[0].name)},[repos]);
  const genPlan=async()=>{
    if(!repo||!instr.trim())return;setBusy(true);setErr('');setPlan(null);setApplied(null);
    try{const r=await fetch('/api/code/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo,instruction:instr})});
      const d=await r.json();
      if(d.status==='ok'){setPlan(d.plan);setCommitMsg((d.plan.summary||instr).split('\n')[0].slice(0,72))}
      else setErr(d.message||'Plan failed');
    }catch(e){setErr('Request failed')}
    setBusy(false);
  };
  const applyPlan=async()=>{
    if(!plan)return;setBusy(true);setErr('');
    try{const r=await fetch('/api/code/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan_id:plan.id})});
      const d=await r.json();if(d.status==='ok'){setApplied(d);onLog&&onLog()}else setErr(d.message||'Apply failed');
    }catch(e){setErr('Apply failed')}
    setBusy(false);
  };
  const commit=async()=>{
    if(!plan||!commitMsg.trim())return;setCommitting(true);setErr('');
    try{const r=await fetch('/api/git/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo:plan.repo,message:commitMsg})});
      const d=await r.json();if(!d.ok)setErr(d.message||d.stderr||'Commit failed');else setApplied(a=>({...(a||{}),committed:true}));
    }catch(e){setErr('Commit failed')}
    setCommitting(false);
  };
  return(<div>
    <FridaySays text="Describe a change in plain English. Friday drafts a plan, you preview the diff, then apply and commit."/>
    <div className="card" style={{padding:10,marginBottom:10}}>
      <div style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
        <span style={{fontSize:11,color:'#9ad'}}>Repo</span>
        <select className="input" style={{flex:1,padding:'5px 8px'}} value={repo} onChange={e=>setRepo(e.target.value)}>
          {repos.length===0&&<option value="">(no repos)</option>}
          {repos.map((r,i)=><option key={i} value={r.name}>{r.name} Â· {r.branch}</option>)}
        </select>
      </div>
      <textarea className="input" style={{width:'100%',height:64,resize:'vertical',marginBottom:6}} value={instr} onChange={e=>setInstr(e.target.value)} placeholder="e.g. Add a /health endpoint that returns uptime and version as JSON"/>
      <div style={{display:'flex',gap:6}}>
        <button className="btn" style={{fontWeight:600}} disabled={busy||!repo||!instr.trim()} onClick={genPlan}>{busy?'Thinkingâ€¦':'âœ¨ Generate Plan'}</button>
        {plan&&<button className="btn btn-magenta" style={{fontSize:11}} onClick={()=>{setPlan(null);setApplied(null)}}>Clear</button>}
      </div>
    </div>
    {err&&<div className="card" style={{borderColor:'rgba(255,0,128,0.3)',color:'#ff8db3',fontSize:12,marginBottom:10}}>âš  {err}</div>}
    {plan&&<div>
      <div className="card" style={{marginBottom:8}}>
        <div className="card-title" style={{marginTop:0}}>Plan â€” {plan.repo}</div>
        <FridayDoc text={plan.summary} compact/>
        {(plan.steps||[]).length>0&&<ul style={{margin:'4px 0 0 0',paddingLeft:18,fontSize:12,color:'#bcd'}}>{plan.steps.map((s,i)=><li key={i}>{s}</li>)}</ul>}
      </div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
        {(plan.files||[]).map((f,i)=><button key={i} className={'btn '+(openFile===i?'active':'')} style={{fontSize:11}} onClick={()=>setOpenFile(i)}>
          <span style={{color:f.action==='create'?'#00ff80':'#f59e0b'}}>{f.action==='create'?'+':'~'}</span> {f.path}</button>)}
      </div>
      {(plan.files||[])[openFile]&&<div className="card" style={{marginBottom:8}}>
        {plan.files[openFile].rationale&&<div style={{fontSize:11,color:'#9ad',marginBottom:6,fontStyle:'italic'}}>{plan.files[openFile].rationale}</div>}
        <DevDiff diff={plan.files[openFile].diff}/>
      </div>}
      {!applied&&<button className="btn" style={{fontWeight:600,borderColor:'rgba(0,255,128,0.4)',color:'#00ff80'}} disabled={busy} onClick={applyPlan}>{busy?'Applyingâ€¦':'âœ“ Apply '+(plan.files||[]).length+' file change(s)'}</button>}
      {applied&&<div className="card" style={{borderColor:'rgba(0,255,128,0.3)'}}>
        <div style={{fontSize:12,color:'#00ff80',marginBottom:6}}>âœ“ Applied {applied.count} file(s){applied.failed&&applied.failed.length?' Â· '+applied.failed.length+' failed':''}</div>
        {applied.committed?<div style={{fontSize:12,color:'#00d4ff'}}>âœ“ Committed</div>:<div style={{display:'flex',gap:6}}>
          <input className="input" style={{flex:1,padding:'5px 8px'}} value={commitMsg} onChange={e=>setCommitMsg(e.target.value)} placeholder="Commit message"/>
          <button className="btn" style={{fontSize:11,whiteSpace:'nowrap'}} disabled={committing||!commitMsg.trim()} onClick={commit}>{committing?'â€¦':'Commit'}</button>
        </div>}
      </div>}
    </div>}
  </div>);
}

        <button className="btn" style={{fontSize:11}} disabled={!!busy} onClick={()=>op('pull','/api/git/pull')}>â¤“ Pull</button>

        <button className="btn" style={{fontSize:11}} disabled={!!busy} onClick={()=>{setPrTitle('');setPrBody('');setPrOpen(true)}}>âŽ‡ Open PR</button>
        <button className="btn" style={{fontSize:11}} disabled={!!busy} onClick={loadDiff}>â†» Refresh diff</button>
      </div>

function fmtWhen(ts){
  if(!ts)return'';const d=new Date(ts);if(isNaN(d))return'';
  const now=new Date();const diff=(now-d)/1000;
  if(diff<60)return'now';if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400&&now.getDate()===d.getDate())return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  if(diff<604800)return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

const CAL_START_HOUR=6, CAL_END_HOUR=24, CAL_HOUR_PX=52;
function calY(iso){const d=new Date(iso);if(isNaN(d))return 0;const h=d.getHours()+d.getMinutes()/60;return Math.max(0,(h-CAL_START_HOUR)*CAL_HOUR_PX);}
function calFmtTime(iso){const d=new Date(iso);if(isNaN(d))return'';return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}

function CalendarWS(){
  const[today,setToday]=useState(null);const[loading,setLoading]=useState(true);
  const[week,setWeek]=useState([]);const[sel,setSel]=useState(null);// selected date iso (null=today)

  const loadWeek=()=>fetch('/api/calendar/week').then(r=>r.json()).then(d=>setWeek(d.days||[])).catch(()=>{});
  const loadTomorrow=()=>fetch('/api/calendar/tomorrow').then(r=>r.json()).then(setTomorrow).catch(()=>{});
  const loadDay=(iso)=>fetch('/api/calendar/day/'+iso).then(r=>r.json()).then(setDayData).catch(()=>{});
  useEffect(()=>{loadToday();loadWeek();loadTomorrow();
    const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t)},[]);

  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2400)};
  const pickDay=(iso,isToday)=>{if(isToday){setSel(null);setDayData(null)}else{setSel(iso);loadDay(iso)}setPrepFor(null)};
  const quickAdd=async()=>{if(!quick.trim()||adding)return;setAdding(true);
    try{const r=await fetch('/api/calendar/quick-add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:quick})});const d=await r.json();
      if(d.status==='ok'){flash((d.created_in_google?'Added to Google Calendar':'Added (stored locally)')+': '+d.event.title);setQuick('');loadToday();loadWeek();loadTomorrow();if(sel)loadDay(sel)}

    catch(e){flash('Quick-add failed')}setAdding(false)};
  const genPrep=async(ev)=>{if(prepFor===ev.id){setPrepFor(null);return}setPrepFor(ev.id);setPrepBusy(true);setPrepText('');

  const active=sel?dayData:today;

  const hours=[];for(let h=CAL_START_HOUR;h<CAL_END_HOUR;h++)hours.push(h);

      <button className="btn active" onClick={quickAdd} disabled={adding}>{adding?'Parsingâ€¦':'âœ¨ Add'}</button>
    </div>
    {toast&&<div style={{fontSize:11,color:'#00d4ff',marginBottom:8}}>{toast}</div>}

const ORCHESTRATOR_MODELS=[

  {id:'gemini-2.5-flash',label:'Gemini 2.5 Flash',short:'Flash'},
];
const _MODEL_FALLBACK={orchestrator:ORCHESTRATOR_MODELS,subagent:SUBAGENT_MODELS,creative:CREATIVE_MODELS,voice:VOICE_MODELS};
// Fetch the catalog once, cache app-wide, and expose role lists + an idâ†’meta map.
// Components call this and render selectors from it â€” no hardcoded model lists.
function useModelCatalog(){
  const[cat,setCat]=useState(window.__fridayModelCatalog||null);
  useEffect(()=>{
    if(window.__fridayModelCatalog){setCat(window.__fridayModelCatalog);return;}
    apiFetch('/api/models').then(r=>r.json()).then(d=>{
      if(d&&d.status==='ok'&&d.roles){window.__fridayModelCatalog=d;setCat(d);}
    }).catch(()=>{});
  },[]);
  const roles=(cat&&cat.roles)||{};
  const pick=r=>{const a=roles[r];return(a&&a.length)?a:(_MODEL_FALLBACK[r]||[]);};
  const out={loaded:!!cat,orchestrator:pick('orchestrator'),subagent:pick('subagent'),
             creative:pick('creative'),voice:pick('voice'),providers:(cat&&cat.providers)||[]};
  const byId={};
  [].concat(out.orchestrator,out.subagent,out.creative,out.voice,
            ORCHESTRATOR_MODELS,CREATIVE_MODELS,VOICE_MODELS)
    .forEach(m=>{if(m&&m.id&&!byId[m.id])byId[m.id]=m;});
  out.byId=byId;
  return out;
}
function DraftWS(){

  const[taskId,setTaskId]=useState(null);

  const[seedNote,setSeedNote]=useState('');
  const pollRef=useRef(null);

  // Deep-link from News "âœï¸ Draft": fetch the stored seed and pre-populate the
  // mode/prompt/context, or accept an inline prefill payload.
  const loadSeed=async(id)=>{try{const r=await fetch('/api/news/share-to-draft/'+encodeURIComponent(id));const d=await r.json();if(d.status==='ok'&&d.seed){const s=d.seed;setMode(s.mode||'linkedin_post');setPrompt(s.prompt||'');if(s.context){setContext(s.context);setShowCtx(true)}setSeedNote('Seeded from News: '+(s.article_title||s.article_url||'article'))}}catch(e){}};
  useNavTarget('draft',t=>{
    if(t.seedId){loadSeed(t.seedId);return}
    if(t.prefillPrompt){setMode(t.prefillMode||'freeform');setPrompt(t.prefillPrompt);if(t.prefillContext){setContext(t.prefillContext);setShowCtx(true)}if(t.seedNote)setSeedNote(t.seedNote)}
  });

  useEffect(()=>{
    if(!taskId)return;

      try{
        const r=await fetch('/api/tasks/'+taskId);
        const t=await r.json();
        if(t.status==='complete'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          const txt=t.result||'';
          setDraft(txt);setCharCount(txt.length);
          setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:txt,time:new Date().toLocaleTimeString()},...h].slice(0,20));
        }else if(t.status==='failed'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          setDraft('[Error] '+(t.result||'Generation failed'));
        }
      }catch(e){clearInterval(pollRef.current);setTaskId(null);setLoading(false);setDraft('[Error] '+e.message)}
    },1500);
    return()=>clearInterval(pollRef.current);
  },[taskId]);

  const generate=async()=>{
    if(!prompt.trim()||loading)return;
    setLoading(true);setCopied(false);setDraft('');
    try{
      const r=await fetch('/api/draft',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode,prompt,context:showCtx?context:''})});

        setLoading(false);
      }else{setDraft('[Error] '+(d.message||'Generation failed'));setLoading(false)}

  };

    if(!draft)return;
    setCopied(false);
    try{
      const r=await fetch('/api/draft/deploy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:draft,destination:dest})});
      const d=await r.json();
      if(d.status==='ok'&&dest==='clipboard'){setCopied(true);setTimeout(()=>setCopied(false),2000)}
    }catch(e){console.error('Deploy error:',e)}

      {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(mode===m.id?'':'btn-magenta')}
        style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setMode(m.id)}>
        {m.ico} {m.label}
      </button>)}
    </div>

    {/* Prompt input */}
    <textarea className="input" style={{width:'100%',height:60,resize:'vertical',marginBottom:8,fontFamily:'JetBrains Mono',fontSize:12}}
      value={prompt} onChange={e=>setPrompt(e.target.value)}

      placeholder={mode==='linkedin_post'?'Write a LinkedIn post about...':mode==='email_reply'?'Reply to this email saying...':mode==='tweet'?'Tweet about...':'Describe what to write...'}/>

    {/* Actions */}
    <div style={{display:'flex',gap:4,marginBottom:12}}>
      <button className="btn" onClick={generate} disabled={loading} style={{fontWeight:600}}>
        {loading?'Generating...':'Generate'}

// â•â•â• CAMERA MODE â•â•â•
// Source can be 'screen' | 'webcam' | 'both'. Captures a JPEG frame from each
// active stream every `intervalSec` seconds and stashes it on window.fridayCamera
// so chat sends and the Live-API bridge can pick it up.
function CameraMode({source,intervalSec,onClose,frameRef,setSendIndicator,facing,onChangeFacing}){
  const screenVideoRef=useRef(null);
  const webcamVideoRef=useRef(null);
  const screenStreamRef=useRef(null);
  const webcamStreamRef=useRef(null);
  const captureCanvasRef=useRef(null);
  const captureTimerRef=useRef(null);
  const[screenErr,setScreenErr]=useState('');
  const[webcamErr,setWebcamErr]=useState('');
  const[pos,setPos]=useState({x:window.innerWidth-180,y:window.innerHeight-160});
  const[dragging,setDragging]=useState(false);
  const dragOff=useRef({x:0,y:0});

  // Acquire / release streams whenever source or facing changes.
  // Cleanup only flips a cancellation flag; the body itself stops streams we
  // no longer want. Stopping all streams on every re-run would cause repeat
  // permission prompts when the user flips the front/rear webcam toggle.
  useEffect(()=>{
    let cancelled=false;
    const stopStream=(streamRef)=>{try{streamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){};streamRef.current=null};
    const wantScreen=source==='screen'||source==='both';
    const wantWebcam=source==='webcam'||source==='both';
    (async()=>{
      if(wantScreen&&!screenStreamRef.current){
        try{
          const s=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
          if(cancelled){s.getTracks().forEach(t=>t.stop());return}
          screenStreamRef.current=s;
          if(screenVideoRef.current){screenVideoRef.current.srcObject=s;screenVideoRef.current.play().catch(()=>{})}
          s.getVideoTracks()[0]?.addEventListener('ended',()=>{stopStream(screenStreamRef);if(!cancelled)onClose()});
          setScreenErr('');
        }catch(e){setScreenErr(e.name||'denied');if(source==='screen')onClose()}
      }
      if(!wantScreen&&screenStreamRef.current)stopStream(screenStreamRef);
      if(wantWebcam){
        const cur=webcamStreamRef.current;
        const curFacing=cur?.getVideoTracks?.()[0]?.getSettings?.()?.facingMode;
        if(!cur||(facing&&curFacing&&curFacing!==facing)){
          stopStream(webcamStreamRef);
          try{
            const constraints={video:facing?{facingMode:{ideal:facing}}:true,audio:false};
            const w=await navigator.mediaDevices.getUserMedia(constraints);
            if(cancelled){w.getTracks().forEach(t=>t.stop());return}
            webcamStreamRef.current=w;
            if(webcamVideoRef.current){webcamVideoRef.current.srcObject=w;webcamVideoRef.current.play().catch(()=>{})}
            setWebcamErr('');
          }catch(e){setWebcamErr(e.name||'denied');if(source==='webcam')onClose()}
        }
      }
      if(!wantWebcam&&webcamStreamRef.current)stopStream(webcamStreamRef);
    })();
    return()=>{cancelled=true};
  },[source,facing]);
  // Stop all streams on unmount.
  useEffect(()=>()=>{
    try{screenStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{webcamStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
  },[]);

  // Frame capture loop.
  useEffect(()=>{
    if(!captureCanvasRef.current)captureCanvasRef.current=document.createElement('canvas');
    const grab=(video)=>{
      if(!video||video.readyState<2||!video.videoWidth)return null;
      const c=captureCanvasRef.current;c.width=Math.min(640,video.videoWidth);c.height=Math.round(c.width*video.videoHeight/video.videoWidth);
      const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);
      try{return c.toDataURL('image/jpeg',0.7).split(',')[1]}catch(e){return null}
    };
    const tick=()=>{
      const screen=grab(screenVideoRef.current);
      const webcam=grab(webcamVideoRef.current);
      const primary=screen||webcam;
      if(primary){frameRef.current={screen,webcam,primary,ts:Date.now()};setSendIndicator(true);setTimeout(()=>setSendIndicator(false),400)}
    };
    const ms=Math.max(500,(intervalSec||3)*1000);
    captureTimerRef.current=setInterval(tick,ms);
    setTimeout(tick,400); // first frame quickly
    return()=>{if(captureTimerRef.current)clearInterval(captureTimerRef.current)};
  },[intervalSec,source,facing]);

  // Drag handlers â€” keep PiP inside the viewport.
  useEffect(()=>{if(!dragging)return;
    const mv=e=>setPos(p=>{const x=Math.max(4,Math.min(window.innerWidth-164,e.clientX-dragOff.current.x));const y=Math.max(44,Math.min(window.innerHeight-124,e.clientY-dragOff.current.y));return{x,y}});
    const up=()=>setDragging(false);
    addEventListener('mousemove',mv);addEventListener('mouseup',up);
    return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)};
  },[dragging]);

  const showScreen=source==='screen'||source==='both';
  const showWebcam=source==='webcam'||source==='both';
  const isBoth=source==='both';

  const pip=(refKey,label,err,extraStyle)=>(<div className={`camera-pip ${dragging?'dragging':''}`}
      style={{left:pos.x+extraStyle.dx,top:pos.y+extraStyle.dy,width:isBoth?120:160,height:isBoth?90:120}}
      onMouseDown={e=>{setDragging(true);dragOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}}>
    {refKey==='screen'?<video ref={screenVideoRef} muted playsInline/>:<video ref={webcamVideoRef} muted playsInline/>}
    <span className="cam-label">{label}</span>
    {refKey==='webcam'&&onChangeFacing&&<button className="cam-close" style={{right:30,padding:'1px 6px'}} title="Flip camera"
      onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onChangeFacing()}}>â‡„</button>}
    <button className="cam-close" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onClose()}} title="Stop camera">Ã—</button>
    <span className="cam-active"><span className="pulse"/>LIVE</span>
    {err&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',color:'#ff4d6a',fontSize:11,fontFamily:'JetBrains Mono'}}>{err}</div>}
  </div>);

  return(<>{showScreen&&pip('screen','SCREEN',screenErr,{dx:0,dy:0})}{showWebcam&&pip('webcam','WEBCAM',webcamErr,{dx:isBoth?-130:0,dy:0})}</>);
}

function fmtElapsed(sec){if(sec==null)return'0s';const s=Math.floor(sec);if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;if(m<60)return m+'m '+r+'s';const h=Math.floor(m/60);return h+'h '+(m%60)+'m'}

        {status==='completed_unverified'&&<><span style={{color:'#f59e0b',fontWeight:700}}>âš </span>UNVERIFIED</>}
        {status==='failed'&&<><span style={{color:'#ff0080',fontWeight:700}}>âœ•</span>FAILED</>}
      </span>
      <span className="task-card-elapsed">{fmtElapsed(task.elapsed)}</span>
