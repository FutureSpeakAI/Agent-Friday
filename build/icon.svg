<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060B19"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="60%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#4a0080"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(0,240,255,0.1)" stroke-width="1.5" filter="url(#softGlow)"/>

  <!-- Orbital ring 1 -->
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="none" stroke="rgba(0,240,255,0.2)" stroke-width="1" stroke-dasharray="8 4" transform="rotate(30, 256, 256)"/>

  <!-- Orbital ring 2 -->
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="none" stroke="rgba(138,43,226,0.15)" stroke-width="1" stroke-dasharray="6 6" transform="rotate(-20, 256, 256)"/>

  <!-- Central orb -->
  <circle cx="256" cy="256" r="70" fill="url(#orb)" filter="url(#glow)"/>

  <!-- Orb inner highlight -->
  <circle cx="240" cy="240" r="30" fill="rgba(255,255,255,0.15)"/>

  <!-- Stylized "F" letterform -->
  <g filter="url(#glow)">
    <text x="256" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#ffffff" opacity="0.95">F</text>
  </g>

  <!-- Small accent dots on ring -->
  <circle cx="396" cy="256" r="4" fill="#00f0ff" opacity="0.8"/>
  <circle cx="116" cy="256" r="3" fill="#8A2BE2" opacity="0.6"/>
  <circle cx="256" cy="116" r="3" fill="#00f0ff" opacity="0.5"/>
  <circle cx="256" cy="396" r="3" fill="#8A2BE2" opacity="0.4"/>
</svg>
