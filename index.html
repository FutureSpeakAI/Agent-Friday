const DRAFT_MODES=[
  {id:'linkedin_post',label:'LinkedIn',ico:'💼'},
  {id:'email_reply',label:'Email',ico:'📧'},
  {id:'slack_message',label:'Slack',ico:'💬'},
  {id:'tweet',label:'Tweet',ico:'🐦'},
  {id:'freeform',label:'Freeform',ico:'📝'},
];
// ═══ MODEL CATALOG ═══
// The model picker is driven entirely by the backend catalog (GET /api/models),
// which is built from the declarative ProviderRegistry + live Ollama detection.
// These const arrays are ONLY an offline fallback for when that fetch fails —
// keep them small and correct; the live catalog adds local + OpenAI + Gemini
// with availability. Nothing here is the source of truth.
const ORCHESTRATOR_MODELS=[
  {id:'claude-opus-4-8',label:'Claude Opus 4.8',short:'Opus 4.8'},
  {id:'claude-sonnet-4-6',label:'Claude Sonnet 4.6',short:'Sonnet 4.6'},
  {id:'claude-haiku-4-5-20251001',label:'Claude Haiku 4.5',short:'Haiku 4.5'},
  {id:'gpt-4o',label:'GPT-4o',short:'GPT-4o'},
  {id:'gpt-4o-mini',label:'GPT-4o mini',short:'4o-mini'},
  {id:'o3',label:'OpenAI o3',short:'o3'},
  {id:'gemini-2.5-pro',label:'Gemini 2.5 Pro',short:'Pro'},
];
const SUBAGENT_MODELS=ORCHESTRATOR_MODELS;
// Creative = image/video generation. Gemini 2.5 Flash (voice) and 2.5 Pro (text)
// deliberately do NOT appear here.
const CREATIVE_MODELS=[
  {id:'gemini-nano-banana-pro',label:'Gemini Nano Banana Pro (image)',short:'Nano BPro'},
  {id:'gemini-nano-banana-2',label:'Gemini Nano Banana 2 (image)',short:'Nano B2'},
  {id:'veo-3',label:'Google Veo (video)',short:'Veo'},
];
const VOICE_MODELS=[
  {id:'gemini-3.1-flash-live-preview',label:'Gemini 3.1 Flash Live Preview',short:'Gemini Live'},
  {id:'gemini-2.5-flash-native-audio-preview-12-2025',label:'Gemini 2.5 Flash Audio Preview',short:'Gemini 2.5'},
  {id:'gemini-2.5-flash',label:'Gemini 2.5 Flash',short:'Flash'},
];
const _MODEL_FALLBACK={orchestrator:ORCHESTRATOR_MODELS,subagent:SUBAGENT_MODELS,creative:CREATIVE_MODELS,voice:VOICE_MODELS};
// Fetch the catalog once, cache app-wide, and expose role lists + an id→meta map.
// Components call this and render selectors from it — no hardcoded model lists.
function useModelCatalog(){
  const[cat,setCat]=useState(window.__fridayModelCatalog||null);
  useEffect(()=>{
    if(window.__fridayModelCatalog){setCat(window.__fridayModelCatalog);return;}
    fetch('/api/models').then(r=>r.json()).then(d=>{
      if(d&&d.status==='ok'&&d.roles){window.__fridayModelCatalog=d;setCat(d);}
    }).catch(()=>{});
  },[]);
  const roles=(cat&&cat.roles)||{};
  const pick=r=>{const a=roles[r];return(a&&a.length)?a:(_MODEL_FALLBACK[r]||[]);};
  const out={loaded:!!cat,orchestrator:pick('orchestrator'),subagent:pick('subagent'),
             creative:pick('creative'),voice:pick('voice'),providers:(cat&&cat.providers)||[]};
  const byId={};
  [].concat(out.orchestrator,out.subagent,out.creative,out.voice,
            ORCHESTRATOR_MODELS,CREATIVE_MODELS,VOICE_MODELS)
    .forEach(m=>{if(m&&m.id&&!byId[m.id])byId[m.id]=m;});
  out.byId=byId;
  return out;
}
function DraftWS(){
  const[mode,setMode]=useState('freeform');
  const[prompt,setPrompt]=useState('');
  const[context,setContext]=useState('');
  const[showCtx,setShowCtx]=useState(false);
  const[draft,setDraft]=useState('');
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(false);
  const[history,setHistory]=useState([]);
  const[charCount,setCharCount]=useState(0);
  const[taskId,setTaskId]=useState(null);
  const[editing,setEditing]=useState(false);
  const[seedNote,setSeedNote]=useState('');
  const pollRef=useRef(null);

  // Deep-link from News "✍️ Draft": fetch the stored seed and pre-populate the
  // mode/prompt/context, or accept an inline prefill payload.
  const loadSeed=async(id)=>{try{const r=await fetch('/api/news/share-to-draft/'+encodeURIComponent(id));const d=await r.json();if(d.status==='ok'&&d.seed){const s=d.seed;setMode(s.mode||'linkedin_post');setPrompt(s.prompt||'');if(s.context){setContext(s.context);setShowCtx(true)}setSeedNote('Seeded from News: '+(s.article_title||s.article_url||'article'))}}catch(e){}};
  useNavTarget('draft',t=>{
    if(t.seedId){loadSeed(t.seedId);return}
    if(t.prefillPrompt){setMode(t.prefillMode||'freeform');setPrompt(t.prefillPrompt);if(t.prefillContext){setContext(t.prefillContext);setShowCtx(true)}if(t.seedNote)setSeedNote(t.seedNote)}
  });

  useEffect(()=>{
    if(!taskId)return;
    pollRef.current=setInterval(async()=>{
      try{
        const r=await fetch('/api/tasks/'+taskId);
        const t=await r.json();
        if(t.status==='complete'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          const txt=t.result||'';
          setDraft(txt);setCharCount(txt.length);
          setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:txt,time:new Date().toLocaleTimeString()},...h].slice(0,20));
        }else if(t.status==='failed'){
          clearInterval(pollRef.current);setTaskId(null);setLoading(false);
          setDraft('[Error] '+(t.result||'Generation failed'));
        }
      }catch(e){clearInterval(pollRef.current);setTaskId(null);setLoading(false);setDraft('[Error] '+e.message)}
    },1500);
    return()=>clearInterval(pollRef.current);
  },[taskId]);

  const generate=async()=>{
    if(!prompt.trim()||loading)return;
    setLoading(true);setCopied(false);setDraft('');
    try{
      const r=await fetch('/api/draft',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({mode,prompt,context:showCtx?context:''})});
      const d=await r.json();
      if(d.status==='queued'&&d.task_id){
        setTaskId(d.task_id);
      }else if(d.status==='ok'){
        setDraft(d.draft);setCharCount(d.char_count||d.draft.length);
        setHistory(h=>[{mode,prompt:prompt.substring(0,60),draft:d.draft,time:new Date().toLocaleTimeString()},...h].slice(0,20));
        setLoading(false);
      }else{setDraft('[Error] '+(d.message||'Generation failed'));setLoading(false)}
    }catch(e){setDraft('[Error] '+e.message);setLoading(false)}
  };

  const deploy=async(dest)=>{
    if(!draft)return;
    setCopied(false);
    try{
      const r=await fetch('/api/draft/deploy',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:draft,destination:dest})});
      const d=await r.json();
      if(d.status==='ok'&&dest==='clipboard'){setCopied(true);setTimeout(()=>setCopied(false),2000)}
    }catch(e){console.error('Deploy error:',e)}
  };

  return(<div>
    <FridaySays text="Draft engine ready. Pick a mode, describe what you need, and generate."/>
    {seedNote&&<div style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'#00d4ff',background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.18)',borderRadius:8,padding:'6px 10px',marginBottom:8}}><span>✍️ {seedNote}</span><button className="btn" style={{fontSize:10,padding:'1px 7px',marginLeft:'auto'}} onClick={()=>setSeedNote('')}>Dismiss</button></div>}
    {/* Mode selector */}
    <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
      {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(mode===m.id?'':'btn-magenta')}
        style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setMode(m.id)}>
        {m.ico} {m.label}
      </button>)}
    </div>

    {/* Prompt input */}
    <textarea className="input" style={{width:'100%',height:60,resize:'vertical',marginBottom:8,fontFamily:'JetBrains Mono',fontSize:12}}
      value={prompt} onChange={e=>setPrompt(e.target.value)}
      onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)generate()}}
      placeholder={mode==='linkedin_post'?'Write a LinkedIn post about...':mode==='email_reply'?'Reply to this email saying...':mode==='tweet'?'Tweet about...':'Describe what to write...'}/>

    {/* Context toggle */}
    <div style={{marginBottom:8}}>
      <button className="btn" style={{fontSize:11,padding:'2px 8px',marginRight:6}} onClick={()=>setShowCtx(!showCtx)}>
        {showCtx?'Hide Context':'+ Context'}
      </button>
      {showCtx&&<textarea className="input" style={{width:'100%',height:50,resize:'vertical',marginTop:4,fontSize:11}}
        value={context} onChange={e=>setContext(e.target.value)}
        placeholder="Paste the message you're replying to, or describe what you're looking at..."/>}
    </div>

    {/* Actions */}
    <div style={{display:'flex',gap:4,marginBottom:12}}>
      <button className="btn" onClick={generate} disabled={loading} style={{fontWeight:600}}>
        {loading?'Generating...':'Generate'}
      </button>
      {draft&&<button className="btn" onClick={generate} disabled={loading} style={{fontSize:11}}>Regenerate</button>}
    </div>

    {/* Draft output */}
    {draft&&<div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>DRAFT OUTPUT</span>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:mode==='tweet'&&charCount>280?'#ff0080':'#555'}}>
            {charCount} chars{mode==='tweet'&&charCount>280?' ⚠️ over limit':''}
          </span>
          <button className="btn" style={{fontSize:11,padding:'1px 6px'}} onClick={()=>setEditing(!editing)}>
            {editing?'Preview':'Edit'}
          </button>
        </div>
      </div>
      {editing
        ?<textarea className="input" style={{width:'100%',minHeight:120,resize:'vertical',fontFamily:'JetBrains Mono',fontSize:12,lineHeight:1.6,color:'#e0e0e8'}}
            value={draft} onChange={e=>{setDraft(e.target.value);setCharCount(e.target.value.length)}}/>
        :<DraftPreview text={draft}/>
      }
      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
        <button className="btn" onClick={()=>deploy('clipboard')} style={{fontWeight:600}}>
          {copied?'✓ Copied!':'📋 Copy'}
        </button>
        <button className="btn" onClick={()=>openDraftTab(draft,mode,prompt)} style={{fontSize:11}}>
          🔗 New Tab
        </button>
        <button className="btn btn-magenta" onClick={()=>deploy('gmail_draft')} style={{fontSize:11}}>
          📧 Gmail
        </button>
      </div>
    </div>}

    {/* History */}
    {history.length>0&&<div>
      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#999',marginBottom:6}}>RECENT DRAFTS</div>
      {history.map((h,i)=><div key={i} className="card" style={{marginBottom:4,cursor:'pointer',padding:'6px 10px'}}
        onClick={()=>{setDraft(h.draft);setCharCount(h.draft.length);setMode(h.mode)}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
          <span style={{color:'#aaa'}}>{DRAFT_MODES.find(m=>m.id===h.mode)?.ico||'📝'} {h.prompt}...</span>
          <span style={{color:'#999'}}>{h.time}</span>
        </div>
      </div>)}
    </div>}
  </div>);
}

function FinanceWS(){

  ]).then(()=>setLoading(false))},[]);
  const copyText=(t)=>{navigator.clipboard.writeText(t)};

// ═══ CAMERA MODE ═══
// Source can be 'screen' | 'webcam' | 'both'. Captures a JPEG frame from each
// active stream every `intervalSec` seconds and stashes it on window.fridayCamera
// so chat sends and the Live-API bridge can pick it up.
function CameraMode({source,intervalSec,onClose,frameRef,setSendIndicator,facing,onChangeFacing}){
  const screenVideoRef=useRef(null);
  const webcamVideoRef=useRef(null);
  const screenStreamRef=useRef(null);
  const webcamStreamRef=useRef(null);
  const captureCanvasRef=useRef(null);
  const captureTimerRef=useRef(null);
  const[screenErr,setScreenErr]=useState('');
  const[webcamErr,setWebcamErr]=useState('');
  const[pos,setPos]=useState({x:window.innerWidth-180,y:window.innerHeight-160});
  const[dragging,setDragging]=useState(false);
  const dragOff=useRef({x:0,y:0});

  // Acquire / release streams whenever source or facing changes.
  // Cleanup only flips a cancellation flag; the body itself stops streams we
  // no longer want. Stopping all streams on every re-run would cause repeat
  // permission prompts when the user flips the front/rear webcam toggle.
  useEffect(()=>{
    let cancelled=false;
    const stopStream=(streamRef)=>{try{streamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){};streamRef.current=null};
    const wantScreen=source==='screen'||source==='both';
    const wantWebcam=source==='webcam'||source==='both';
    (async()=>{
      if(wantScreen&&!screenStreamRef.current){
        try{
          const s=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:false});
          if(cancelled){s.getTracks().forEach(t=>t.stop());return}
          screenStreamRef.current=s;
          if(screenVideoRef.current){screenVideoRef.current.srcObject=s;screenVideoRef.current.play().catch(()=>{})}
          s.getVideoTracks()[0]?.addEventListener('ended',()=>{stopStream(screenStreamRef);if(!cancelled)onClose()});
          setScreenErr('');
        }catch(e){setScreenErr(e.name||'denied');if(source==='screen')onClose()}
      }
      if(!wantScreen&&screenStreamRef.current)stopStream(screenStreamRef);
      if(wantWebcam){
        const cur=webcamStreamRef.current;
        const curFacing=cur?.getVideoTracks?.()[0]?.getSettings?.()?.facingMode;
        if(!cur||(facing&&curFacing&&curFacing!==facing)){
          stopStream(webcamStreamRef);
          try{
            const constraints={video:facing?{facingMode:{ideal:facing}}:true,audio:false};
            const w=await navigator.mediaDevices.getUserMedia(constraints);
            if(cancelled){w.getTracks().forEach(t=>t.stop());return}
            webcamStreamRef.current=w;
            if(webcamVideoRef.current){webcamVideoRef.current.srcObject=w;webcamVideoRef.current.play().catch(()=>{})}
            setWebcamErr('');
          }catch(e){setWebcamErr(e.name||'denied');if(source==='webcam')onClose()}
        }
      }
      if(!wantWebcam&&webcamStreamRef.current)stopStream(webcamStreamRef);
    })();
    return()=>{cancelled=true};
  },[source,facing]);
  // Stop all streams on unmount.
  useEffect(()=>()=>{
    try{screenStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{webcamStreamRef.current?.getTracks().forEach(t=>t.stop())}catch(e){}
  },[]);

  // Frame capture loop.
  useEffect(()=>{
    if(!captureCanvasRef.current)captureCanvasRef.current=document.createElement('canvas');
    const grab=(video)=>{
      if(!video||video.readyState<2||!video.videoWidth)return null;
      const c=captureCanvasRef.current;c.width=Math.min(640,video.videoWidth);c.height=Math.round(c.width*video.videoHeight/video.videoWidth);
      const ctx=c.getContext('2d');ctx.drawImage(video,0,0,c.width,c.height);
      try{return c.toDataURL('image/jpeg',0.7).split(',')[1]}catch(e){return null}
    };
    const tick=()=>{
      const screen=grab(screenVideoRef.current);
      const webcam=grab(webcamVideoRef.current);
      const primary=screen||webcam;
      if(primary){frameRef.current={screen,webcam,primary,ts:Date.now()};setSendIndicator(true);setTimeout(()=>setSendIndicator(false),400)}
    };
    const ms=Math.max(500,(intervalSec||3)*1000);
    captureTimerRef.current=setInterval(tick,ms);
    setTimeout(tick,400); // first frame quickly
    return()=>{if(captureTimerRef.current)clearInterval(captureTimerRef.current)};
  },[intervalSec,source,facing]);

  // Drag handlers — keep PiP inside the viewport.
  useEffect(()=>{if(!dragging)return;
    const mv=e=>setPos(p=>{const x=Math.max(4,Math.min(window.innerWidth-164,e.clientX-dragOff.current.x));const y=Math.max(44,Math.min(window.innerHeight-124,e.clientY-dragOff.current.y));return{x,y}});
    const up=()=>setDragging(false);
    addEventListener('mousemove',mv);addEventListener('mouseup',up);
    return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)};
  },[dragging]);

  const showScreen=source==='screen'||source==='both';
  const showWebcam=source==='webcam'||source==='both';
  const isBoth=source==='both';

  const pip=(refKey,label,err,extraStyle)=>(<div className={`camera-pip ${dragging?'dragging':''}`}
      style={{left:pos.x+extraStyle.dx,top:pos.y+extraStyle.dy,width:isBoth?120:160,height:isBoth?90:120}}
      onMouseDown={e=>{setDragging(true);dragOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}}>
    {refKey==='screen'?<video ref={screenVideoRef} muted playsInline/>:<video ref={webcamVideoRef} muted playsInline/>}
    <span className="cam-label">{label}</span>
    {refKey==='webcam'&&onChangeFacing&&<button className="cam-close" style={{right:30,padding:'1px 6px'}} title="Flip camera"
      onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onChangeFacing()}}>⇄</button>}
    <button className="cam-close" onMouseDown={e=>e.stopPropagation()} onClick={e=>{e.stopPropagation();onClose()}} title="Stop camera">×</button>
    <span className="cam-active"><span className="pulse"/>LIVE</span>
    {err&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.7)',color:'#ff4d6a',fontSize:11,fontFamily:'JetBrains Mono'}}>{err}</div>}
  </div>);

  return(<>{showScreen&&pip('screen','SCREEN',screenErr,{dx:0,dy:0})}{showWebcam&&pip('webcam','WEBCAM',webcamErr,{dx:isBoth?-130:0,dy:0})}</>);
}

// ═══ TASK TRAY (background task runner UI) ═══
function fmtElapsed(sec){if(sec==null)return'0s';const s=Math.floor(sec);if(s<60)return s+'s';const m=Math.floor(s/60);const r=s%60;if(m<60)return m+'m '+r+'s';const h=Math.floor(m/60);return h+'h '+(m%60)+'m'}
function TaskCard({task,expanded,onToggle,onCancel,onView}){
  const status=task.status||'running';
  return(<div className={'task-card '+status}>
    <div className="task-card-edge"/>
    <div className="task-card-row">
      <div style={{flex:1,minWidth:0,cursor:'pointer'}}
        role="button" tabIndex={0}
        onClick={onToggle}
        onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onToggle()}}}
        title={expanded?'Click to collapse':'Click to expand log'}
        aria-expanded={expanded}>
        <div className="task-card-title">{task.name||'Task'}</div>
        {task.description&&<div className="task-card-sub">{task.description}</div>}
      </div>
      <div className="task-card-actions">
        <button className="task-card-btn" onClick={e=>{e.stopPropagation();onToggle()}} title={expanded?'Collapse':'Expand'} aria-label={expanded?'Collapse task log':'Expand task log'}>{expanded?'▾':'▸'}</button>
        {status==='running'&&<button className="task-card-btn cancel" onClick={e=>{e.stopPropagation();onCancel()}} title="Cancel" aria-label="Cancel task">✕</button>}
      </div>
    </div>
    <div className="task-card-meta">
      <span className="task-card-status">
        {status==='running'&&<><span className="task-card-spinner"/>EXECUTING</>}
        {status==='complete'&&<><span className="task-card-check">✓</span>COMPLETE{task.evaluation&&<span style={{marginLeft:6,fontSize:'0.75em',opacity:0.7}}>{(task.evaluation.match(/GRADE:\s*(\w+)/)||[])[1]||''}</span>}</>}
        {status==='completed_unverified'&&<><span style={{color:'#f59e0b',fontWeight:700}}>⚠</span>UNVERIFIED</>}
        {status==='failed'&&<><span style={{color:'#ff0080',fontWeight:700}}>✕</span>FAILED</>}
      </span>
      <span className="task-card-elapsed">{fmtElapsed(task.elapsed)}</span>
    </div>
    {(status==='complete'||status==='completed_unverified')&&<div style={{marginTop:6,display:'flex',gap:4}}>
      <button className="task-card-btn results" onClick={e=>{e.stopPropagation();onView()}}>View Results</button>
    </div>}
    {expanded&&<div className="task-card-log">
      {(task.log||[]).length===0?<div className="task-card-log-line" style={{color:'#888'}}>— waiting for activity —</div>:
        (task.log||[]).slice(-30).map((line,i)=><div key={i} className="task-card-log-line">→ {line}</div>)}
    </div>}
  </div>);
}
function TaskTray({tasks,onCancel,onView}){
  const[expanded,setExpanded]=useState({});
  const[collapsed,setCollapsed]=useState(false);
  const sorted=[...tasks].sort((a,b)=>(b.created||0)-(a.created||0));
  const running=sorted.filter(t=>(t.status||'running')==='running').length;
  const total=sorted.length;
  if(total===0)return null;
  if(collapsed){
    return(<div className="task-tray-pill" onClick={()=>setCollapsed(false)}>
      {running>0?<><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#f59e0b',marginRight:6,verticalAlign:'middle',boxShadow:'0 0 5px rgba(245,158,11,0.7)'}}/>{running} task{running===1?'':'s'} running</>:total+' task'+(total===1?'':'s')}
    </div>);
  }
  return(<div className="task-tray">
    <div className="task-tray-header">
      <span>{running>0?`${running}/${total} TASKS · LIVE`:`${total} TASKS`}</span>
      <button className="task-card-btn" style={{padding:'1px 6px'}} onClick={()=>setCollapsed(true)} title="Collapse">_</button>
    </div>
    {sorted.slice(0,8).map(t=><TaskCard key={t.task_id} task={t}
      expanded={!!expanded[t.task_id]}
      onToggle={()=>setExpanded(e=>({...e,[t.task_id]:!e[t.task_id]}))}
      onCancel={()=>onCancel(t.task_id)}
      onView={()=>onView(t)}/>)}
  </div>);
}

  {id:'welcome',title:'Welcome to Agent Friday',subtitle:"I'm Agent Friday. Let's get you set up."},
  {id:'profile',title:'Choose Your Profile',subtitle:'A starting point tuned to how you work'},
  {id:'providers',title:'Connect AI Providers',subtitle:'Bring your own key — one is enough to go live'},
  {id:'services',title:'Connect Services',subtitle:'Optional — Google and one-click connectors'},
  {id:'hardware',title:'Hardware Check',subtitle:'What this machine can run on-device'},
  {id:'done',title:'Ready to Launch',subtitle:'Your agent is configured'},

function SetupWizard({step,data,onChange,onNext,onBack,onComplete}){
  const s=WIZARD_STEPS[step];

  },[]);
  const refreshHealth=React.useCallback(()=>{
    fetch('/api/providers/health').then(r=>r.json()).then(d=>{const m={};(d.providers||[]).forEach(p=>{m[p.provider]=p});setPhealth(m)}).catch(()=>{});
  },[]);
  React.useEffect(()=>{if(step===2)refreshHealth();},[step,refreshHealth]);
  React.useEffect(()=>{if(step===4&&!hw)fetch('/api/health/full').then(r=>r.json()).then(d=>setHw(d.hardware||{})).catch(()=>setHw({}));},[step,hw]);
  // What each provider unlocks (from the capability router), grouped by provider.
  const unlockBy=React.useMemo(()=>{const m={};(caps||[]).forEach(c=>{if(c.provider){(m[c.provider]=m[c.provider]||[]).push(c.label)}});return m;},[caps]);
  const provList=(_mc.providers||[]);
  const setProvKey=(name,val)=>{const next={...(data.providers||{})};next[name]={...(next[name]||{}),api_key:val};onChange({providers:next});};

  const providersReady=enteredCount>0||provList.some(p=>p.available);
  const gateOk=step!==2||providersReady;

  return(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(4,4,12,0.97)',backdropFilter:'blur(20px)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Inter'}}>
      {/* Ambient glow */}
      <div style={{position:'absolute',top:'20%',left:'50%',transform:'translateX(-50%)',width:600,height:300,background:'radial-gradient(ellipse,rgba(124,58,237,0.12) 0%,transparent 70%)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',bottom:'25%',left:'50%',transform:'translateX(-50%)',width:400,height:200,background:'radial-gradient(ellipse,rgba(0,212,255,0.07) 0%,transparent 70%)',pointerEvents:'none'}}/>

        <div style={{fontFamily:'Orbitron',fontSize:28,fontWeight:900,color:'#fff',letterSpacing:'0.04em',marginBottom:6,lineHeight:1.1}}>{s.title}</div>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.45)',marginBottom:36,letterSpacing:'0.01em'}}>{s.subtitle}</div>

        {step===0&&(
          <div>
            <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginBottom:10,letterSpacing:'.05em',fontFamily:'JetBrains Mono'}}>NAME YOUR INSTANCE</div>
            <input

              onChange={e=>onChange({agent_name:e.target.value})}

              autoFocus
              style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(0,212,255,0.25)',borderRadius:8,padding:'14px 18px',color:'#fff',fontFamily:'Orbitron',fontSize:18,fontWeight:700,letterSpacing:'0.06em',outline:'none',boxSizing:'border-box',transition:'border-color .2s'}}
              onFocus={e=>e.target.style.borderColor='rgba(0,212,255,0.6)'}

            <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',margin:'22px 0 10px',letterSpacing:'.05em',fontFamily:'JetBrains Mono'}}>PERSONALITY</div>

        {step===1&&(

              const unlocks=(unlockBy[p.name]||[]);
              return(

                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ddd'}}>{p.label||p.name}</div>

                  {unlocks.length>0&&<div style={{fontSize:10,color:'rgba(0,212,255,0.55)',marginTop:3,fontFamily:'JetBrains Mono'}}>unlocks: {unlocks.join(' · ')}</div>}
                  {local
                    ?<div style={{fontSize:10,color:'rgba(255,255,255,0.35)',marginTop:6,fontFamily:'JetBrains Mono'}}>On-device · no key needed{p.available?' · running now':' · start Ollama to enable'}</div>
                    :<div style={{position:'relative',marginTop:8}}>
                      <input type={showKey[p.name]?'text':'password'} value={keyOf(p.name)}
                        onChange={e=>setProvKey(p.name,e.target.value)/* pragma: allowlist secret */}
                        placeholder={'API key for '+(p.label||p.name)}
                        style={{width:'100%',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(0,212,255,0.2)',borderRadius:6,padding:'9px 50px 9px 12px',color:'#fff',fontFamily:'JetBrains Mono',fontSize:12,outline:'none',boxSizing:'border-box'}}/>

            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.22)',fontFamily:'JetBrains Mono',lineHeight:1.6}}>Keys are encrypted at rest on your machine — never stored in plaintext, never sent anywhere except to that provider.</div>
          </div>
        )}

        {step===3&&(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{padding:'14px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
              <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ddd'}}>Google · Gmail, Calendar & Drive</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:5,lineHeight:1.5}}>Connect one or more Google accounts so Friday can read mail, manage your calendar and reach your files. Secure OAuth — tokens are encrypted at rest.</div>
              <div style={{fontSize:10,color:'rgba(0,212,255,0.55)',marginTop:8,fontFamily:'JetBrains Mono'}}>Set up in Settings → Connected Services after launch.</div>
            </div>
            <div style={{padding:'14px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
              <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ddd'}}>MCP Connectors</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:5,lineHeight:1.5}}>Slack, Notion, GitHub and hundreds more connect over MCP — one click each, governed by Friday's security rings.</div>
              <div style={{fontSize:10,color:'rgba(0,212,255,0.55)',marginTop:8,fontFamily:'JetBrains Mono'}}>Manage in Settings → Connected Services.</div>
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',fontFamily:'JetBrains Mono'}}>This step is optional — Continue to skip for now.</div>
          </div>
        )}

        {step===4&&(
          <div>
            {!hw&&<div style={{fontSize:12,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono'}}>Detecting hardware…</div>}
            {hw&&(
              <div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
                  <div style={{padding:'12px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono'}}>GPU</div>
                    <div style={{fontSize:12,color:hw.gpu?'#34d399':'rgba(255,255,255,0.5)',marginTop:4}}>{hw.gpu||'None detected'}</div>
                  </div>
                  <div style={{padding:'12px',borderRadius:8,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.02)'}}>
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',fontFamily:'JetBrains Mono'}}>MEMORY</div>
                    <div style={{fontSize:12,color:'#ddd',marginTop:4}}>{hw.ram_gb?hw.ram_gb+' GB RAM':'—'}{hw.vram_gb?' · '+hw.vram_gb+' GB VRAM':''}</div>
                  </div>
                </div>
                {(hw.suggested_models&&hw.suggested_models.length)?(
                  <div>
                    <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',fontFamily:'JetBrains Mono',marginBottom:8}}>SUGGESTED LOCAL MODELS</div>
                    {hw.suggested_models.map(m=>(
                      <div key={m.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:6,background:'rgba(255,255,255,0.02)',marginBottom:6}}>
                        <span style={{fontFamily:'JetBrains Mono',fontSize:12,color:'#00d4ff'}}>{m.name}</span>
                        <span style={{fontSize:10,color:'rgba(255,255,255,0.4)',textAlign:'right'}}>{m.task}</span>
                      </div>
                    ))}
                    <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',fontFamily:'JetBrains Mono',marginTop:6}}>Ollama {hw.ollama_available?'is running — these are ready to pull':'is not installed — add it to run these on-device'}.</div>
                  </div>
                ):(
                  <div style={{fontSize:12,color:'rgba(255,255,255,0.45)',lineHeight:1.6}}>This machine will run Friday in <span style={{color:'#00d4ff'}}>cloud mode</span> using your connected provider(s). On-device models want more RAM/VRAM — you can always add Ollama later.</div>
                )}
              </div>
            )}
          </div>
        )}

        {step===5&&(
          <div style={{textAlign:'center',padding:'14px 0'}}>
            <div style={{fontSize:64,marginBottom:18,filter:'drop-shadow(0 0 20px rgba(0,212,255,0.4))'}}>⚡</div>
            <div style={{fontFamily:'Orbitron',fontSize:20,color:'#00d4ff',marginBottom:12,letterSpacing:'0.06em'}}>{data.agent_name||'AGENT FRIDAY'}</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.5)',lineHeight:1.7,maxWidth:360,margin:'0 auto'}}>
              Profile <span style={{color:'#00d4ff',fontFamily:'JetBrains Mono',textTransform:'capitalize'}}>{data.distribution||'default'}</span> · Style <span style={{color:'rgba(255,255,255,0.7)'}}>{data.communication_style}</span><br/>
              {enteredCount>0
                ?<span style={{color:'rgba(52,211,153,0.9)'}}>✓ {enteredCount} provider{enteredCount>1?'s':''} connected</span>
                :<span style={{color:'rgba(245,158,11,0.9)'}}>Demo mode — connect a provider anytime in Settings</span>}
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',marginTop:20,fontFamily:'JetBrains Mono',letterSpacing:'.05em'}}>
              BY FUTURESPEAK.AI · ASIMOV'S CLAWS CERTIFIED
            </div>
          </div>
        )}

        {/* Navigation */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:40}}>
          {step>0
            ?<button onClick={onBack} style={{background:'none',border:'1px solid rgba(255,255,255,0.12)',borderRadius:8,padding:'12px 24px',color:'rgba(255,255,255,0.5)',fontFamily:'JetBrains Mono',fontSize:12,cursor:'pointer',letterSpacing:'.05em',transition:'all .15s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(255,255,255,0.3)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,255,255,0.12)'}>
              ← Back
            </button>
            :<div/>
          }
          <button
            onClick={()=>{ if(isLast){onComplete()} else if(gateOk){onNext()} }}
            style={{background:'linear-gradient(135deg,rgba(124,58,237,0.4),rgba(0,212,255,0.3))',border:'1px solid rgba(0,212,255,0.4)',borderRadius:8,padding:'12px 32px',color:'#fff',fontFamily:'Orbitron',fontSize:12,fontWeight:700,cursor:gateOk?'pointer':'not-allowed',opacity:gateOk?1:0.4,letterSpacing:'.08em',transition:'all .2s',boxShadow:'0 0 20px rgba(0,212,255,0.15)'}}
            onMouseEnter={e=>{if(!gateOk)return;e.currentTarget.style.boxShadow='0 0 30px rgba(0,212,255,0.3)';e.currentTarget.style.borderColor='rgba(0,212,255,0.7)'}}

            {isLast?'LAUNCH FRIDAY →':'Continue →'}
          </button>
        </div>

        {/* Skip link */}
        {!isLast&&(
          <div style={{textAlign:'center',marginTop:16}}>
            <span onClick={onComplete} style={{fontSize:11,color:'rgba(255,255,255,0.2)',cursor:'pointer',fontFamily:'JetBrains Mono',letterSpacing:'.05em',textDecoration:'underline',textDecorationColor:'rgba(255,255,255,0.1)'}}
              onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.4)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.2)'}>
              skip setup
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const[openWins,setOpenWins]=useState(new Set());
  const[focusWin,setFocusWin]=useState(null);
  // Workspace Studio: which workspace's contextual chat is open, + the live
  // customization map shared down to every FWin via WsCustomCtx.
  const[wsChat,setWsChat]=useState(null);          // {wsId,label,emoji,seed} | null
  const[wsCustMap,setWsCustMap]=useState({});      // wsId -> customization patch
  const setCust=useCallback((id,patch)=>setWsCustMap(m=>({...m,[id]:patch||{}})),[]);
  const[zMap,setZMap]=useState({});const[zC,setZC]=useState(42);
  const[chatOpen,setChatOpen]=useState(false);const[chatMsgs,setChatMsgs]=useState([]);const[chatIn,setChatIn]=useState('');const[chatLoad,setChatLoad]=useState(false);
  // ── Resizable chat panel ── drag the left edge for width, the top edge for
  // height. Clamped to 300–80vw × 200–80vh, persisted across sessions.
  const CHAT_MINW=300,CHAT_MINH=200;
  // Guard against a transient 0 viewport (early mount / headless) collapsing the panel.
  const vw=()=>window.innerWidth||document.documentElement.clientWidth||1280;
  const vh=()=>window.innerHeight||document.documentElement.clientHeight||800;
  const clampChatW=(w)=>Math.max(CHAT_MINW,Math.min(Math.round(vw()*0.8),w));
  const clampChatH=(h)=>Math.max(CHAT_MINH,Math.min(Math.round(vh()*0.8),h));
  const[chatW,setChatW]=useState(()=>{try{const v=parseInt(localStorage.getItem('friday_chat_w'),10);return v?clampChatW(v):320}catch(_){return 320}});
  const[chatH,setChatH]=useState(()=>{try{const v=parseInt(localStorage.getItem('friday_chat_h'),10);return v?clampChatH(v):0}catch(_){return 0}});// 0 = auto (full height between top & dock)
  const[chatResize,setChatResize]=useState(null);// 'w' | 'h' | null
  const chatRStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!chatResize)return;
    // width: panel is right-anchored, so dragging the left edge LEFT (smaller clientX) grows it.
    // height: panel is bottom-anchored, so dragging the top edge UP (smaller clientY) grows it.
    const mv=e=>{if(chatResize==='w'){setChatW(clampChatW(chatRStart.current.w+(chatRStart.current.x-e.clientX)))}else{setChatH(clampChatH(chatRStart.current.h+(chatRStart.current.y-e.clientY)))}};

  useEffect(()=>{window.fridayCamera={latestFrame:()=>cameraFrameRef.current,isOn:()=>cameraOn,source:()=>cameraSource,intervalSec:()=>cameraIntervalSec}},[cameraOn,cameraSource,cameraIntervalSec]);
  // Global workspace opener — lets any child component (e.g. NewsWS "Share to
  // Draft") open + deep-link a workspace without prop-drilling openWs.
  useEffect(()=>{window.fridayOpenWorkspace=(t)=>{if(!t||!t.workspace)return;openWs(t.workspace);fridayNavigate(t)};return()=>{if(window.fridayOpenWorkspace)delete window.fridayOpenWorkspace}},[]);
  // Global Workspace Studio opener — the 💬 button on any window (and custom

  useEffect(()=>{fetch('/api/workspace/customizations').then(r=>r.json()).then(d=>{if(d&&d.customizations)setWsCustMap(d.customizations)}).catch(()=>{})},[]);
  // Global voice bridge — lets any child component (e.g. NewsWS "Listen to

  // chat panel, then either fires the briefing script immediately (session
  // already live) or queues it for ws.onopen and starts the session.

    window.fridayVoice={
      isOn:()=>voiceOn,
      stop:()=>voiceStopRef.current?.(),
      sendText:(t)=>{const v=voiceRef.current;if(t&&v&&v.ws&&v.ws.readyState===WebSocket.OPEN){try{v.ws.send(JSON.stringify({type:'text',text:t}));return true}catch(_){}}return false;},
      startAnchor:({prompt,sourcesMd})=>{
        if(!prompt)return;
        if(sourcesMd){const stamp=new Date().toLocaleTimeString();setChatMsgs(p=>[...p,{role:'friday',text:sourcesMd,time:stamp}]);}
        setChatOpen(true);
        const v=voiceRef.current;
        if(voiceOn&&v&&v.ws&&v.ws.readyState===WebSocket.OPEN){
          try{v.ws.send(JSON.stringify({type:'text',text:prompt}))}catch(_){}
        }else{
          voicePendingTextRef.current=prompt;
          voiceStartRef.current?.();
        }
      },
    };
    return()=>{if(window.fridayVoice)delete window.fridayVoice};
  },[voiceOn]);
  // Broadcast live-session on/off so child components (NewsWS anchor indicator)

  const toggleCamera=()=>{if(cameraOn){setCameraOn(false);setCameraControlsOpen(false);cameraFrameRef.current=null}else{setCameraOn(true);setCameraControlsOpen(true)}};

  const sendChat=async(overrideMsg)=>{const m=(overrideMsg||chatIn).trim();if(!m)return;setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m,time:new Date().toLocaleTimeString()}]);setChatLoad(true);
    try{
      const body={message:m,voice_mode:voiceOn,cite_sources:!!agentSettings.cite_sources};
      if(focusWin)body.workspace=focusWin;
      const frame=cameraOn?cameraFrameRef.current?.primary:null;
      if(frame)body.image=frame;
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const d=await r.json();
      setChatMsgs(p=>[...p,{role:'friday',text:d.response,time:new Date().toLocaleTimeString()}]);
      // Execute any structured actions Friday returned (navigate, open_path…).
      // This is the chatbot→agent bridge: text AND a real on-screen/OS move.
      fridayRunActions(d.actions);
    }catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Connection error]',time:new Date().toLocaleTimeString()}])}
    setChatLoad(false)
  };
  const sendPrompt=()=>{if(!promptText.trim())return;setChatOpen(true);sendChat(promptText);setPromptText('')};
  // Source Production System — "📎 Cite Sources" toggle persists through settings;

  const showSources=async()=>{

      const r=await fetch('/api/sources/dossier/current');

      const md=d.markdown||('[Dossier error] '+(d.error||'no sources'));
      setChatMsgs(p=>[...p,{role:'friday',text:md,time:new Date().toLocaleTimeString()}]);
    }catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Could not generate source dossier]',time:new Date().toLocaleTimeString()}])}
    setChatLoad(false);
  };

  // Existing installs see the full FutureSpeak business pipeline under "Sites";
  // fresh installs (show_all_workspaces=false) get the trimmed general-purpose
  // SitesWS portfolio manager instead.
  const showAllWorkspaces=agentSettings.show_all_workspaces!==false;
  const wsMap={home:<HomeWS/>,career:<CareerWS/>,wiki:<WikiWS/>,futurespeak:showAllWorkspaces?<FuturespeakWS/>:<SitesWS/>,family:<FamilyWS/>,studio:<StudioWS/>,trust:<TrustWS/>,system:<SystemWS/>,code:<CodeWS/>,news:<NewsWS/>,draft:<DraftWS/>,finance:<FinanceWS/>,health:<HealthWS/>,contacts:<ContactsWS/>,content:<ContentWS/>,messages:<MessagesWS/>,calendar:<CalendarWS/>,marketplace:<MarketplaceWS/>};
  const wsInfo=WS.reduce((a,w)=>{a[w.id]=w;return a},{});
  const unread=notifs.filter(n=>!n.read).length;
  const runningTaskCount=bgTasks.filter(t=>(t.status||'running')==='running').length;
  const bellBadgeCount=runningTaskCount>0?runningTaskCount:unread;
  const sortedBgTasks=[...bgTasks].sort((a,b)=>(b.created||0)-(a.created||0));

  const structures=window.fridayVibe?.getStructures?.()??[];

  return(<WsCustomCtx.Provider value={{map:wsCustMap,setCust}}>

          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'rgba(255,255,255,0.72)',letterSpacing:'0.04em',marginLeft:4,textShadow:'0 0 6px rgba(0,0,0,0.8)'}}>by</span>

            onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,212,255,0.45)'}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,212,255,0.18)'}}

          </button>
          {modelMenuOpen&&<div style={{position:'absolute',top:'calc(100% + 6px)',left:0,width:360,background:'rgba(10,14,26,0.85)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:10,zIndex:200,padding:'6px 0',boxShadow:'0 4px 30px rgba(0,0,0,0.4)',fontFamily:'Inter',fontSize:11,maxHeight:'70vh',overflowY:'auto'}}>

              <div style={{padding:'2px 12px 6px'}}>
                {ollamaStatus.models.map(m=>{

                  return(
                  <div key={m.name} onClick={()=>setLocalModel(m.name)} title={active?'Default local model':'Click to set as default local model'}
                    className="model-option-local" style={{padding:'4px 6px',margin:'1px 0',borderRadius:6,cursor:'pointer',
                      background:active?'rgba(0,255,128,0.10)':'transparent',
                      borderBottom:'1px solid rgba(255,255,255,0.03)'}}>

      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>{clock.toLocaleTimeString('en-US',{hour12:false})}</span>

          style={{background:'none',border:'none',color:cameraOn?'#00d4ff':'#bbb',cursor:'pointer',fontSize:14,filter:cameraOn?'drop-shadow(0 0 6px rgba(0,212,255,0.6))':'none'}}

          const key=n.id||`n_${i}`;
          const isExpanded=!!notifCardExpanded[`notif_${key}`];
          const hasDetail=!!(n.detail||n.body||(n.message&&n.title&&n.message!==n.title));
          // Resolve a deep-link target from the notification's `target` field,
          // falling back to legacy shapes (actions[].workspace / n.workspace / n.url)
          // so older queued notifications still navigate.
          const tgt=(n.target&&(n.target.workspace||n.target.url))?n.target
            :(Array.isArray(n.actions)&&n.actions[0]&&n.actions[0].workspace?{workspace:n.actions[0].workspace}
            :(n.workspace?{workspace:n.workspace}:(n.url?{url:n.url}:null)));
          // Navigate to the target: switch + deep-link the workspace, dismiss the
          // notification, and close the panel.
          const openTarget=()=>{
            if(!tgt)return;
            if(n.id){markNotifRead(n.id);clearNotif(n.id);}
            setNotifOpen(false);
            if(tgt.url&&!tgt.workspace){window.open(tgt.url,'_blank');return;}
            if(tgt.workspace){openWs(tgt.workspace);fridayNavigate(tgt);}
          };
          // Actionable creation notifications carry the produced filename + folder
          // so we can render "Open Document" (renders inside Friday's Studio) and
          // "Open Folder" (opens the folder on the machine via /api/computer/open).
          const creation=(n.meta&&n.meta.creation)||(n.target&&n.target.creation)||null;
          const creationFolder=(n.meta&&n.meta.folder)||null;
          // A daily-creation notification may predate the meta.creation field (or its
          // companion file); fall back to the title/date so the button still deep-links
          // and Studio resolves the matching file from the gallery.
          const creationTitle=(n.meta&&n.meta.title)||null;
          const creationDate=(n.meta&&n.meta.date)||null;
          const isCreationNotif=!!creation||(((n.kind==='creation')||(n.source==='daily-creation'))&&!!(creationTitle||creationDate));
          const openCreationDoc=()=>{if(n.id){markNotifRead(n.id);clearNotif(n.id);}setNotifOpen(false);openWs('studio');fridayNavigate({workspace:'studio',creation:creation,creation_title:creationTitle,creation_date:creationDate});};
          const openCreationFolder=()=>{fetch('/api/computer/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:creationFolder||creation})}).catch(()=>{});};
          // Row click: a bodied notification expands on first click; a second
          // click (or the "Open" button) navigates. Bodyless notifications with a
          // target navigate immediately. Bodied-but-targetless ones just toggle.
          const onClickRow=()=>{
            if(n.id&&!n.read)markNotifRead(n.id);
            if(hasDetail&&!isExpanded){
              setNotifCardExpanded(e=>({...e,[`notif_${key}`]:true}));
            } else if(tgt){
              openTarget();
            } else if(hasDetail){
              setNotifCardExpanded(e=>({...e,[`notif_${key}`]:false}));
            }
          };
          const clickable=hasDetail||!!tgt;
          return(<div key={key}
            role={clickable?'button':undefined}
            tabIndex={clickable?0:undefined}
            onClick={clickable?onClickRow:undefined}
            onKeyDown={clickable?(e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onClickRow()}}):undefined}
            className={clickable?'notif-row clickable':'notif-row'}
            style={{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,color:n.read?'rgba(255,255,255,0.72)':'#fff',cursor:clickable?'pointer':'default',transition:'background .15s'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'Inter',fontSize:12,lineHeight:1.4,fontWeight:n.read?400:500}}>{n.title||n.message||n.text||'Notification'}</div>
                {n.time&&<div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#aaa',marginTop:3}}>{n.time}</div>}
              </div>
              {hasDetail&&<span aria-hidden="true" style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.55)',marginTop:1}}>{isExpanded?'▾':'▸'}</span>}
              {!hasDetail&&tgt&&<span aria-hidden="true" title={notifTargetLabel(tgt)} style={{fontSize:12,color:'#00d4ff',marginTop:1}}>{tgt.url&&!tgt.workspace?'↗':'→'}</span>}
              {n.id&&<button onClick={e=>{e.stopPropagation();clearNotif(n.id)}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',cursor:'pointer',fontSize:10,padding:'0 2px',lineHeight:1}} title="Dismiss">&#x2715;</button>}
            </div>
            {isExpanded&&hasDetail&&<FridayDoc compact text={n.detail||n.body||n.message} style={{marginTop:8,padding:'8px 10px',background:'rgba(0,0,0,0.35)',borderRadius:6,border:'1px solid rgba(255,255,255,0.06)'}}/>}
            {isExpanded&&tgt&&!isCreationNotif&&<div style={{marginTop:8,display:'flex',justifyContent:'flex-end'}}>
              <button className="notif-open-btn" onClick={e=>{e.stopPropagation();openTarget()}}>{notifTargetLabel(tgt)} {tgt.url&&!tgt.workspace?'↗':'→'}</button>
            </div>}
            {isCreationNotif&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
              <button className="notif-open-btn" onClick={e=>{e.stopPropagation();openCreationDoc()}}>📄 Open Creation</button>
              {creationFolder&&<button className="notif-open-btn" onClick={e=>{e.stopPropagation();openCreationFolder()}}>📁 Open Folder</button>}
            </div>}
          </div>);
        })}
    </div>}

                When enabled, Friday can move your mouse, click, type, and take screenshots — driving your computer like a person would. This is a powerful, high-risk capability. Leave it off unless you specifically need it.
              </div>
              <div className="settings-toggle" onClick={()=>saveAgentSettings({computer_control_enabled:!agentSettings.computer_control_enabled})}>
                <span className="settings-toggle-label">{agentSettings.computer_control_enabled?'Computer Control feature enabled':'Enable Computer Control feature'}</span>
                <div className={`settings-toggle-switch ${agentSettings.computer_control_enabled?'on':''}`}/>
              </div>
              {agentSettings.computer_control_enabled&&<div style={{marginTop:12,paddingTop:10,borderTop:'1px solid rgba(255,50,50,0.15)'}}>
                {!ccAvailable&&<div style={{fontSize:11,color:'#f59e0b',padding:'6px 8px',background:'rgba(245,158,11,0.08)',borderRadius:4,marginBottom:10}}>pyautogui not installed. Run <code style={{color:'#00d4ff'}}>pip install pyautogui</code> in the venv and restart the server.</div>}
                <div style={{fontSize:11,color:'rgba(255,200,200,0.85)',marginBottom:10,lineHeight:1.6}}>
                  Granting control is a separate, deliberate step. <strong style={{color:'#ff6060'}}>Permission is revoked on every server restart.</strong>
                </div>
                <div className="settings-toggle" onClick={()=>{
                  if(ccGranted){
                    fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'revoke'})}).then(()=>setCcGranted(false)).catch(()=>{});
                  }else{
                    fetch('/api/control/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'grant'})}).then(r=>r.json()).then(d=>setCcGranted(!!d.granted)).catch(()=>{});
                  }
                }} style={{borderColor:ccGranted?'rgba(255,50,50,0.4)':'undefined'}}>
                  <span className="settings-toggle-label" style={{color:ccGranted?'#ff6060':undefined}}>{ccGranted?'🔴 Computer Control ACTIVE':'🟢 Grant computer control'}</span>
                  <div className={`settings-toggle-switch ${ccGranted?'on':''}`} style={ccGranted?{background:'linear-gradient(90deg,#cc0000,#ff2222)'}:{}}/>
                </div>
                {ccGranted&&<div style={{marginTop:10,padding:'10px 12px',background:'rgba(255,0,0,0.06)',border:'1px solid rgba(255,0,0,0.2)',borderRadius:6}}>
                  <div style={{fontFamily:'Orbitron',fontSize:11,color:'#ff4444',marginBottom:6,letterSpacing:'.05em'}}>&#x26D4; KILL SWITCH</div>
                  <div style={{fontSize:11,color:'rgba(255,200,200,0.8)',marginBottom:8}}>Immediately stop all computer control. Also available via <code style={{color:'#ff9999'}}>Ctrl+Shift+Q</code>.</div>
                  <button onClick={killSwitch} style={{width:'100%',padding:'8px',background:'linear-gradient(135deg,#aa0000,#cc2222)',border:'1px solid rgba(255,50,50,0.5)',borderRadius:5,color:'#fff',fontFamily:'Orbitron',fontSize:12,letterSpacing:'.1em',cursor:'pointer',fontWeight:700}}>&#x26D4; KILL COMPUTER CONTROL</button>
                </div>}
              </div>}
            </div>
          </div>
        </div>
      </div>

      {/* ── FEDERATION ── agent identity, peer discovery, known peers, peer card export. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.federation?'open':''}`} onClick={()=>toggleSection('federation')}>
          <div className="settings-section-title" style={{margin:0}}>Federation</div>
          <span className="chev">{openSections.federation?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.federation?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <FederationPanel/>
          </div>
        </div>
      </div>

      {/* ── DEFEDERATION ── Asimov-governed defederation assessments + consensus. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.defederation?'open':''}`} onClick={()=>toggleSection('defederation')}>
          <div className="settings-section-title" style={{margin:0}}>Defederation</div>
          <span className="chev">{openSections.defederation?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.defederation?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <DefederationPanel/>
          </div>
        </div>
      </div>

      {/* ── CONTENT POLICIES ── community policy packs, subscription management. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.content_policies?'open':''}`} onClick={()=>toggleSection('content_policies')}>
          <div className="settings-section-title" style={{margin:0}}>Content Policies</div>
          <span className="chev">{openSections.content_policies?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.content_policies?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <ContentPoliciesPanel/>
          </div>
        </div>
      </div>

      {/* ── MODERATION ── family mode, adult content, harm boundary info. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.moderation?'open':''}`} onClick={()=>toggleSection('moderation')}>
          <div className="settings-section-title" style={{margin:0}}>Content Moderation</div>
          <span className="chev">{openSections.moderation?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.moderation?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',marginBottom:12,lineHeight:1.6}}>
              Content moderation runs locally on your device. Friday enforces harm boundaries (CSAM, deepfakes, doxxing, violence) but does not police taste or morality.
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div>
                <div style={{fontSize:12,color:'#dde',marginBottom:2}}>Family mode</div>
                <div style={{fontSize:11,color:'#888'}}>Blocks NSFW content in Studio and Marketplace</div>
              </div>
              <span className={'toggle-pill '+((agentSettings.minor_mode||agentSettings.family_mode)?'on':'')}
                onClick={()=>saveAgentSettings({minor_mode:!(agentSettings.minor_mode||agentSettings.family_mode),family_mode:!(agentSettings.minor_mode||agentSettings.family_mode)})}>
                {(agentSettings.minor_mode||agentSettings.family_mode)?'On':'Off'}
              </span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div>
                <div style={{fontSize:12,color:'#dde',marginBottom:2}}>Allow adult content</div>
                <div style={{fontSize:11,color:'#888'}}>Permits NSFW-rated items in Marketplace browse</div>
              </div>
              <span className={'toggle-pill '+(agentSettings.allow_adult_content?'on':'')}
                onClick={()=>saveAgentSettings({allow_adult_content:!agentSettings.allow_adult_content})}>
                {agentSettings.allow_adult_content?'On':'Off'}
              </span>
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',fontStyle:'italic',lineHeight:1.5,padding:'8px 10px',background:'rgba(255,255,255,0.02)',borderRadius:6,border:'1px solid rgba(255,255,255,0.05)'}}>
              Absolute limits (always enforced, cannot be disabled): CSAM, non-consensual deepfakes, doxxing, incitement to violence. These are not content-policy choices — they are hard stops in the cLAWS harm gate.
            </div>
          </div>
        </div>
      </div>

      {/* ── 5) ABOUT ── branding + system health snapshot. */}
      <div className="settings-section" style={{padding:0}}>
        <div className={`settings-coll-header ${openSections.about?'open':''}`} onClick={()=>toggleSection('about')}>
          <div className="settings-section-title" style={{margin:0}}>About</div>
          <span className="chev">{openSections.about?'▾':'▸'}</span>
        </div>
        <div className={`settings-coll-body ${openSections.about?'open':''}`}>
          <div style={{padding:'0 16px 14px'}}>
            <div style={{textAlign:'center',marginBottom:14,padding:'14px 8px',background:'linear-gradient(135deg,rgba(245,158,11,0.06),rgba(0,212,255,0.04))',borderRadius:8,border:'1px solid rgba(245,158,11,0.15)'}}>
              <div style={{fontFamily:'Orbitron',fontSize:18,color:'#f59e0b',letterSpacing:'0.08em',fontWeight:700,marginBottom:4,textShadow:'0 0 14px rgba(245,158,11,0.35)'}}>AGENT FRIDAY</div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(255,255,255,0.55)',marginBottom:8}}>v4.5.0 · Desktop OS</div>
              <div style={{fontFamily:'Orbitron',fontSize:10,color:'#00d4ff',letterSpacing:'0.18em'}}>BY FUTURESPEAK.AI</div>
            </div>

            <div className="settings-subtitle">System Health</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11,marginBottom:8}}>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Evolution Day</div>
                <div style={{fontFamily:'Orbitron',fontSize:15,color:'#00d4ff'}}>{stEvo?.day??'—'}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Mood</div>
                <div style={{fontFamily:'Orbitron',fontSize:13,color:'#7c3aed'}}>{sceneState.mood||'—'}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Uptime</div>
                <div style={{fontFamily:'Orbitron',fontSize:13,color:'#00ff80'}}>{formatUptime(stHealth?.uptime_seconds)}</div>
              </div>
              <div style={{padding:'6px 8px',background:'rgba(255,255,255,0.05)',borderRadius:5,border:'1px solid rgba(255,255,255,0.05)'}}>
                <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:2}}>Creations Today</div>
                <div style={{fontFamily:'Orbitron',fontSize:15,color:'#f59e0b'}}>{stHealth?.creations_today??'—'}</div>
              </div>
            </div>
            <div style={{marginTop:8}}>
              <div style={{color:'rgba(255,255,255,0.72)',fontSize:11,fontFamily:'JetBrains Mono',marginBottom:4}}>Active Models</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(stHealth?.models||[{name:'Claude',active:true},{name:'Gemini',active:true}]).map((m,i)=>(
                  <span key={i} className="model-pill" style={{fontSize:11}}>
                    <span className={`dot ${m.active?'active':'idle'}`}/>
                    {m.name}
                  </span>
                ))}
              </div>
            </div>
            {stEvo?.structure&&<div style={{marginTop:8,fontSize:11,color:'#a8a8b4',fontFamily:'JetBrains Mono'}}>{stEvo.structure}</div>}

            <div className="settings-subtitle" style={{marginTop:14}}>Acknowledgments</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.6)',lineHeight:1.6,fontFamily:'JetBrains Mono'}}>
              Context compression powered by{' '}
              <a href="https://github.com/chopratejas/headroom" target="_blank" rel="noopener noreferrer" style={{color:'#00d4ff',textDecoration:'none'}}>Headroom</a>
              {' '}by Tejas Chopra — Apache 2.0. Compresses tool outputs, JSON, code, and prose before they reach the LLM (60-95% fewer tokens, same answers).
            </div>
          </div>
        </div>
      </div>
    </div>

    {/* Quick Draft Popup */}
    {quickDraft&&<div ref={quickDraftRef} style={{position:'fixed',top:42,right:120,width:360,background:'rgba(10,14,26,0.75)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:12,zIndex:9999,padding:14,boxShadow:'0 4px 30px rgba(0,0,0,0.3)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>QUICK DRAFT</span>
        <button onClick={()=>setQuickDraft(false)} style={{background:'none',border:'none',color:'#999',cursor:'pointer'}}>&#x2715;</button>
      </div>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {DRAFT_MODES.map(m=><button key={m.id} className={'btn '+(qdMode===m.id?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setQdMode(m.id)}>{m.ico} {m.label}</button>)}
      </div>
      <textarea className="input" style={{width:'100%',height:48,resize:'none',fontSize:11,marginBottom:6}} value={qdPrompt} onChange={e=>setQdPrompt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)qdGenerate()}} placeholder="What do you need drafted? (Ctrl+Enter)"/>
      <div style={{display:'flex',gap:4,marginBottom:qdResult||qdLoading?8:0,flexWrap:'wrap'}}>
        <button className="btn" onClick={qdGenerate} disabled={qdLoading} style={{fontSize:11,fontWeight:600}}>{qdLoading?'Generating...':'Generate'}</button>
        {qdResult&&<button className="btn" onClick={qdCopy} style={{fontSize:11}}>{qdCopied?'✓ Copied':'📋 Copy'}</button>}
        {qdResult&&<button className="btn" onClick={()=>openDraftTab(qdResult,qdMode,qdPrompt)} style={{fontSize:11}}>🔗 New Tab</button>}
      </div>
      {qdLoading&&!qdResult&&<div style={{fontSize:11,color:'#a8a8b4',fontStyle:'italic',marginBottom:6}}>⏳ Running in background — progress visible in the bell menu</div>}
      {qdResult&&<div style={{maxHeight:220,overflowY:'auto',background:'rgba(0,0,0,0.45)',border:'1px solid rgba(0,212,255,0.1)',borderRadius:8,padding:'14px 16px'}}>
        {qdResult.split(/\n\n+/).filter(Boolean).map((p,i)=><p key={i} style={{fontFamily:'Inter',fontSize:i===0?13:12,lineHeight:1.75,color:i===0?'#e8e8f0':'#ccc',marginBottom:10,whiteSpace:'pre-wrap'}}>{p}</p>)}
      </div>}
    </div>}

    {/* Dock — grouped (Life / Work / System) */}
    <div className={`dock ${dockHidden?'hidden':''}`}>
      {DOCK_GROUPS.map((g,gi)=>(<React.Fragment key={g.name}>
        {gi>0&&<div className="dock-sep"/>}
        <div className="dock-group">
          <div className="dock-group-btns">
            {g.items.filter(w=>showAllWorkspaces||w.core).map(w=><button key={w.id} className={`dock-btn ${openWins.has(w.id)?'active':''} ${(suggestedWs.has(w.id)&&!openWins.has(w.id))?'suggested':''}`} onClick={()=>toggle(w.id)} title={(suggestedWs.has(w.id)&&!openWins.has(w.id))?'Suggested — Friday predicts you’ll want this':undefined} style={{position:'relative'}}>
              <span className="ico"><img src={`assets/icons/${w.id}.svg`} alt={w.label} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='inline'}}/><span style={{display:'none'}}>{w.ico}</span></span><span>{w.label}</span><span className="dot"/>
              {w.id==='wiki'&&wikiPending>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#f59e0b',color:'#0a0a0f',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(245,158,11,0.7)'}}>{wikiPending}</span>}
              {w.id==='messages'&&msgActionable>0&&<span style={{position:'absolute',top:2,right:2,minWidth:14,height:14,padding:'0 4px',borderRadius:7,background:'#00d4ff',color:'#031018',fontSize:9,fontWeight:700,fontFamily:'Orbitron',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 8px rgba(0,212,255,0.7)'}}>{msgActionable}</span>}
            </button>)}
          </div>
          <div className="dock-group-label">{g.name}</div>
        </div>
      </React.Fragment>))}
    </div>
    {paletteOpen&&<CommandPalette onClose={()=>setPaletteOpen(false)} onOpenWs={id=>{toggle(id);setPaletteOpen(false)}} openWins={openWins}/>}

    {/* Background tasks now live in the bell-icon dropdown above */}

    {/* Task Result Modal */}
    {taskResultModal&&<div onClick={()=>setTaskResultModal(null)} style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(720px, 90vw)',maxHeight:'85vh',overflowY:'auto',background:'rgba(10,10,18,0.96)',border:'1px solid rgba(0,212,255,0.25)',borderRadius:12,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.8)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00d4ff',letterSpacing:'.08em'}}>TASK RESULT · {(taskResultModal.status||'').toUpperCase()}</div>
            <div style={{fontSize:14,color:'#fff',marginTop:3}}>{taskResultModal.name}</div>
          </div>
          <button className="btn" onClick={()=>setTaskResultModal(null)}>Close</button>
        </div>
        {taskResultModal.description&&<div style={{fontSize:11,color:'#888',marginBottom:10,fontStyle:'italic'}}>{taskResultModal.description}</div>}
        {taskResultModal.result
          ?<FridayDoc compact text={taskResultModal.result} style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)'}}/>
          :<div style={{background:'rgba(0,0,0,0.4)',padding:12,borderRadius:8,border:'1px solid rgba(255,255,255,0.04)',color:'#888',fontSize:12,fontStyle:'italic'}}>This process didn't return a written result — see the activity log below for what it did.</div>}
        {(taskResultModal.log||[]).length>0&&<div style={{marginTop:12}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',letterSpacing:'.08em',marginBottom:6}}>ACTIVITY LOG</div>
          <div style={{background:'rgba(0,0,0,0.4)',padding:8,borderRadius:6,maxHeight:180,overflowY:'auto'}}>
            {(taskResultModal.log||[]).map((l,i)=><div key={i} style={{fontFamily:'JetBrains Mono',fontSize:11,color:'rgba(200,200,220,0.7)',padding:'1px 0'}}>→ {l}</div>)}
          </div>
        </div>}
      </div>
    </div>}
  </WsCustomCtx.Provider>);
}

// Mount with error surface so mobile failures are visible instead of a blank dock.
(function mountFriday(){
  try{
    var target=document.getElementById('ui-inner')||document.getElementById('ui-root');
    if(!target){throw new Error('Mount target #ui-inner/#ui-root not found');}
    ReactDOM.createRoot(target).render(<App/>);
  }catch(err){
    console.error('[FRIDAY] React mount failed:',err);
    var host=document.getElementById('ui-inner')||document.getElementById('ui-root')||document.body;
    var box=document.createElement('div');
    box.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:rgba(20,0,10,.92);border:1px solid #ff0080;border-radius:10px;padding:12px 14px;color:#ffdbe8;font:12px/1.4 monospace;pointer-events:auto;max-height:45vh;overflow:auto';
    box.innerHTML='<div style="color:#ff5599;font-weight:700;margin-bottom:6px">FRIDAY UI failed to mount</div><pre style="white-space:pre-wrap;margin:0">'+(err&&err.stack?err.stack:String(err))+'</pre>';
    host.appendChild(box);
  }
})();
</script>
</body>
</html>
