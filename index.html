function relevanceFor(it){
  const text=((it.title||'')+' '+(it.snippet||'')).toLowerCase();
  let best=null,bestN=0;
  for(const p of NEWS_PROFILE){
    let n=0;for(const w of p.kw){if(text.includes(w.toLowerCase()))n++;}
    if(n>bestN){bestN=n;best=p;}
  }
  if(best)return (it.boosted?'⭐ ':'')+'Matches: '+best.label;
  const m={'AI/Tech':'AI/Tech priority','Politics':'Politics watchlist','Local':'Local news','Business':'Markets & business','Science':'Science signal','Media':'Media & journalism'};
  return (it.boosted?'⭐ Boosted source · ':'')+'Relevant: '+(m[it.category]||'your interests');
}

// Source Trust Graph dimension labels + ordering (matches source_trust_graph.py).
const TRUST_DIMS=[
  ['factual_accuracy','Factual accuracy'],
  ['correction_behavior','Corrections'],
  ['source_attribution','Attribution'],
  ['prediction_accuracy','Predictions'],
  ['opinion_separation','Opinion labeling'],

function trustColor(score){const s=Number(score);if(isNaN(s))return'yellow';return s>=0.7?'green':s>=0.4?'yellow':'red';}
// Inline trust badge for an article card: colored dot + numeric score, with a

function TrustBadge({it,compact}){

// Six-axis radar (hexagon) chart of a source's trust dimensions, pure SVG.
function TrustRadar({scores}){
  const sc=scores||{};const cx=90,cy=90,R=70;const n=TRUST_DIMS.length;
  const pt=(i,r)=>{const ang=-Math.PI/2+i*2*Math.PI/n;return[cx+r*Math.cos(ang),cy+r*Math.sin(ang)];};
  const ring=(f)=>TRUST_DIMS.map((_,i)=>pt(i,R*f).join(',')).join(' ');
  const data=TRUST_DIMS.map(([k],i)=>pt(i,R*Math.max(0,Math.min(1,Number(sc[k])||0))).join(',')).join(' ');
  return <svg className="trust-radar" viewBox="0 0 180 180" width="180" height="180">
    {[0.25,0.5,0.75,1].map((f,i)=><polygon key={i} points={ring(f)} className="radar-grid"/>)}
    {TRUST_DIMS.map((_,i)=>{const[x,y]=pt(i,R);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} className="radar-spoke"/>})}
    <polygon points={data} className="radar-area"/>
    {TRUST_DIMS.map(([k,lbl],i)=>{const[x,y]=pt(i,R+12);return <text key={k} x={x} y={y} className="radar-lbl" textAnchor={x<cx-5?'end':x>cx+5?'start':'middle'}>{lbl.split(' ')[0]}</text>})}
  </svg>;
}

  const stopAnchorBriefing=()=>{try{window.fridayVoice&&window.fridayVoice.stop()}catch(_){}setAnchorReading(false);flashNews('Anchor briefing ended')};

  // ── Share to Draft ──
  const shareToDraft=async(it)=>{
    if(!it||shareBusy)return;setShareBusy(it.url);
    try{
      const r=await fetch('/api/news/share-to-draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:it.url,article_title:it.title,article_url:it.url,article_snippet:it.snippet})});
      const d=await r.json();if(d.status!=='ok')throw new Error(d.message||'Failed');
      flashNews('Opening Draft workspace…');
      if(window.fridayOpenWorkspace)window.fridayOpenWorkspace({workspace:'draft',seedId:d.draft_id});
      else fridayNavigate({workspace:'draft',seedId:d.draft_id});
    }catch(e){flashNews('Share failed: '+(e.message||e))}
    finally{setShareBusy(null)}
  };

  // ── Annotation mode ──
  const openAnnotate=(it)=>{setAnnotateFor(annotateFor===it.url?null:it.url);setAnnoText('')};
  const saveAnnotation=async(it)=>{
    const txt=annoText.trim();if(!txt||annoBusy)return;setAnnoBusy(true);
    try{await fetch('/api/news/annotate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:it.url,text:txt,article_title:it.title,article_url:it.url})});setAnnoText('');setAnnotateFor(null);flashNews('Note saved');loadAnnotations();}
    catch(e){flashNews('Could not save note')}finally{setAnnoBusy(false)}
  };
  const removeAnnotations=async(articleId)=>{try{await fetch('/api/news/annotate',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:articleId})});loadAnnotations()}catch(e){}};
  // Reusable: 📝 badge for annotated cards + the inline note panel.
  const annoBadge=(it)=>annById[it.url]?<span className="badge-cyan" title="You annotated this" style={{fontSize:9,padding:'1px 6px'}}>📝</span>:null;
  const annoBox=(it)=>annotateFor===it.url?(<div className="anno-box" onClick={e=>e.stopPropagation()} style={{marginTop:8,padding:8,background:'rgba(0,0,0,0.25)',border:'1px solid rgba(0,212,255,0.18)',borderRadius:8}}>
    <textarea className="input" autoFocus style={{width:'100%',height:54,resize:'vertical',fontSize:11}} value={annoText} onChange={e=>setAnnoText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))saveAnnotation(it)}} placeholder="Your note — commentary, reminder, insight… (Ctrl+Enter to save)"/>
    <div style={{display:'flex',gap:4,marginTop:6}}>
      <button className="btn" style={{fontSize:10,padding:'2px 8px'}} disabled={annoBusy||!annoText.trim()} onClick={()=>saveAnnotation(it)}>{annoBusy?'Saving…':'Save note'}</button>
      <button className="btn btn-magenta" style={{fontSize:10,padding:'2px 8px'}} onClick={()=>{setAnnotateFor(null);setAnnoText('')}}>Cancel</button>
    </div>
  </div>):null;
  const generateBriefing=async()=>{if(generating)return;setGenerating(true);setGenStep(0);setGenDone([]);
    let step=0;genTimer.current=setInterval(()=>{step=Math.min(step+1,NEWS_GEN_STEPS.length-1);setGenDone(NEWS_GEN_STEPS.slice(0,step));setGenStep(step)},1800);
    try{const r=await fetch('/api/briefing/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});const d=await r.json();if(d.status!=='ok'||!d.content)throw new Error(d.message||'Generation failed');
      setHtmlContent(d.content);setSelected({date:d.date,filename:d.filename,isHtml:false});setTab('briefings');
      fetch('/api/briefings').then(r=>r.json()).then(x=>setBriefings(x.briefings||[])).catch(()=>{})}
    catch(e){alert('Briefing generation failed: '+(e.message||e))}
    finally{if(genTimer.current)clearInterval(genTimer.current);setGenerating(false);setGenStep(-1);setGenDone([])}};
  const sendBriefingChat=async()=>{if(!chatIn.trim())return;const m=chatIn.trim();setChatIn('');setChatMsgs(p=>[...p,{role:'user',text:m}]);setChatLoad(true);
    try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Context: The user is reading the daily briefing from '+selected?.date+'. Question: '+m})});const d=await r.json();setChatMsgs(p=>[...p,{role:'friday',text:d.response}])}catch(e){setChatMsgs(p=>[...p,{role:'friday',text:'[Error]'}])}setChatLoad(false)};

  // ── Expanded single-briefing reader ──
  if(selected)return(<div className="news-ws">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <button className="btn" onClick={()=>{setSelected(null);setChatOpen(false);setChatMsgs([])}} style={{fontSize:11}}>← Back</button>
      <div style={{display:'flex',gap:4}}>
        <button className="btn" onClick={readAloud} disabled={ttsLoading} style={{fontSize:11}}>{ttsLoading?'Generating...':'🔊 Read Aloud'}</button>
        <button className="btn btn-magenta" onClick={stopReading} style={{fontSize:11}}>Stop</button>
        <button className="btn" onClick={()=>setChatOpen(!chatOpen)} style={{fontSize:11}}>{chatOpen?'Hide Chat':'💬 Discuss'}</button>
        <TalkToFridayButton contentType="briefing" title={'Briefing '+selected?.date} summary={''} style={{fontSize:11}}/>
        <SendTo content={()=>htmlContent.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim().substring(0,5000)} dataType="briefing_excerpt" options={[{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},{label:'Draft Email',dest:'gmail_draft',ico:'✉️'}]}/>
        {selected.filename&&selected.isHtml!==false&&<button className="btn" onClick={()=>openInTab(selected)} style={{fontSize:11}}>Open in Tab</button>}
      </div>
    </div>
    <div style={{display:'flex',gap:12}}>
      <div style={{flex:1,overflowY:'auto'}}>
        {selected.isHtml?<iframe srcDoc={htmlContent} style={{width:'100%',height:'calc(100vh - 200px)',border:'none',borderRadius:8,background:'#0a0a0f'}}/>:
        <FridayDoc text={htmlContent} style={{padding:'4px 8px'}}/>}
      </div>
      {chatOpen&&<div style={{width:280,borderLeft:'1px solid rgba(255,255,255,0.04)',paddingLeft:10,display:'flex',flexDirection:'column'}}>
        <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',marginBottom:8}}>DISCUSS BRIEFING</div>
        <div style={{flex:1,overflowY:'auto',marginBottom:8}}>{chatMsgs.map((m,i)=><div key={i} style={{marginBottom:6,textAlign:m.role==='user'?'right':'left'}}><div style={{display:'inline-block',maxWidth:'90%',padding:'5px 8px',borderRadius:6,fontSize:11,background:m.role==='user'?'rgba(124,58,237,0.12)':'rgba(255,255,255,0.03)',color:m.role==='user'?'#b794f6':'#bbb'}}>{m.text}</div></div>)}{chatLoad&&<div style={{fontSize:11,color:'#00d4ff'}}>Thinking...</div>}</div>
        <div style={{display:'flex',gap:4}}><input className="input" style={{flex:1,fontSize:11}} value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendBriefingChat()} placeholder="Ask about this briefing..."/><button className="btn" style={{fontSize:11}} onClick={sendBriefingChat}>Send</button></div>
      </div>}
    </div>
  </div>);

  // ── Feature (top story) gets a larger card + editorial note ──
  const filteredBriefs=briefings.filter(b=>!briefSearch||(b.date||'').includes(briefSearch.trim()));
  // The archive feed arrives already filtered (category) and sorted server-side,
  // so the accumulated pages render as-is; optimistic ban removal mutates `feed`.
  const streamItems=feed;
  // Reusable card-corner actions: Read Later (toggle) + Open in Background.
  const cardActions=(it)=>(<div className="src-actions">
    <button className={'src-btn save'+(savedUrls[it.url]?' on':'')} title={savedUrls[it.url]?'Saved to Read Later':'Save to Read Later'} onClick={e=>{e.stopPropagation();savedUrls[it.url]?removeLater(it.url):saveLater(it)}}>{savedUrls[it.url]?'🔖':'🏷'}</button>
    <button className="src-btn bg" title="Open in background tab" onClick={e=>{e.stopPropagation();openBg(it.url)}}>⧉</button>
    <button className="src-btn draft" title="Draft a LinkedIn post / blog response about this" onClick={e=>{e.stopPropagation();shareToDraft(it)}}>{shareBusy===it.url?'…':'✍️'}</button>
    <button className={'src-btn note'+(annById[it.url]?' on':'')+(annotateFor===it.url?' active':'')} title={annById[it.url]?'Annotated — add another note':'Annotate'} onClick={e=>{e.stopPropagation();openAnnotate(it)}}>📝</button>
    <button className="src-btn boost" title={'Boost '+it.source} onClick={e=>{e.stopPropagation();boostSource(it.source)}}>⭐</button>

  </div>);

  return(<div className="news-ws" style={{position:'relative'}}>
    {/* Front Page audio briefing — mini player bar */}
    {fpAudio&&<div className="fp-audio-bar">

      <span className="fp-audio-label">🔊 {fpAudioLoading?'Generating audio…':'Front Page briefing'}</span>
      <div className="fp-audio-track" onClick={e=>{const rect=e.currentTarget.getBoundingClientRect();seekFp((e.clientX-rect.left)/rect.width)}}>
        <div className="fp-audio-fill" style={{width:(Math.round(fpProgress*1000)/10)+'%'}}></div>
      </div>
      <span className="fp-audio-time">{_fmtDur(fpProgress*fpDuration)} / {_fmtDur(fpDuration)}</span>
      <div className="fp-audio-speed">{[1,1.5,2].map(s=><button key={s} className={'fp-spd'+(fpSpeed===s?' on':'')} onClick={()=>setFpRate(s)}>{s}x</button>)}</div>
      <button className="fp-audio-btn close" title="Close player" onClick={closeFpAudio}>✕</button>
    </div>}
    {newsToast&&<div className="news-toast">{newsToast}</div>}
    {/* Live status strip — news-only. Gmail/Calendar are pulled by the briefing
        generator as data sources but are NOT surfaced as News-workspace widgets. */}
    <div className="status-strip">
      {status.filter(c=>c.key!=='gmail'&&c.key!=='calendar').map((c,i)=><div key={i} className="status-pill" title={c.detail}>
        <span className={'status-dot '+c.status}></span><span>{c.icon} {c.label}</span>
        <span className="st-detail">{c.status==='connected'?'live':c.status==='degraded'?'active':'off'}</span>
      </div>)}
      {!status.length&&<div className="status-pill"><span className="status-dot degraded"></span><span>Checking connectors…</span></div>}
    </div>

    {/* Toolbar */}
    <div className="news-toolbar">
      <div className="news-tabs">
        <button className={'btn '+(tab==='frontpage'?'active':'')} style={{fontSize:11}} onClick={()=>setTab('frontpage')}>🗞 Front Page</button>
        <button className={'btn '+(tab==='feed'?'active':'')} style={{fontSize:11}} onClick={()=>setTab('feed')}>📰 Feed</button>
        <button className={'btn '+(tab==='readlater'?'active':'')} style={{fontSize:11}} onClick={()=>{setTab('readlater');loadReadLater()}}>🔖 Read Later{readLater.length?(' ('+readLater.length+')'):''}</button>
        <button className={'btn '+(tab==='notes'?'active':'')} style={{fontSize:11}} onClick={()=>{setTab('notes');loadAnnotations()}}>📝 My Notes{annotations.length?(' ('+annotations.length+')'):''}</button>
        <button className={'btn '+(tab==='briefings'?'active':'')} style={{fontSize:11}} onClick={()=>setTab('briefings')}>🗂 Briefings</button>
        <button className={'btn '+(tab==='weekly'?'active':'')} style={{fontSize:11}} onClick={()=>{setTab('weekly');loadWeekly()}}>📅 Weekly</button>
        <button className={'btn '+(tab==='editorial'?'active':'')} style={{fontSize:11}} onClick={()=>{setTab('editorial');loadEditorial()}}>🖋 Editorial</button>
        <button className={'btn '+(tab==='trust'?'active':'')} style={{fontSize:11}} onClick={()=>{setTab('trust');loadTrust()}}>🛡 Trust</button>
      </div>
      <div style={{display:'flex',gap:4}}>
        <button className="btn" style={{fontSize:11}} onClick={()=>{setPanel('sources');loadSources()}}>🛡 Manage Sources</button>
        <button className="btn" style={{fontSize:11}} onClick={()=>{setPanel('customize');loadPrefs()}}>⚙ Customize</button>
        <button className="btn" style={{fontSize:11}} onClick={()=>{setPanel('diet');loadDiet()}}>📊 Your Media Diet</button>
        {tab==='feed'&&<button className="btn" style={{fontSize:11}} onClick={()=>{loadFeed(true);loadArchStats();loadClusters()}}>↻ Refresh</button>}
        {tab==='frontpage'&&fp&&<button className="btn" style={{fontSize:11}} onClick={listenFrontPage} disabled={fpAudioLoading}>{fpAudioLoading?'Generating…':'🔊 Listen'}</button>}
        {tab==='frontpage'&&fp&&!anchorReading&&<button className="btn" style={{fontSize:11}} onClick={startAnchorBriefing} disabled={anchorBusy} title="Friday reads the Front Page aloud like a live news anchor — interrupt any time to ask about a story.">{anchorBusy?'Starting…':'🎙️ Listen to Front Page'}</button>}
        {tab==='frontpage'&&anchorReading&&<button className="btn btn-magenta" style={{fontSize:11}} onClick={stopAnchorBriefing} title="End the live anchor briefing.">⏹ Stop Anchor</button>}
        {tab==='frontpage'&&<button className="btn active" style={{fontSize:11}} onClick={genFrontPage} disabled={fpGen}>{fpGen?'Curating…':'✨ Generate Front Page'}</button>}
        {tab!=='frontpage'&&<button className="btn active" style={{fontSize:11}} onClick={generateBriefing} disabled={generating}>{generating?'Generating…':'✨ Generate Briefing'}</button>}
      </div>
    </div>

    {/* Generate progress */}
    {generating&&<div className="gen-progress">
      <span className="gen-spinner"></span>
      <span>Friday is assembling your briefing…</span>
      <span className="gen-steps">{NEWS_GEN_STEPS.map((s,i)=><span key={i} className={'gen-step '+(genDone.includes(s)?'done':i===genStep?'active':'')}>{s}</span>)}</span>
    </div>}

    {/* ── FEED TAB (archive stream · infinite scroll · category + sort) ── */}
    {tab==='feed'&&<div style={{position:'relative'}}>
      <div ref={feedTopRef}></div>
      <div className="stream-bar">
        <div className="stream-tabs">
          {NEWS_STREAM_CATS.map(c=>{const n=c==='All'?(archStats&&archStats.total||0):(archStats&&archStats.by_category&&archStats.by_category[c]||0);return <button key={c} className={'stream-tab'+(streamCat===c?' active':'')} onClick={()=>setStreamCat(c)}>{c}{n>0?(' '+n):''}</button>})}
        </div>
        <div className="stream-sort">
          <span style={{fontSize:10,color:'#777'}}>Sort</span>
          {[['relevance','Relevance'],['time','Newest'],['source','Source']].map(([k,lbl])=>
            <button key={k} className={'sort-pill'+(sortBy===k?' active':'')} onClick={()=>setSortBy(k)}>{lbl}</button>)}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:11,color:'#888'}}>{feedTotal.toLocaleString()} archived stor{feedTotal===1?'y':'ies'}{streamCat!=='All'?(' in '+streamCat):''}{feed.length<feedTotal?(' · showing '+feed.length):''}{feedAt?(' · updated '+new Date(feedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})):''}{sources.banned.length?(' · '+sources.banned.length+' source'+(sources.banned.length>1?'s':'')+' banned'):''}</div>
      </div>
      {feedLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading your news archive…</div>:
       streamItems.length===0?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:30}}>No archived stories{streamCat!=='All'?(' in '+streamCat):''} yet. Friday archives articles every few minutes as it fetches them — check back shortly, or open the 🗞 Front Page.</div>:
       <div>
       {clusters.length>0&&<div className="cluster-strip">
         <div className="cluster-strip-head">🔥 Trending — one story, covered by multiple sources</div>
         {clusters.map((cl,ci)=><div key={cl.id||ci} className={'cluster-card cat-'+(cl.color||'tech')}>
           <div className="cluster-cardtop">
             <span className="cluster-badge">Covered by {cl.source_count} sources</span>
             <span className="cat-chip">{cl.category}</span>
           </div>
           <div className="cluster-headline" onClick={()=>{const a=cl.articles[0];if(a&&a.url){window.open(a.url,'_blank');newsRecord(a.source,'click',a.category)}}}>{cl.headline}</div>
           <div className="cluster-sources">{cl.sources.slice(0,6).join(' · ')}{cl.sources.length>6?' …':''}</div>
           <div style={{display:'flex',gap:6,alignItems:'center',marginTop:4}}>
             <button className="cluster-toggle" style={{flex:1}} onClick={()=>setClOpen(o=>({...o,[cl.id]:!o[cl.id]}))}>{clOpen[cl.id]?'▾ Hide coverage':'▸ Show all '+cl.articles.length+' articles'}</button>
             <TalkToFridayButton contentType="article" title={cl.headline} summary={'Trending topic covered by '+cl.source_count+' sources: '+cl.sources.slice(0,3).join(', ')} style={{fontSize:10,padding:'2px 9px'}}/>
           </div>
           {clOpen[cl.id]&&<div className="cluster-list">
             {cl.articles.map((a,ai)=><div key={ai} className="cluster-item">
               <SentimentDot it={a}/>
               <a className="cluster-item-link" onClick={()=>{if(a.url){window.open(a.url,'_blank');newsRecord(a.source,'click',a.category)}}}>{a.title}</a>
               <span className="cluster-item-src"><TrustBadge it={a} compact={true}/>{a.source}</span>
             </div>)}
           </div>}
         </div>)}
       </div>}
       <div className="news-masonry">
         {streamItems.map((it,i)=><div key={it.id||i} className={'news-card cat-'+(it.color||'tech')+(i===0?' feature':'')}>
           <div className="news-cardtop">
             <span className="cat-chip">{it.category}</span>
             {cardActions(it)}
           </div>
           {it.breaking&&<span className="breaking-badge" style={{marginBottom:6,display:'inline-block'}}>● BREAKING</span>}
           <div className="news-headline" onClick={()=>it.url&&window.open(it.url,'_blank')}>{it.title}</div>
           <div className="news-snippet">{it.snippet}</div>
           <div className="source-row">
             <SentimentDot it={it}/>
             <span className="source-badge"><TrustBadge it={it}/>{it.source}</span>
             {it.boosted&&<span className="badge-amber" style={{fontSize:9,padding:'1px 6px'}}>⭐ Boosted</span>}
             {it.sentiment&&it.sentiment!=='neutral'&&<span className={it.sentiment==='positive'?'badge-cyan':'badge-amber'} style={{fontSize:9,padding:'1px 6px'}}>{it.sentiment==='positive'?'▲ Positive':'▼ Negative'}</span>}
             {savedUrls[it.url]&&<span className="badge-cyan" style={{fontSize:9,padding:'1px 6px'}}>🔖 Saved</span>}
             {annoBadge(it)}
           </div>
           <div className="news-meta">
             {it.reading_time>0&&<span>⏱ {it.reading_time} min read</span>}
             {it.published_at&&<span>{new Date(it.published_at).toLocaleDateString([],{month:'short',day:'numeric'})}</span>}
             <span style={{cursor:'pointer',color:'#7fb6c9'}} onClick={()=>{openBg(it.url);newsRecord(it.source,'click',it.category)}}>⧉ Background</span>
             <span style={{cursor:'pointer',color:'#7fb6c9'}} onClick={()=>{if(it.url){window.open(it.url,'_blank');newsRecord(it.source,'click',it.category)}}}>↗ Open article</span>
             <TalkToFridayButton contentType="article" title={it.title} summary={it.snippet} style={{marginLeft:'auto'}}/>
           </div>
           {i===0&&<div className="editorial-note"><b>Friday's note:</b> {editorialFor(it)}</div>}
           <div className="relevance-tag">{relevanceFor(it)}</div>
           <NewsWikiLink it={it}/>
           <DeepDive it={it} category={it.category}/>
           {annoBox(it)}
         </div>)}
       </div>
       {/* Infinite-scroll sentinel + loading spinner */}
       <div ref={feedSentinelRef} style={{height:1}}></div>
       {feedMore&&<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:'#7fb6c9',padding:'18px 0',fontSize:12}}><span className="gen-spinner"></span> Loading more stories…</div>}
       {!feedMore&&!feedHasMore&&feed.length>0&&<div style={{textAlign:'center',color:'#667',fontSize:11,padding:'16px 0'}}>— end of archive ({feed.length.toLocaleString()} loaded) —</div>}
       </div>}
      {/* Back-to-top floating button (appears after the first page scrolls off) */}
      {showTop&&<button className="btn" title="Back to top" onClick={()=>{if(feedTopRef.current)feedTopRef.current.scrollIntoView({behavior:'smooth',block:'start'})}} style={{position:'fixed',right:24,bottom:24,zIndex:50,borderRadius:'50%',width:44,height:44,fontSize:18,boxShadow:'0 4px 16px rgba(0,0,0,0.4)'}}>↑</button>}
    </div>}

    {/* ── FRONT PAGE TAB (AI-curated editorial) ── */}
    {tab==='frontpage'&&<div>
      {fpGen&&<div className="gen-progress"><span className="gen-spinner"></span><span>Friday is curating your Front Page — fetching every feed, scoring against your profile, writing the lead…</span></div>}
      {fpLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading your Front Page…</div>:
       !fp?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>
         No edition yet. Friday publishes automatically at 7 AM &amp; 6 PM Central — or hit ✨ Generate Front Page to make one now.
       </div>:
       <div>
         {/* Masthead */}
         <div className="fp-masthead">
           <div>
             <div className="fp-title">{fp.headline||"Friday's Front Page"}</div>
             <div className="fp-sub">{(fp.slot==='evening'?'Evening edition':'Morning edition')+(fp.generated_central?(' · '+fp.generated_central):'')}{fp.stats&&fp.stats.total_considered?(' · '+fp.stats.total_considered+' stories from '+fp.stats.sources+' sources'):''}</div>
           </div>
           {fpList.length>1&&<select className="input" style={{fontSize:11,maxWidth:200}} value={fp.id} onChange={e=>loadFpEdition(e.target.value)}>
             {fpList.map(e=><option key={e.id} value={e.id}>{e.date+' · '+(e.slot==='evening'?'PM':'AM')}</option>)}
           </select>}
         </div>
         {anchorReading&&<div className="fp-anchor-bar">
           <span className="fp-anchor-dot"></span>
           <span className="fp-anchor-label">🎙️ Now Reading: Front Page — speak any time to ask Friday about a story</span>
           <button className="fp-audio-btn close" title="End the live anchor briefing" onClick={stopAnchorBriefing}>⏹</button>
         </div>}
         {fp.day_in_context&&<div className="fp-daycontext">
           <div className="fp-daycontext-head">📅 Your day in context</div>
           <div className="fp-daycontext-body">{fp.day_in_context}</div>
         </div>}
         {/* Lead story */}
         {fp.lead&&<div className={'fp-lead cat-'+(fp.lead.color||'tech')}>
           <div className="news-cardtop">
             <span className="cat-chip">LEAD · {fp.lead.category}</span>{fp.lead.continuing?<span className="fp-badge update">UPDATE</span>:fp.lead.new_since_last?<span className="fp-badge new">NEW</span>:null}
             {cardActions(fp.lead)}
           </div>
           {fp.lead.breaking&&<span className="breaking-badge" style={{marginBottom:6,display:'inline-block'}}>● BREAKING</span>}
           <div className="fp-lead-headline" onClick={()=>fp.lead.url&&window.open(fp.lead.url,'_blank')}>{fp.lead.title}</div>
           <div className="fp-lead-snippet">{fp.lead.snippet}</div>

           {fp.contrarian_corner.title&&<div className="fp-contrarian-title" style={{cursor:fp.contrarian_corner.url?'pointer':'default'}} onClick={()=>fp.contrarian_corner.url&&window.open(fp.contrarian_corner.url,'_blank')}>{fp.contrarian_corner.title}</div>}
           <div className="fp-contrarian-note">{fp.contrarian_corner.note}</div>
           {fp.contrarian_corner.source&&<div className="fp-contrarian-src">— {fp.contrarian_corner.source}</div>}
         </div>}
         {(fp.competitor_watch||[]).length>0&&<div className="fp-section">
           <div className="fp-section-head fp-competitor-head"><span className="fp-section-title">🛰 Competitor Watch</span></div>

             </div>)}
           </div>
         </div>}

         {(fp.sections||[]).map((sec,si)=><div key={si} className="fp-section">

           </div>
           <div className="news-masonry">
             {(sec.articles||[]).map((it,i)=><div key={i} className={'news-card cat-'+(it.color||sec.color||'tech')}>
               <div className="news-cardtop"><span className="cat-chip">{it.source}</span>{it.continuing?<span className="fp-badge update">UPDATE</span>:it.new_since_last?<span className="fp-badge new">NEW</span>:null}{cardActions(it)}</div>{it.thread_update&&<div className="fp-thread sm"><b>New:</b> {it.thread_update}</div>}
               {it.breaking&&<span className="breaking-badge" style={{marginBottom:6,display:'inline-block'}}>● BREAKING</span>}
               <div className="news-headline" onClick={()=>it.url&&window.open(it.url,'_blank')}>{it.title}</div>
               <div className="news-snippet">{it.snippet}</div>
               <div className="source-row">
                 <span className="source-badge"><TrustBadge it={it}/>{it.source}</span>
                 {it.boosted&&<span className="badge-amber" style={{fontSize:9,padding:'1px 6px'}}>⭐</span>}
                 {savedUrls[it.url]&&<span className="badge-cyan" style={{fontSize:9,padding:'1px 6px'}}>🔖</span>}
                 {annoBadge(it)}
                 <TalkToFridayButton contentType="article" title={it.title} summary={it.snippet} style={{marginLeft:'auto'}}/>
               </div>
               {annoBox(it)}
             </div>)}
           </div>
         </div>)}
       </div>}
    </div>}

    {/* ── WEEKLY DIGEST TAB ── */}
    {tab==='weekly'&&<div>
      {wkLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading the Weekly Digest…</div>:
       !weekly?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>
         No weekly digest yet. Friday publishes one every Sunday at 8 AM Central.
         <div style={{marginTop:12}}><button className="btn active" style={{fontSize:11}} onClick={genWeekly} disabled={wkGen}>{wkGen?'Synthesizing…':'✨ Generate Weekly Digest'}</button></div>
       </div>:
       <div>
         <div className="fp-masthead">
           <div>
             <div className="fp-title">Weekly Digest</div>
             <div className="fp-sub">{(weekly.date_range||weekly.week||'')+(weekly.edition_count?(' · '+weekly.edition_count+' editions'):'')}</div>
           </div>
           <div style={{display:'flex',gap:6,alignItems:'center'}}>
             {wkList.length>1&&<select className="input" style={{fontSize:11,maxWidth:160}} value={weekly.id} onChange={e=>{const d=wkList.find(x=>x.id===e.target.value);if(d)setWeekly(d)}}>
               {wkList.map(w=><option key={w.id} value={w.id}>{w.week||w.id}</option>)}
             </select>}
             <button className="btn" style={{fontSize:11}} onClick={genWeekly} disabled={wkGen}>{wkGen?'Synthesizing…':'↻ Regenerate'}</button>
           </div>
         </div>
         {weekly.editorial&&<div className="fp-lead cat-business">
           <div className="news-cardtop"><span className="cat-chip">EDITORIAL TAKE</span></div>
           <div className="editorial-note" style={{marginTop:4}}><b>Friday's take:</b> {weekly.editorial}</div>
         </div>}
         {(weekly.top_stories||[]).length>0&&<div className="fp-section">
           <div className="fp-section-head cat-tech"><span className="fp-section-title">Top 5 Stories of the Week</span></div>
           <div className="wk-stories">
             {weekly.top_stories.map((s,si)=><div key={si} className="wk-story">
               <span className="wk-num">{si+1}</span>
               <div><div className="wk-story-title">{s.title}</div>{s.why&&<div className="wk-story-why">{s.why}</div>}</div>
             </div>)}
           </div>
         </div>}
         {(weekly.trends||[]).length>0&&<div className="fp-section">
           <div className="fp-section-head cat-science"><span className="fp-section-title">Trends</span></div>
           <div className="wk-trends">{weekly.trends.map((tr,ti)=><span key={ti} className="wk-trend">{tr}</span>)}</div>
         </div>}
       </div>}
    </div>}

    {/* ── EDITORIAL TAB (Friday's independent weekly opinion) ── */}
    {tab==='editorial'&&<div>
      {edLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading Friday's editorial…</div>:
       !editorial?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>
         No editorial yet. Friday writes one every Friday at 7 PM Central — her one fully independent space.
         <div style={{marginTop:12}}><button className="btn active" style={{fontSize:11}} onClick={genEditorial} disabled={edGen}>{edGen?'Writing…':"✨ Write this week's editorial"}</button></div>
       </div>:
       <div>
         <div className="ed-disclaimer">⚠ This editorial draws from my full source index, not your curated feed. My job here is to tell you what I actually think.</div>
         <div className="fp-masthead" style={{marginTop:12}}>
           <div>
             <div className="fp-title">Friday's Editorial</div>
             <div className="fp-sub">{(editorial.generated_central||editorial.week||'')+(editorial.regenerated?' · rewritten for stronger pushback':'')+(typeof editorial.independence_score==='number'?(' · independence '+editorial.independence_score.toFixed(2)):'')}</div>
           </div>
           <div style={{display:'flex',gap:6,alignItems:'center'}}>
             {edList.length>1&&<select className="input" style={{fontSize:11,maxWidth:160}} value={editorial.id} onChange={e=>loadEdWeek(e.target.value)}>
               {edList.map(w=><option key={w.id} value={w.id}>{w.week||w.id}</option>)}
             </select>}
             <button className="btn" style={{fontSize:11}} onClick={genEditorial} disabled={edGen}>{edGen?'Writing…':'↻ Rewrite'}</button>
             <TalkToFridayButton contentType="editorial" title={"Friday's Editorial"+(editorial.week?' — '+editorial.week:'')} summary={editorial.preview||''} style={{fontSize:10}}/>
           </div>
         </div>
         <div className="ed-body"><FridayDoc text={(editorial.markdown||'').replace(/^# .*(\r?\n)+/,'').replace(/^> .*(\r?\n)+/,'')}/></div>
         {edList.length>1&&<div className="fp-section" style={{marginTop:20}}>
           <div className="fp-section-head cat-media"><span className="fp-section-title">Past Editorials</span></div>
           <div className="ed-archive">
             {edList.map((w,wi)=><div key={wi} className={'ed-archive-item'+(editorial&&w.id===editorial.id?' active':'')} onClick={()=>loadEdWeek(w.id)}>
               <div className="ed-archive-week">{w.week||w.id}</div>
               {w.generated_central&&<div className="ed-archive-meta">{w.generated_central}</div>}
               {w.preview&&<div className="ed-archive-preview">{w.preview}</div>}
             </div>)}
           </div>
         </div>}
       </div>}
    </div>}

    {/* ── TRUST TAB (Source Trust Graph + Federation) ── */}
    {tab==='trust'&&<div>
      {/* Federation status */}
      <div className="fed-strip">
        <span className="fed-ico">🔗</span>
        <span><b>Federation</b> — {fedStatus?(fedStatus.signed_count||0):0} attestation{(fedStatus&&fedStatus.signed_count===1)?'':'s'} signed, {fedStatus?(fedStatus.imported_count||0):0} imported from peers</span>
        {fedStatus&&fedStatus.agent_id&&<span className="fed-id" title={'This agent’s Ed25519 identity: '+fedStatus.agent_id}>id {fedStatus.agent_id.slice(0,10)}…</span>}
        {fedStatus&&!fedStatus.agent_id&&<span className="fed-id" style={{color:'#f59e0b'}}>no signing key (install pynacl)</span>}
      </div>
      <div style={{fontSize:11,color:'#888',margin:'8px 0'}}>Friday scores every source on six dimensions, learned by cross-referencing claims across outlets on every fetch. Click a source for its breakdown and observation history.</div>
      {trustLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading source trust scores…</div>:
       trustBoard.length===0?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>No sources scored yet. Friday builds the graph as it fetches news — check back after a fetch cycle (every few minutes).</div>:
       <div className="trust-layout">
         {/* Leaderboard */}
         <div className="trust-board">
           <div className="trust-board-head">
             <span>Trust leaderboard</span>
             <span style={{color:'#777',fontWeight:400}}>{trustBoard.length} sources</span>
           </div>
           {trustBoard.map((s,i)=><div key={s.domain} className={'trust-row'+(trustSel===s.domain?' active':'')} onClick={()=>openTrustSource(s.domain)}>
             <span className="trust-rank">{i+1}</span>
             <span className={'trust-dot '+trustColor(s.trust_score)}></span>
             <span className="trust-row-name">{s.name||s.domain}</span>
             <span className="trust-row-score">{Number(s.trust_score).toFixed(2)}</span>
             <span className="trust-row-meta">{s.article_count||0} art · {s.observation_count||0} obs</span>
           </div>)}
         </div>
         {/* Detail */}
         <div className="trust-detail">
           {!trustSel?<div style={{color:'#888',fontSize:12,textAlign:'center',padding:40}}>Select a source to see its six-dimension breakdown, radar, and observation history.</div>:
            !trustDetail?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading {trustSel}…</div>:
            <div>
              <div className="trust-detail-head">
                <div>
                  <div className="trust-detail-name">{trustDetail.name||trustDetail.domain}</div>
                  <div className="trust-detail-sub">{trustDetail.domain} · {trustDetail.article_count||0} articles · first seen {trustDetail.first_seen||'—'}</div>
                </div>
                <div className={'trust-detail-score '+trustColor(trustDetail.trust_score)}>{Number(trustDetail.trust_score).toFixed(2)}</div>
              </div>
              <div className="trust-detail-grid">
                <TrustRadar scores={trustDetail.scores}/>
                <div className="trust-dimbars">
                  {TRUST_DIMS.map(([k,lbl])=>{const v=(trustDetail.scores||{})[k];return <div key={k} className="trust-dimbar">
                    <span className="trust-dimbar-lbl">{lbl}</span>
                    <span className="trust-dimbar-track"><span className={'trust-dimbar-fill '+trustColor(v)} style={{width:Math.round((Number(v)||0)*100)+'%'}}></span></span>
                    <span className="trust-dimbar-val">{v!=null?Number(v).toFixed(2):'—'}</span>
                  </div>})}
                </div>
              </div>
              <div className="trust-obs-head">Observation history ({(trustDetail.observations||[]).length})</div>
              <div className="trust-obs-list">
                {(trustDetail.observations||[]).length===0?<div style={{color:'#888',fontSize:11,padding:'8px 0'}}>No observations yet — this score is a seed estimate from known reputation.</div>:
                 trustDetail.observations.slice().reverse().slice(0,40).map((o,oi)=><div key={oi} className="trust-obs">
                   <span className={'trust-obs-dot '+trustColor(o.signal)}></span>
                   <span className="trust-obs-type">{o.type}</span>
                   <span className="trust-obs-dim">{(TRUST_DIMS.find(d=>d[0]===o.dimension)||[null,o.dimension])[1]}</span>
                   <span className="trust-obs-date">{o.date}</span>
                   {o.detail&&<div className="trust-obs-detail">{o.detail}{o.counter_sources&&o.counter_sources.length?(' — vs '+o.counter_sources.slice(0,4).join(', ')):''}</div>}
                   {o.signed_by&&o.signed_by!=='local'&&<span className="trust-obs-peer" title={'imported attestation from '+o.signed_by}>peer</span>}
                 </div>)}
              </div>
            </div>}
         </div>
       </div>}
    </div>}

    {/* ── READ LATER TAB ── */}
    {tab==='readlater'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:11,color:'#888'}}>{readLater.length} saved article{readLater.length===1?'':'s'}</div>
        {readLater.length>0&&<button className="btn" style={{fontSize:10,padding:'2px 8px'}} onClick={()=>{if(confirm('Clear all saved articles?')){fetch('/api/news/read-later?clear=1',{method:'DELETE'}).then(()=>loadReadLater())}}}>Clear all</button>}
      </div>
      {rlLoading?<div style={{color:'#999',textAlign:'center',padding:40}}>Loading saved articles…</div>:
       readLater.length===0?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>Nothing saved yet. Hit 🏷 on any story to save it here for later.</div>:
       <div className="news-masonry">
         {readLater.map((it,i)=><div key={it.url||i} className={'news-card cat-'+(it.color||'tech')}>
           <div className="news-cardtop">
             <span className="cat-chip">{it.category||it.source}</span>
             <div className="src-actions">
               <button className="src-btn bg" title="Open in background tab" onClick={e=>{e.stopPropagation();openBg(it.url)}}>⧉</button>
               <button className="src-btn ban" title="Remove from Read Later" onClick={e=>{e.stopPropagation();removeLater(it.url)}}>✕</button>
             </div>
           </div>
           <div className="news-headline" onClick={()=>it.url&&window.open(it.url,'_blank')}>{it.title}</div>
           {it.snippet&&<div className="news-snippet">{it.snippet}</div>}
           <div className="source-row">
             <span className="source-badge"><span className="trust-dot green"></span>{it.source}</span>
             {it.saved_at&&<span style={{fontSize:9,color:'#777'}}>saved {new Date(it.saved_at).toLocaleDateString()}</span>}
           </div>
           <div className="news-meta">
             <span style={{cursor:'pointer',color:'#7fb6c9'}} onClick={()=>it.url&&window.open(it.url,'_blank')}>↗ Open article</span>
           </div>
         </div>)}
       </div>}
    </div>}

    {/* ── MY NOTES TAB (annotations) ── */}
    {tab==='notes'&&<div>
      <div style={{fontSize:11,color:'#888',marginBottom:8}}>{annotations.length} note{annotations.length===1?'':'s'} across your articles, newest first</div>
      {annotations.length===0?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:36}}>No notes yet. Hit 📝 on any story to jot a thought — commentary, a reminder, an insight — and it'll collect here.</div>:
       <div className="news-masonry">
         {annotations.map((n,i)=><div key={i} className="news-card cat-tech">
           <div className="news-cardtop">
             <span className="cat-chip">📝 Note</span>
             <div className="src-actions">
               {n.article_url&&<button className="src-btn bg" title="Open article" onClick={()=>openBg(n.article_url)}>⧉</button>}

           </div>
           <div className="news-snippet" style={{color:'#e0e4ee',fontStyle:'italic'}}>“{n.text}”</div>
           {n.article_title&&<div className="news-headline" style={{fontSize:13,cursor:n.article_url?'pointer':'default'}} onClick={()=>n.article_url&&window.open(n.article_url,'_blank')}>{n.article_title}</div>}
           <div className="source-row">
             <span style={{fontSize:9,color:'#777'}}>{n.timestamp?new Date(n.timestamp).toLocaleString():''}</span>
           </div>
         </div>)}
       </div>}
    </div>}

    {/* ── BRIEFINGS TAB ── */}
    {tab==='briefings'&&<div>
      <FridaySays text={briefings.length+' briefings in archive. Most recent is open below.'}/>
      <div style={{display:'flex',gap:6,alignItems:'center',margin:'8px 0'}}>
        <input className="input" style={{flex:1,fontSize:11}} value={briefSearch} onChange={e=>setBriefSearch(e.target.value)} placeholder="Filter by date (e.g. 2026-06)"/>
      </div>
      {loading?<div style={{color:'#999',textAlign:'center',padding:30}}>Loading archive…</div>:
       filteredBriefs.length===0?<div style={{color:'#999',fontSize:12,textAlign:'center',padding:20}}>No briefings match. The daily briefing runs at 7:32 AM — or hit ✨ Generate Now.</div>:
       filteredBriefs.map((b,i)=>{const isOpen=expanded[b.date];return(
       <div key={b.date||i} className={'brief-card'+(isOpen?' expanded':'')} onClick={()=>!isOpen&&setExpanded({...expanded,[b.date]:true})}>
         <div className="brief-cardhead">

           <div style={{display:'flex',gap:4,alignItems:'center'}}>
             <button className="btn" style={{fontSize:10,padding:'2px 7px'}} onClick={e=>{e.stopPropagation();openBriefing(b)}}>Open full</button>
             <button className="btn" style={{fontSize:10,padding:'2px 7px'}} onClick={e=>{e.stopPropagation();openInTab(b)}}>New tab</button>
             <TalkToFridayButton contentType="briefing" title={'Briefing '+b.date} summary={b.summary||''} style={{fontSize:10,padding:'2px 9px'}}/>
             <button className="icon-btn" onClick={e=>{e.stopPropagation();setExpanded({...expanded,[b.date]:!isOpen})}}>{isOpen?'▴':'▾'}</button>
           </div>
         </div>
         {isOpen?<BriefPreview b={b} onFull={()=>openBriefing(b)}/>:
          <div className="brief-preview">{b.html?'HTML + Markdown':'Markdown'} briefing · {b.size?(Math.round(b.size/1024)+' KB'):''} — click to preview.</div>}
       </div>)})}
    </div>}

    {/* ── SLIDE-OVER PANELS ── */}
    {panel&&<div className="news-backdrop" onClick={()=>setPanel(null)}></div>}
    {panel==='sources'&&<div className="news-side">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3>🛡 MANAGE SOURCES</h3><button className="icon-btn" onClick={()=>setPanel(null)}>✕</button></div>
      <div style={{fontSize:10,color:'#777',marginBottom:8}}>Banned sources are excluded from the feed and every future briefing.</div>
      <div className="card-title" style={{marginTop:8}}>🚫 Banned ({sources.banned.length})</div>
      {sources.banned.length===0?<div style={{fontSize:11,color:'#777',marginBottom:10}}>None banned yet.</div>:
       sources.banned.map(s=><div key={s} className="manage-row"><span><span className="trust-dot red" style={{display:'inline-block',marginRight:7}}></span>{s}</span><button className="btn" style={{fontSize:10,padding:'2px 7px'}} onClick={()=>unban(s)}>Undo</button></div>)}
      <div className="card-title" style={{marginTop:14}}>⭐ Boosted ({sources.boosted.length})</div>
      {sources.boosted.length===0?<div style={{fontSize:11,color:'#777'}}>None boosted yet. Hit ⭐ on any story to prioritize that source.</div>:
       sources.boosted.map(s=><div key={s} className="manage-row"><span><span className="trust-dot green" style={{display:'inline-block',marginRight:7}}></span>{s}</span><button className="btn" style={{fontSize:10,padding:'2px 7px'}} onClick={()=>unboost(s)}>Remove</button></div>)}
      <div style={{marginTop:14,display:'flex',gap:4}}>
        <input className="input" style={{flex:1,fontSize:11}} id="ban-add" placeholder="domain to ban (e.g. example.com)" onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){const v=e.target.value.trim();e.target.value='';fetch('/api/sources/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:v})}).then(()=>{loadSources();loadFeed(true)})}}}/>
      </div>
    </div>}
    {panel==='customize'&&prefs&&<div className="news-side">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3>⚙ CUSTOMIZE BRIEFING</h3><button className="icon-btn" onClick={()=>setPanel(null)}>✕</button></div>
      <div className="card-title" style={{marginTop:8}}>Section order & visibility</div>
      {prefs.section_order.map((s,i)=><div key={s} className="reorder-row">
        <div style={{display:'flex',flexDirection:'column',gap:1}}>
          <button className="icon-btn" style={{lineHeight:1,padding:0}} onClick={()=>moveSection(i,-1)} disabled={i===0}>▴</button>

        </div>
        <span style={{flex:1,fontSize:12,color:prefs.sections_enabled[s]?'#e0e4ee':'#666'}}>{s}</span>
        <span className={'toggle-pill '+(prefs.sections_enabled[s]?'on':'')} onClick={()=>toggleSection(s)}>{prefs.sections_enabled[s]?'Shown':'Hidden'}</span>
      </div>)}
      <div className="card-title" style={{marginTop:14}}>News categories</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {(cats.length?cats.map(c=>c.name):Object.keys(prefs.categories_enabled)).map(c=>
          <span key={c} className={'toggle-pill '+(prefs.categories_enabled[c]?'on':'')} onClick={()=>toggleCat(c)}>{c}</span>)}
      </div>
      <div style={{fontSize:10,color:'#777',marginTop:10}}>Changes save instantly and shape your next ✨ Generate Now and the live feed.</div>
    </div>}
    {panel==='diet'&&<div className="news-side">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3>📊 YOUR MEDIA DIET</h3><button className="icon-btn" onClick={()=>setPanel(null)}>✕</button></div>
      <div style={{fontSize:10,color:'#777',marginBottom:8}}>How you engage with the news — what you read, save, boost, and ban.</div>
      {dietLoading?<div style={{color:'#999',textAlign:'center',padding:24,fontSize:12}}>Loading…</div>:!diet?<div style={{fontSize:11,color:'#777'}}>No engagement data yet. Read, save, boost, or ban a few stories and your diet will fill in.</div>:<div>
        <div className="card-title" style={{marginTop:8}}>Articles read by category</div>
        {(()=>{const cats=diet.categories||{};const keys=Object.keys(cats);const max=Math.max(1,...keys.map(k=>cats[k]));return keys.length===0?<div style={{fontSize:11,color:'#777'}}>Nothing read yet.</div>:keys.sort((a,b)=>cats[b]-cats[a]).map(k=><div key={k} className="diet-bar-row"><span className="diet-bar-label">{k}</span><span className="diet-bar-track"><span className="diet-bar-fill" style={{width:Math.round(cats[k]/max*100)+'%'}}></span></span><span className="diet-bar-num">{cats[k]}</span></div>)})()}
        <div className="card-title" style={{marginTop:16}}>⭐ Most engaged sources</div>
        {(diet.most_engaged||[]).length===0?<div style={{fontSize:11,color:'#777'}}>None yet.</div>:(diet.most_engaged||[]).map(s=><div key={s.source} className="manage-row"><span><span className="trust-dot green" style={{display:'inline-block',marginRight:7}}></span>{s.source}</span><span style={{fontSize:10,color:'#7fb6c9'}}>{s.clicks||0} read · {s.read_laters||0} saved · {s.boosts||0} boosted</span></div>)}
        <div className="card-title" style={{marginTop:16}}>🚫 Least engaged sources</div>
        {(diet.least_engaged||[]).length===0?<div style={{fontSize:11,color:'#777'}}>None yet.</div>:(diet.least_engaged||[]).map(s=><div key={s.source} className="manage-row"><span><span className="trust-dot red" style={{display:'inline-block',marginRight:7}}></span>{s.source}</span><span style={{fontSize:10,color:'#888'}}>{s.bans||0} banned · {s.ignores||0} ignored</span></div>)}
        <div style={{fontSize:10,color:'#667',marginTop:14}}>{diet.total_sources||0} source{diet.total_sources===1?'':'s'} tracked.</div>
      </div>}
    </div>}
  </div>);
}

// Lazy-loaded 3-line preview of a past briefing's key items.
function BriefPreview({b,onFull}){
  const[txt,setTxt]=useState('');const[busy,setBusy]=useState(true);
  useEffect(()=>{let on=true;const file=b.md||b.html||(b.name+'.md');fetch('/api/briefing/'+file).then(r=>r.json()).then(d=>{if(!on)return;let c=d.content||'';if(d.is_html)c=c.replace(/<[^>]*>/g,' ');c=c.replace(/[#*_>`]/g,'').replace(/\s+/g,' ').trim();setTxt(c.substring(0,360));setBusy(false)}).catch(()=>{if(on)setBusy(false)});return()=>{on=false}},[b]);
  if(busy)return <div className="brief-preview" style={{color:'#666'}}>Loading preview…</div>;
  return(<div>
    <div className="brief-preview" style={{WebkitLineClamp:3}}>{txt||'No preview available.'}</div>
    <button className="btn" style={{fontSize:10,marginTop:8,padding:'3px 9px'}} onClick={onFull}>Read full briefing →</button>
  </div>);
}

// ═══════════════════════════════════════════════════════════════
//  MESSAGES — "Friday's Comms Center"
//  Smart-triage inbox. Every message is auto-classified server-side into
//  lanes; this UI presents lane tabs, glassmorphism cards, inline thread
//  expansion, Friday-drafted replies, and archive/snooze/flag actions.
// ═══════════════════════════════════════════════════════════════
const MSG_LANE_META={
  all:{label:'All',ico:'📥'},
  career:{label:'Career',ico:'💼'},finance:{label:'Finance',ico:'💰'},
  futurespeak:{label:'Projects',ico:'🚀'},
  family:{label:'Family',ico:'👪'},subscriptions:{label:'Subscriptions',ico:'📰'},
  noise:{label:'Noise',ico:'🔇'},
};
function fmtWhen(ts){
  if(!ts)return'';const d=new Date(ts);if(isNaN(d))return'';
  const now=new Date();const diff=(now-d)/1000;
  if(diff<60)return'now';if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400&&now.getDate()===d.getDate())return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  if(diff<604800)return d.toLocaleDateString([],{weekday:'short'});
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function laneStyle(lane){return {'--lc':`var(--lane-${lane||'noise'})`};}

function MessagesWS(){
  const[lane,setLane]=useState('all');
  const[msgs,setMsgs]=useState([]);const[loading,setLoading]=useState(true);const[source,setSource]=useState('');
  const[stats,setStats]=useState({counts:{},actionable:0});const[lanes,setLanes]=useState([]);
  const[expanded,setExpanded]=useState(null);const[thread,setThread]=useState(null);const[threadLoad,setThreadLoad]=useState(false);
  const[search,setSearch]=useState('');const[filterUnread,setFilterUnread]=useState(false);const[filterAttach,setFilterAttach]=useState(false);
  const[draftFor,setDraftFor]=useState(null);const[draftText,setDraftText]=useState('');const[draftBusy,setDraftBusy]=useState(false);const[draftInstr,setDraftInstr]=useState('');
  const[toast,setToast]=useState('');
  // Deep-link: a notification target {workspace:'messages', lane, thread_id} jumps
  // to the lane and (best-effort) auto-opens the thread once messages have loaded.
  const pendingThread=useRef(null);
  useNavTarget('messages',t=>{if(t.lane)setLane(t.lane);if(t.thread_id)pendingThread.current=t.thread_id;});

  const loadStats=()=>fetch('/api/messages/stats').then(r=>r.json()).then(d=>{setStats(d);if(d.lanes)setLanes(d.lanes);window._fridayMsgActionable=d.actionable||0;}).catch(()=>{});
  const loadMsgs=()=>{setLoading(true);const q=lane==='all'?'':('?lane='+lane);fetch('/api/messages'+q).then(r=>r.json()).then(d=>{setMsgs(d.messages||[]);setSource(d.source||'');if(d.lanes)setLanes(d.lanes);setLoading(false)}).catch(()=>setLoading(false))};
  useEffect(()=>{loadStats()},[]);
  useEffect(()=>{loadMsgs()},[lane]);

  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2200)};
  const openThread=(m)=>{if(expanded===m.id){setExpanded(null);setThread(null);return}setExpanded(m.id);setThread(null);setThreadLoad(true);setDraftFor(null);
    if(m.unread)act(m,'read',true);
    fetch('/api/messages/'+m.thread_id).then(r=>r.json()).then(d=>{setThread(d.messages||[]);setThreadLoad(false)}).catch(()=>setThreadLoad(false))};
  // Once messages for the deep-linked lane arrive, open the targeted thread.
  useEffect(()=>{
    if(!pendingThread.current||!msgs.length)return;
    const want=pendingThread.current;
    const m=msgs.find(x=>x.thread_id===want||x.id===want);
    if(m){pendingThread.current=null;if(expanded!==m.id)openThread(m);}
  },[msgs]);
  const act=async(m,action,silent)=>{try{await fetch('/api/messages/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:m.id,action})});
    if(action==='archive'){setMsgs(x=>x.filter(z=>z.id!==m.id));if(expanded===m.id){setExpanded(null);setThread(null)}}
    else setMsgs(x=>x.map(z=>z.id===m.id?{...z,flagged:action==='flag'?true:action==='unflag'?false:z.flagged,unread:action==='read'?false:action==='unread'?true:z.unread}:z));
    if(!silent)flash(action.charAt(0).toUpperCase()+action.slice(1)+'d');loadStats()}catch(e){}};
  const reclassify=async(m,newLane)=>{try{await fetch('/api/messages/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:m.id,lane:newLane})});setMsgs(x=>x.map(z=>z.id===m.id?{...z,lane:newLane}:z));flash('Moved to '+(MSG_LANE_META[newLane]?.label||newLane));loadStats()}catch(e){}};
  const draft=async(m)=>{setDraftFor(m.id);setDraftBusy(true);setDraftText('');
    try{const r=await fetch('/api/messages/draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:m.id,sender:m.sender_email||m.sender,subject:m.subject,snippet:m.snippet,lane:m.lane,instructions:draftInstr})});const d=await r.json();setDraftText(d.draft||('[Error: '+(d.message||'draft failed')+']'))}catch(e){setDraftText('[Error generating draft]')}setDraftBusy(false)};

  const laneList=lanes.length?lanes:Object.keys(MSG_LANE_META).filter(k=>k!=='all').map(id=>({id,label:MSG_LANE_META[id].label}));
  const q=search.trim().toLowerCase();
  const shown=msgs.filter(m=>{
    if(filterUnread&&!m.unread)return false;
    if(filterAttach&&!m.has_attachment)return false;
    if(q&&!((m.sender||'').toLowerCase().includes(q)||(m.subject||'').toLowerCase().includes(q)||(m.snippet||'').toLowerCase().includes(q)))return false;
    return true;
  });
  // Career pipeline stats from subjects (lightweight heuristic on cached cards).
  const careerMsgs=(stats.counts?.career||0);
  const pipeApplied=msgs.filter(m=>/appl/i.test(m.subject||'')).length;
  const pipeResp=msgs.filter(m=>m.lane==='career').length;
  const pipeInterview=msgs.filter(m=>/interview|phone screen|onsite/i.test(m.subject||'')).length;

  return(<div className="msg-ws" style={{position:'relative'}}>
    <FridaySays text={stats.actionable>0?(stats.actionable+' message'+(stats.actionable>1?'s':'')+' need your attention'+(source==='cache'?' · showing cached mail (Gmail not linked live)':source==='empty'?' · no mail cached yet — link Google to populate':'')) :('Inbox triaged into '+laneList.length+' lanes'+(source==='empty'?' · no mail yet — link Google or wait for the next heartbeat':''))}/>

    {/* Lane tabs */}
    <div className="lane-tabs">
      {['all',...laneList.map(l=>l.id)].map(id=>{const cnt=id==='all'?(stats.total||0):(stats.counts?.[id]||0);const meta=MSG_LANE_META[id]||{label:id,ico:'•'};
        return(<div key={id} className={'lane-tab'+(lane===id?' active':'')} style={laneStyle(id)} onClick={()=>setLane(id)}>
          <span className="lane-dot"></span><span>{meta.ico} {meta.label}</span>{cnt>0&&<span className="lane-count">{cnt}</span>}
        </div>);
      })}
    </div>

    {/* Career pipeline bar */}
    {(lane==='career'||lane==='all')&&careerMsgs>0&&<div className="msg-pipeline">
      <div className="pl-stat"><span className="pl-num">{pipeApplied}</span><span className="pl-lbl">Applications</span></div>
      <span className="pl-arrow">→</span>
      <div className="pl-stat"><span className="pl-num">{pipeResp}</span><span className="pl-lbl">Responses</span></div>
      <span className="pl-arrow">→</span>
      <div className="pl-stat"><span className="pl-num">{pipeInterview}</span><span className="pl-lbl">Interviews</span></div>
      <div style={{marginLeft:'auto',fontSize:10,color:'#8fb8c8'}}>Career lane · live triage</div>
    </div>}

    {/* Toolbar + filters */}
    <div className="msg-toolbar">
      <div className="msg-filters">
        <input className="input" style={{fontSize:11,width:200}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search messages…"/>
        <span className={'toggle-pill '+(filterUnread?'on':'')} onClick={()=>setFilterUnread(v=>!v)}>Unread</span>
        <span className={'toggle-pill '+(filterAttach?'on':'')} onClick={()=>setFilterAttach(v=>!v)}>📎 Attachments</span>
      </div>
      <div style={{display:'flex',gap:4,alignItems:'center'}}>
        {toast&&<span style={{fontSize:11,color:'#00d4ff'}}>{toast}</span>}
        <button className="btn" style={{fontSize:11}} onClick={()=>{loadMsgs();loadStats()}}>↻ Refresh</button>
      </div>
    </div>

    {/* Message list */}
    {loading?<div className="msg-empty">Triaging your inbox…</div>:
     shown.length===0?<div className="msg-empty">No messages{lane!=='all'?(' in '+(MSG_LANE_META[lane]?.label||lane)):''}{q?' matching “'+search+'”':''}. {source==='empty'?'Link Google or wait for the next heartbeat to populate.':'Try another lane or clear filters.'}</div>:
     <div className="msg-list">
       {shown.map(m=>{const open=expanded===m.id;return(
        <div key={m.id} className={'msg-card'+(m.unread?' unread':'')+(open?' expanded':'')} style={laneStyle(m.lane)} onClick={()=>openThread(m)}>
          <div className="msg-avatar">{m.initial}</div>
          <div className="msg-body">
            <div className="msg-cardtop">
              <span className="msg-sender">{m.sender}</span>
              <span className="msg-lane-badge">{MSG_LANE_META[m.lane]?.label||m.lane}</span>
              {m.flagged&&<span title="Flagged" style={{fontSize:11}}>🚩</span>}
              {m.has_attachment&&<span title="Attachment" style={{fontSize:11}}>📎</span>}
              <span className="msg-time">{fmtWhen(m.timestamp)}</span>
              {m.unread&&<span className="msg-dot-unread"></span>}
            </div>
            <div className="msg-subject">{m.subject}</div>
            <div className="msg-snippet">{m.snippet}</div>
            {m.related_event&&<div style={{fontSize:10,color:'#a78bfa',marginTop:5,fontStyle:'italic'}}>📅 Related event: {m.related_event.title}{m.related_event.start_time?(' · '+fmtWhen(m.related_event.start_time)):''}</div>}

            {open&&<div onClick={e=>e.stopPropagation()}>
              {threadLoad?<div style={{fontSize:11,color:'#00d4ff',padding:'8px 0'}}>Loading thread…</div>:
               thread&&thread.length>0&&<div className="msg-thread">
                 {thread.map((tm,i)=><div key={i} className="msg-thread-item">
                   <div className="tm-head"><b style={{color:'#cdd3e0'}}>{tm.sender}</b><span style={{marginLeft:'auto'}}>{fmtWhen(tm.timestamp)}</span></div>
                   <div className="tm-body">{tm.body||tm.snippet}</div>
                 </div>)}
               </div>}

              {/* Actions */}
              <div className="msg-actions" style={{opacity:1}}>
                <span className="mini-btn" onClick={()=>draft(m)}>💬 Reply with Friday</span>
                <span className="mini-btn" onClick={()=>act(m,'archive')}>🗄 Archive</span>
                <span className="mini-btn" onClick={()=>act(m,'snooze')}>😴 Snooze 4h</span>
                <span className={'mini-btn'+(m.flagged?' flagged':'')} onClick={()=>act(m,m.flagged?'unflag':'flag')}>{m.flagged?'🚩 Unflag':'🏳 Flag'}</span>
                <select className="mini-btn" style={{cursor:'pointer'}} value={m.lane} onChange={e=>reclassify(m,e.target.value)} title="Reclassify">
                  {laneList.map(l=><option key={l.id} value={l.id}>{MSG_LANE_META[l.id]?.label||l.label}</option>)}
                </select>
              </div>

              {/* Draft panel */}
              {draftFor===m.id&&<div className="msg-draft-panel">
                <div style={{display:'flex',gap:6,marginBottom:6}}>
                  <input className="input" style={{flex:1,fontSize:11}} value={draftInstr} onChange={e=>setDraftInstr(e.target.value)} placeholder="Optional: how should Friday angle this reply?"/>
                  <button className="btn" style={{fontSize:11}} onClick={()=>draft(m)} disabled={draftBusy}>{draftBusy?'…':'↻ Regenerate'}</button>
                </div>
                {draftBusy&&!draftText?<div style={{fontSize:11,color:'#b794f6'}}>Friday is drafting a reply…</div>:
                 <><textarea value={draftText} onChange={e=>setDraftText(e.target.value)}/>
                   <div style={{display:'flex',gap:6,marginTop:6}}>
                     <button className="btn" style={{fontSize:11}} onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(draftText);flash('Copied draft')}}>📋 Copy</button>
                     <SendTo content={()=>draftText} dataType="email_reply" emailThreadId={m.thread_id} options={[{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},{label:'Draft Email',dest:'gmail_draft',ico:'✉️'}]}/>
                     <button className="btn btn-magenta" style={{fontSize:11}} onClick={()=>setDraftFor(null)}>Close</button>
                   </div></>}
              </div>}
            </div>}
          </div>
        </div>);
       })}
     </div>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════
//  CALENDAR — "Friday's Time Intelligence"
//  Today timeline (6AM→midnight) with a live now-line, gap labels,
//  interview prep badges, a 7-day week strip,
//  tomorrow preview, and natural-language quick-add.
// ═══════════════════════════════════════════════════════════════
const CAL_START_HOUR=6, CAL_END_HOUR=24, CAL_HOUR_PX=52;
function calY(iso){const d=new Date(iso);if(isNaN(d))return 0;const h=d.getHours()+d.getMinutes()/60;return Math.max(0,(h-CAL_START_HOUR)*CAL_HOUR_PX);}
function calFmtTime(iso){const d=new Date(iso);if(isNaN(d))return'';return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}

function CalendarWS(){
  const[today,setToday]=useState(null);const[loading,setLoading]=useState(true);
  const[week,setWeek]=useState([]);const[sel,setSel]=useState(null);// selected date iso (null=today)
  const[dayData,setDayData]=useState(null);
  const[tomorrow,setTomorrow]=useState(null);
  const[now,setNow]=useState(new Date());
  const[quick,setQuick]=useState('');const[adding,setAdding]=useState(false);
  const[prepFor,setPrepFor]=useState(null);const[prepText,setPrepText]=useState('');const[prepBusy,setPrepBusy]=useState(false);
  const[toast,setToast]=useState('');
  const tlRef=useRef(null);
  // Deep-link: a notification target {workspace:'calendar', date} selects that day.
  useNavTarget('calendar',t=>{if(t.date)setSel(t.date);});

  const loadToday=()=>fetch('/api/calendar/today').then(r=>r.json()).then(d=>{setToday(d);setLoading(false)}).catch(()=>setLoading(false));
  const loadWeek=()=>fetch('/api/calendar/week').then(r=>r.json()).then(d=>setWeek(d.days||[])).catch(()=>{});
  const loadTomorrow=()=>fetch('/api/calendar/tomorrow').then(r=>r.json()).then(setTomorrow).catch(()=>{});
  const loadDay=(iso)=>fetch('/api/calendar/day/'+iso).then(r=>r.json()).then(setDayData).catch(()=>{});
  useEffect(()=>{loadToday();loadWeek();loadTomorrow();
    const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t)},[]);

  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2400)};
  const pickDay=(iso,isToday)=>{if(isToday){setSel(null);setDayData(null)}else{setSel(iso);loadDay(iso)}setPrepFor(null)};
  const quickAdd=async()=>{if(!quick.trim()||adding)return;setAdding(true);
    try{const r=await fetch('/api/calendar/quick-add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:quick})});const d=await r.json();
      if(d.status==='ok'){flash((d.created_in_google?'Added to Google Calendar':'Added (stored locally)')+': '+d.event.title);setQuick('');loadToday();loadWeek();loadTomorrow();if(sel)loadDay(sel)}
      else flash('Could not parse that — try “interview with Acme Tuesday 2pm”')}
    catch(e){flash('Quick-add failed')}setAdding(false)};
  const genPrep=async(ev)=>{if(prepFor===ev.id){setPrepFor(null);return}setPrepFor(ev.id);setPrepBusy(true);setPrepText('');
    try{const r=await fetch('/api/calendar/prep/'+ev.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});const d=await r.json();setPrepText(d.prep||('[Error: '+(d.message||'prep failed')+']'))}catch(e){setPrepText('[Error generating prep]')}setPrepBusy(false)};

  const active=sel?dayData:today;
  const events=(active?.events)||[];
  const gaps=(active?.gaps)||[];
  const allDay=events.filter(e=>e.all_day);
  const timed=events.filter(e=>!e.all_day);
  const conflicts=timed.filter(e=>e.conflict);
  const hours=[];for(let h=CAL_START_HOUR;h<CAL_END_HOUR;h++)hours.push(h);
  const showNow=!sel; // only show now-line on the actual today view
  const nowY=calY(now.toISOString());const nowVisible=now.getHours()>=CAL_START_HOUR;

  if(loading)return <div style={{color:'#999',textAlign:'center',padding:40}}>Loading your day…</div>;

  return(<div className="cal-ws" style={{position:'relative'}}>
    <FridaySays text={(active?.annotation)||'Your timeline is ready.'}/>

    {/* Quick add */}
    <div className="cal-quickadd">
      <input className="input" style={{flex:1}} value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==='Enter'&&quickAdd()} placeholder="Quick add — e.g. “interview with Acme Tuesday 2pm”"/>
      <button className="btn active" onClick={quickAdd} disabled={adding}>{adding?'Parsing…':'✨ Add'}</button>
    </div>
    {toast&&<div style={{fontSize:11,color:'#00d4ff',marginBottom:8}}>{toast}</div>}

    {/* Week strip */}
    <div className="cal-week">
      {week.map(d=><div key={d.date} className={'cal-day'+(d.is_today?' today':'')+((sel===d.date||(!sel&&d.is_today))?' selected':'')+(d.has_career?' career':'')} onClick={()=>pickDay(d.date,d.is_today)}>
        <div className="cal-dow">{d.weekday}</div>
        <div className="cal-daynum">{d.day}</div>
        <div className="cal-dots">{d.count>0&&[...Array(Math.min(3,d.count))].map((_,i)=><span key={i} className={'dd '+d.density}></span>)}</div>
      </div>)}
    </div>

    {/* Conflict warnings */}
    {conflicts.length>0&&<div className="cal-conflict-warn">⚠️ {conflicts.length} overlapping event{conflicts.length>1?'s':''} — {conflicts.map(c=>c.title).join(', ')}</div>}

    <div className="cal-section-title">{sel?new Date(sel+'T00:00').toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'}):'Today · '+now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'})}</div>

    {/* All-day events */}
    {allDay.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
      {allDay.map(e=><span key={e.id} className={'cal-event '+(e.type||'normal')} style={{position:'static',display:'inline-block'}}>{e.title} <span style={{color:'#8a93a6',fontSize:10}}>(all day)</span></span>)}
    </div>}

    {/* Timeline */}
    {timed.length===0&&gaps.length===0?<div className="msg-empty">No timed events. {sel?'':'Enjoy the open day, or quick-add something above.'}</div>:
    <div className="cal-timeline" ref={tlRef} style={{position:'relative',height:(CAL_END_HOUR-CAL_START_HOUR)*CAL_HOUR_PX+10}}>
      {hours.map(h=><div key={h} className="cal-hour" style={{height:CAL_HOUR_PX}}>
        <span className="cal-hour-label">{h===12?'12 PM':h===0||h===24?'12 AM':h<12?h+' AM':(h-12)+' PM'}</span>
      </div>)}

      {/* Gap labels */}
      {gaps.map((g,i)=>{const top=calY(g.start_time);const ht=Math.max(18,calY(g.end_time)-top);return(
        <div key={'g'+i} className="cal-gap" style={{top,height:ht}}>{g.label} · {g.minutes>=60?Math.floor(g.minutes/60)+'h '+(g.minutes%60?g.minutes%60+'m':''):g.minutes+'m'}</div>);
      })}

      {/* Events */}
      {timed.map(e=>{const top=calY(e.start_time);const end=calY(e.end_time)||top+CAL_HOUR_PX;const ht=Math.max(34,end-top);const open=prepFor===e.id;return(
        <div key={e.id} className={'cal-event '+(e.type||'normal')+(e.conflict?' conflict':'')} style={{top,minHeight:ht,height:open?'auto':ht}} onClick={()=>e.prep_available&&genPrep(e)}>
          <div className="cal-ev-title">{e.title}</div>
          <div className="cal-ev-meta">
            <span>{calFmtTime(e.start_time)}{e.end_time?(' – '+calFmtTime(e.end_time)):''}</span>
            {e.location&&<span>📍 {e.location}</span>}
            {e.attendees&&e.attendees.length>0&&<span>👥 {e.attendees.length}</span>}
            {e.countdown&&<span className="cal-countdown">⏳ {e.title.split(' ')[0]} in {e.countdown}</span>}
            {e.prep_available&&<span className="cal-prep-badge">Prep available</span>}
            {e.related_emails&&e.related_emails.length>0&&<span style={{color:'#00d4ff'}}>✉ {e.related_emails.length} related</span>}
          </div>
          {open&&<div onClick={ev=>ev.stopPropagation()} style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.08)'}}>
            {e.related_emails&&e.related_emails.length>0&&<div style={{fontSize:10,color:'#8fb8c8',marginBottom:6}}>Related threads: {e.related_emails.map(r=>r.subject).join(' · ')}</div>}
            {prepBusy&&!prepText?<div style={{fontSize:11,color:'#c4b5fd'}}>Friday is building your prep card…</div>:
             <><FridayDoc text={prepText} compact style={{fontSize:11}}/>
               <div style={{display:'flex',gap:6,marginTop:6}}>
                 <button className="btn" style={{fontSize:10}} onClick={()=>genPrep(e)} disabled={prepBusy}>↻ Regenerate</button>
                 <SendTo content={()=>prepText} dataType="meeting_prep" eventId={e.id} options={[{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},{label:'Send to Calendar',dest:'calendar_notes',ico:'📅'}]}/>
               </div></>}
          </div>}
        </div>);
      })}

      {/* Now line */}
      {showNow&&nowVisible&&<div className="cal-now-line" style={{top:nowY}}><span className="now-time">{now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span></div>}
    </div>}

    {/* Tomorrow preview */}
    {!sel&&tomorrow&&tomorrow.events&&tomorrow.events.length>0&&<div>
      <div className="cal-section-title">Tomorrow{tomorrow.needs_prep&&tomorrow.needs_prep.length>0?(' · '+tomorrow.needs_prep.length+' need prep'):''}</div>
      {tomorrow.events.map(e=><div key={e.id} className={'cal-tomorrow-card '+(e.type||'normal')}>
        <span className="cal-tt-time">{e.all_day?'All day':calFmtTime(e.start_time)}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,color:'#eef1f6',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title}</div>
          {e.location&&<div style={{fontSize:10,color:'#8a93a6'}}>📍 {e.location}</div>}
        </div>
        {e.prep_available&&<span className="cal-prep-badge">Prep</span>}
      </div>)}
    </div>}
  </div>);
}
