            color: rgba(245,158,11,0.85); padding: 2px 7px;
            border-radius: 8px; background: rgba(245,158,11,0.08);
            border: 1px solid rgba(245,158,11,0.18);
        }

        /* ═══════════════════════════════════════════════════════════
           NEWS WORKSPACE — magazine layout, source trust, status strip
           ═══════════════════════════════════════════════════════════ */
        /* Category accent colors — tech=cyan, politics=amber, local=green, business=purple */
        .news-ws { --c-tech:#00d4ff; --c-politics:#f59e0b; --c-local:#00ff80; --c-business:#a78bfa; --c-science:#2dd4bf; --c-media:#f472b6; }

        /* Live status strip */
        .status-strip { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
        .status-pill {
            display:inline-flex; align-items:center; gap:6px;
            padding:5px 11px; border-radius:20px; font-size:11px; color:#cdd3e0;
            background:rgba(10,14,26,0.7); backdrop-filter:blur(16px) saturate(1.2);
            -webkit-backdrop-filter:blur(16px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.06);
        }
        .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .status-dot.connected { background:#00ff80; box-shadow:0 0 7px #00ff80; }
        .status-dot.degraded { background:#f59e0b; box-shadow:0 0 7px rgba(245,158,11,0.7); }
        .status-dot.disconnected { background:#666; }
        .status-pill .st-detail { color:rgba(255,255,255,0.4); font-size:10px; }

        /* News toolbar */
        .news-toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .news-tabs { display:flex; gap:4px; }

        /* Generate-now progress animation */
        .gen-progress {
            display:flex; align-items:center; gap:10px; padding:10px 14px; margin-bottom:12px;
            border-radius:8px; background:rgba(0,212,255,0.06);
            border:1px solid rgba(0,212,255,0.18); font-size:12px; color:#bfe9ff;
        }
        .gen-spinner {
            width:16px; height:16px; border-radius:50%; flex-shrink:0;
            border:2px solid rgba(0,212,255,0.2); border-top-color:#00d4ff;
            animation:gen-spin 0.8s linear infinite;
        }
        @keyframes gen-spin { to { transform:rotate(360deg); } }
        .gen-steps { display:flex; gap:6px; flex-wrap:wrap; }
        .gen-step { font-size:10px; padding:1px 7px; border-radius:10px; color:#7d8595; background:rgba(255,255,255,0.04); }
        .gen-step.active { color:#00d4ff; background:rgba(0,212,255,0.12); }
        .gen-step.done { color:#00ff80; background:rgba(0,255,128,0.1); }

        /* Masonry feed (CSS columns) */
        .news-masonry { column-count:3; column-gap:12px; }
        @media (max-width:1100px){ .news-masonry { column-count:2; } }
        @media (max-width:640px){ .news-masonry { column-count:1; } }
        .news-card {
            break-inside:avoid; display:inline-block; width:100%; margin:0 0 12px;
            background:rgba(10,14,26,0.75); backdrop-filter:blur(16px) saturate(1.2);
            -webkit-backdrop-filter:blur(16px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.06);
            border-left:3px solid var(--accent, rgba(0,212,255,0.5));
            border-radius:10px; padding:13px; box-shadow:0 4px 24px rgba(0,0,0,0.28);
            transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .news-card:hover {
            transform:translateY(-2px) scale(1.012);
            box-shadow:0 8px 34px rgba(0,0,0,0.4), 0 0 22px var(--glow, rgba(0,212,255,0.18));
            border-color:rgba(255,255,255,0.12);
        }
        .news-card.cat-tech { --accent:var(--c-tech); --glow:rgba(0,212,255,0.2); }
        .news-card.cat-politics { --accent:var(--c-politics); --glow:rgba(245,158,11,0.2); }
        .news-card.cat-local { --accent:var(--c-local); --glow:rgba(0,255,128,0.18); }
        .news-card.cat-business { --accent:var(--c-business); --glow:rgba(167,139,250,0.2); }
        .news-card.cat-science { --accent:var(--c-science); --glow:rgba(45,212,191,0.2); }
        .news-card.cat-media { --accent:var(--c-media); --glow:rgba(244,114,182,0.2); }
        .news-card.feature { padding:18px; }
        .news-card.feature .news-headline { font-size:18px; line-height:1.25; }

        .news-cardtop { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px; }
        .cat-chip {
            font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.09em; text-transform:uppercase;
            padding:2px 7px; border-radius:4px; color:var(--accent);
            background:color-mix(in srgb, var(--accent) 12%, transparent);
            border:1px solid color-mix(in srgb, var(--accent) 30%, transparent);
        }
        .src-actions { display:flex; gap:3px; opacity:0; transition:opacity 0.15s; }
        .news-card:hover .src-actions { opacity:1; }
        .src-btn {
            border:none; cursor:pointer; font-size:12px; line-height:1; padding:3px 5px;
            border-radius:5px; background:rgba(255,255,255,0.05); color:#aeb4c2;
            transition:background 0.15s, transform 0.1s;
        }
        .src-btn:hover { transform:scale(1.15); }
        .src-btn.ban:hover { background:rgba(255,60,90,0.18); }
        .src-btn.boost:hover { background:rgba(245,158,11,0.18); }

        .news-headline {
            font-size:14px; font-weight:650; line-height:1.32; color:#eef1f6; cursor:pointer;
            margin-bottom:6px; transition:color 0.15s;
        }
        .news-headline:hover { color:var(--accent); }
        .news-snippet {
            font-size:12px; line-height:1.5; color:#a9b0bf; margin-bottom:9px;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
        }
        .news-card.feature .news-snippet { -webkit-line-clamp:3; }

        .source-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:7px; }
        .source-badge {
            display:inline-flex; align-items:center; gap:5px; font-size:10px; color:#c4cad6;
            padding:2px 8px; border-radius:12px; background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.07);
        }
        .trust-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .trust-dot.green { background:#00ff80; box-shadow:0 0 5px rgba(0,255,128,0.6); }
        .trust-dot.yellow { background:#f59e0b; box-shadow:0 0 5px rgba(245,158,11,0.5); }
        .trust-dot.red { background:#ff3c5a; box-shadow:0 0 5px rgba(255,60,90,0.6); }

        /* ── Source-trust badge + hover tooltip (article cards) ── */
        .trust-badge { position:relative; display:inline-flex; align-items:center; gap:4px; cursor:help; outline:none; }
        .trust-num { font-size:9px; color:#aeb6c4; font-variant-numeric:tabular-nums; }
        .trust-tip {
            position:absolute; bottom:140%; left:0; z-index:50; width:220px;
            background:rgba(14,16,24,0.98); border:1px solid rgba(255,255,255,0.12);
            border-radius:10px; padding:9px 10px; box-shadow:0 8px 28px rgba(0,0,0,0.55);
            opacity:0; visibility:hidden; transform:translateY(4px); transition:all .14s ease; pointer-events:none;
        }
        .trust-badge:hover .trust-tip, .trust-badge:focus .trust-tip { opacity:1; visibility:visible; transform:translateY(0); }
        .trust-tip-head { font-size:10px; font-weight:700; color:#dfe4ee; margin-bottom:6px; letter-spacing:.02em; }
        .trust-tip-row { display:flex; align-items:center; gap:6px; margin:3px 0; font-size:9px; color:#9aa3b2; }
        .trust-tip-lbl { width:74px; flex-shrink:0; }
        .trust-tip-bar { flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.08); overflow:hidden; }
        .trust-tip-fill { display:block; height:100%; border-radius:3px; }
        .trust-tip-fill.green { background:#00ff80; } .trust-tip-fill.yellow { background:#f59e0b; } .trust-tip-fill.red { background:#ff3c5a; }
        .trust-tip-val { width:24px; text-align:right; font-variant-numeric:tabular-nums; color:#c4cad6; }

        /* ── Trust tab: federation strip ── */
        .fed-strip { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px;
            background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.18); font-size:11px; color:#c4cad6; }
        .fed-ico { font-size:14px; }
        .fed-id { margin-left:auto; font-size:9px; color:#7fb6c9; font-family:monospace; cursor:help; }

        /* ── Trust tab: leaderboard + detail layout ── */
        .trust-layout { display:grid; grid-template-columns:minmax(280px,1fr) minmax(320px,1.4fr); gap:14px; align-items:start; }
        @media (max-width:900px){ .trust-layout { grid-template-columns:1fr; } }
        .trust-board { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07); border-radius:12px; overflow:hidden; max-height:70vh; overflow-y:auto; }
        .trust-board-head { display:flex; justify-content:space-between; padding:10px 12px; font-size:11px; font-weight:700; color:#dfe4ee; border-bottom:1px solid rgba(255,255,255,0.07); position:sticky; top:0; background:rgba(18,20,28,0.96); }
        .trust-row { display:flex; align-items:center; gap:8px; padding:7px 12px; font-size:11px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.03); }
        .trust-row:hover { background:rgba(255,255,255,0.04); }
        .trust-row.active { background:rgba(0,212,255,0.08); }
        .trust-rank { width:18px; color:#6b7280; font-size:10px; text-align:right; }
        .trust-row-name { flex:1; color:#dfe4ee; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .trust-row-score { font-weight:700; color:#c4cad6; font-variant-numeric:tabular-nums; }
        .trust-row-meta { font-size:9px; color:#6b7280; min-width:74px; text-align:right; }
        .trust-detail { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:14px; min-height:200px; }
        .trust-detail-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
        .trust-detail-name { font-size:15px; font-weight:700; color:#fff; }
        .trust-detail-sub { font-size:10px; color:#7a8290; margin-top:2px; }
        .trust-detail-score { font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; }
        .trust-detail-score.green { color:#00ff80; } .trust-detail-score.yellow { color:#f59e0b; } .trust-detail-score.red { color:#ff3c5a; }
        .trust-detail-grid { display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:12px 0; }
        .trust-dimbars { flex:1; min-width:200px; }
        .trust-dimbar { display:flex; align-items:center; gap:8px; margin:5px 0; font-size:10px; color:#9aa3b2; }
        .trust-dimbar-lbl { width:96px; flex-shrink:0; }
        .trust-dimbar-track { flex:1; height:7px; border-radius:4px; background:rgba(255,255,255,0.07); overflow:hidden; }
        .trust-dimbar-fill { display:block; height:100%; border-radius:4px; }
        .trust-dimbar-fill.green { background:#00ff80; } .trust-dimbar-fill.yellow { background:#f59e0b; } .trust-dimbar-fill.red { background:#ff3c5a; }
        .trust-dimbar-val { width:26px; text-align:right; color:#c4cad6; font-variant-numeric:tabular-nums; }

        /* ── Trust radar (SVG) ── */
        .trust-radar { flex-shrink:0; }
        .trust-radar .radar-grid { fill:rgba(255,255,255,0.02); stroke:rgba(255,255,255,0.1); stroke-width:1; }
        .trust-radar .radar-spoke { stroke:rgba(255,255,255,0.08); stroke-width:1; }
        .trust-radar .radar-area { fill:rgba(0,212,255,0.22); stroke:#00d4ff; stroke-width:1.5; }
        .trust-radar .radar-lbl { fill:#8a92a2; font-size:7px; }

        /* ── Trust observation history ── */
        .trust-obs-head { font-size:11px; font-weight:700; color:#dfe4ee; margin:14px 0 6px; }
        .trust-obs-list { display:flex; flex-direction:column; gap:6px; max-height:300px; overflow-y:auto; }
        .trust-obs { display:flex; align-items:center; gap:7px; flex-wrap:wrap; font-size:10px; color:#9aa3b2; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .trust-obs-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .trust-obs-dot.green { background:#00ff80; } .trust-obs-dot.yellow { background:#f59e0b; } .trust-obs-dot.red { background:#ff3c5a; }
        .trust-obs-type { color:#dfe4ee; font-weight:600; }
        .trust-obs-dim { color:#7fb6c9; }
        .trust-obs-date { color:#6b7280; margin-left:auto; font-variant-numeric:tabular-nums; }
        .trust-obs-detail { flex-basis:100%; color:#7a8290; font-size:9px; padding-left:14px; }
        .trust-obs-peer { font-size:8px; background:rgba(167,139,250,0.18); color:#c4b5fd; padding:1px 5px; border-radius:6px; }

        .news-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:10px; color:#727a8a; }
        .breaking-badge {
            font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.07em;
            padding:1px 6px; border-radius:4px; color:#ff5277;
            background:rgba(255,60,90,0.12); border:1px solid rgba(255,60,90,0.3);
            animation:breath 1.6s ease-in-out infinite;
        }
        @keyframes breath { 0%,100%{opacity:0.65;} 50%{opacity:1;} }
        .relevance-tag {
            font-size:10px; color:#8fb8c8; font-style:italic;
            border-top:1px solid rgba(255,255,255,0.05); margin-top:8px; padding-top:7px;
        }
        .editorial-note {
            margin-top:9px; padding:8px 10px; border-radius:7px; font-size:11px; line-height:1.45;
            color:#ffe6b8; background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.18);
        }
        .editorial-note b { color:#f59e0b; }
        /* ── Smart news features ── */
        /* Sentiment dot: green positive / gray neutral / red negative */

        .sentiment-dot.positive { background:#00ff80; box-shadow:0 0 5px rgba(0,255,128,0.6); }
        .sentiment-dot.neutral { background:#7a8190; box-shadow:0 0 4px rgba(122,129,144,0.4); }

        /* "In your wiki" connection link */

        /* Deep Dive button + expandable panel */

        .deepdive-impl b { color:#f59e0b; }
        .deepdive-quotes { margin-top:8px; }
        .deepdive-quotes blockquote {
            margin:5px 0; padding-left:9px; border-left:2px solid rgba(0,212,255,0.4);
            color:#9fc6d6; font-style:italic; font-size:11px;
        }
        .deepdive-meta { margin-top:6px; font-size:9px; color:#667; text-align:right; }
        /* Trending clusters strip */
        .cluster-strip { margin-bottom:14px; }
        .cluster-strip-head {
            font-family:'Orbitron',monospace; font-size:11px; color:#ffae5b; letter-spacing:0.05em; margin-bottom:8px;
        }
        .cluster-card {
            border-radius:10px; padding:11px 13px; margin-bottom:9px;
            background:rgba(255,174,91,0.05); border:1px solid rgba(255,174,91,0.20); border-left:3px solid #ffae5b;
        }
        .cluster-cardtop { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .cluster-badge {
            font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.05em; padding:2px 8px;
            border-radius:5px; color:#1a1208; background:#ffae5b; font-weight:600;
        }
        .cluster-headline { font-size:14px; font-weight:600; color:#f2f4fa; cursor:pointer; line-height:1.3; }
        .cluster-headline:hover { color:#fff; }
        .cluster-sources { font-size:10px; color:#8b94a6; margin-top:5px; }
        .cluster-toggle {
            margin-top:7px; font-size:10px; color:#ffae5b; cursor:pointer; background:none; border:none; padding:0;
            font-family:'Orbitron',monospace; letter-spacing:0.03em;
        }
        .cluster-toggle:hover { color:#ffc98a; }
        .cluster-list { margin-top:8px; border-top:1px solid rgba(255,255,255,0.06); padding-top:8px; }
        .cluster-item { display:flex; align-items:center; gap:7px; padding:4px 0; font-size:11.5px; }
        .cluster-item-link { color:#cfd6e4; cursor:pointer; flex:1; text-decoration:none; }
        .cluster-item-link:hover { color:#fff; }
        .cluster-item-src { display:flex; align-items:center; gap:5px; font-size:9px; color:#7a8394; white-space:nowrap; }
        /* Your Media Diet bar chart */
        .diet-bar-row { display:flex; align-items:center; gap:8px; margin:5px 0; }
        .diet-bar-label { font-size:10px; color:#aeb6c4; width:64px; flex-shrink:0; }
        .diet-bar-track { flex:1; height:9px; border-radius:5px; background:rgba(255,255,255,0.05); overflow:hidden; }
        .diet-bar-fill { display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,#00d4ff,#7c3aed); }
        .diet-bar-num { font-size:10px; color:#8fb8c8; width:24px; text-align:right; flex-shrink:0; }

        /* Save (Read Later) + background-open card buttons */
        .src-btn.save:hover { background:rgba(0,212,255,0.18); }
        .src-btn.save.on { background:rgba(0,212,255,0.16); }
        .src-btn.bg:hover { background:rgba(124,58,237,0.2); }
        .src-btn.draft:hover { background:rgba(245,158,11,0.2); }
        .src-btn.note:hover { background:rgba(0,212,255,0.2); }
        .src-btn.note.on { background:rgba(0,212,255,0.14); }
        .src-btn.note.active { background:rgba(0,212,255,0.28); box-shadow:0 0 0 1px rgba(0,212,255,0.4) inset; }

        /* Front Page audio briefing — mini player bar */
        .fp-audio-bar {
            display:flex; align-items:center; gap:10px; margin-bottom:12px;
            padding:8px 12px; border-radius:10px;
            background:linear-gradient(90deg,rgba(0,212,255,0.10),rgba(124,58,237,0.10));
            border:1px solid rgba(0,212,255,0.22);
        }
        .fp-audio-btn {
            flex:0 0 auto; width:30px; height:30px; border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center; font-size:13px;
            color:#03060d; background:#00d4ff; border:none; transition:filter 0.15s;
        }
        .fp-audio-btn:hover { filter:brightness(1.12); }
        .fp-audio-btn:disabled { opacity:0.5; cursor:default; }
        .fp-audio-btn.close { background:rgba(255,255,255,0.08); color:#aeb4c2; }
        .fp-audio-btn.close:hover { background:rgba(255,0,128,0.2); color:#fff; }
        .fp-audio-label { flex:0 0 auto; font-size:11px; color:#cfe9f4; white-space:nowrap; }
        .fp-audio-track { flex:1 1 auto; height:6px; border-radius:4px; cursor:pointer;
            background:rgba(255,255,255,0.10); overflow:hidden; min-width:80px; }
        .fp-audio-fill { height:100%; background:linear-gradient(90deg,#00d4ff,#7c3aed); transition:width 0.1s linear; }
        .fp-audio-time { flex:0 0 auto; font-size:10px; color:#8fb8c8; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
        .fp-audio-speed { flex:0 0 auto; display:flex; gap:3px; }
        .fp-spd { font-size:10px; padding:2px 7px; border-radius:10px; cursor:pointer;
            color:#9aa1b0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07); }
        .fp-spd:hover { color:#e0e4ee; }
        .fp-spd.on { color:#00d4ff; background:rgba(0,212,255,0.14); border-color:rgba(0,212,255,0.32); }

        /* News Anchor Mode — "Now Reading" live indicator */
        .fp-anchor-bar {
            display:flex; align-items:center; gap:10px; margin-bottom:12px;
            padding:8px 12px; border-radius:10px;
            background:linear-gradient(90deg,rgba(62,255,161,0.10),rgba(0,212,255,0.10));
            border:1px solid rgba(62,255,161,0.30);
        }
        .fp-anchor-dot {
            flex:0 0 auto; width:9px; height:9px; border-radius:50%;
            background:#3effa1; box-shadow:0 0 8px #3effa1;
            animation:fp-anchor-pulse 1.4s ease-in-out infinite;
        }
        @keyframes fp-anchor-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.7)} }
        .fp-anchor-label { flex:1 1 auto; font-size:11px; color:#d6ffe9; }

        /* News transient toast */
        .news-toast {
            position:absolute; top:8px; left:50%; transform:translateX(-50%); z-index:30;
            font-size:11px; color:#e0f6ff; background:rgba(10,18,30,0.92);
            border:1px solid rgba(0,212,255,0.3); border-radius:8px; padding:6px 14px;
            box-shadow:0 6px 24px rgba(0,0,0,0.45);
        }

        /* Stream filter bar: category tabs + sort pills */
        .stream-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .stream-tabs { display:flex; flex-wrap:wrap; gap:5px; }
        .stream-tab {
            font-size:11px; padding:4px 11px; border-radius:16px; cursor:pointer;
            color:#aeb4c2; background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.07); transition:all 0.15s;
        }
        .stream-tab:hover { color:#e0e4ee; border-color:rgba(0,212,255,0.3); }
        .stream-tab.active { color:#03060d; background:#00d4ff; border-color:#00d4ff; font-weight:600; }
        .stream-sort { display:flex; align-items:center; gap:5px; }
        .sort-pill {
            font-size:10px; padding:3px 9px; border-radius:12px; cursor:pointer;
            color:#9aa1b0; background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.06); transition:all 0.15s;
        }
        .sort-pill:hover { color:#e0e4ee; }
        .sort-pill.active { color:#00d4ff; background:rgba(0,212,255,0.12); border-color:rgba(0,212,255,0.3); }

        /* ── Friday's Front Page ── */
        .fp-masthead {
            display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
            padding-bottom:12px; margin-bottom:14px; border-bottom:2px solid rgba(0,212,255,0.25);
        }
        .fp-title { font-family:'Orbitron',monospace; font-size:22px; font-weight:700; color:#eef1f6; letter-spacing:0.02em; line-height:1.1; }
        .fp-sub { font-size:11px; color:#8b93a4; margin-top:5px; }
        .fp-lead {
            position:relative; margin-bottom:20px; padding:20px;
            background:rgba(10,14,26,0.8); backdrop-filter:blur(16px) saturate(1.2);
            -webkit-backdrop-filter:blur(16px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.07);
            border-left:4px solid var(--accent, #00d4ff);
            border-radius:12px; box-shadow:0 8px 36px rgba(0,0,0,0.4), 0 0 26px var(--glow, rgba(0,212,255,0.14));
        }
        .fp-lead.cat-tech { --accent:var(--c-tech); --glow:rgba(0,212,255,0.18); }
        .fp-lead.cat-politics { --accent:var(--c-politics); --glow:rgba(245,158,11,0.18); }
        .fp-lead.cat-local { --accent:var(--c-local); --glow:rgba(0,255,128,0.16); }
        .fp-lead.cat-business { --accent:var(--c-business); --glow:rgba(167,139,250,0.18); }
        .fp-lead.cat-science { --accent:var(--c-science); --glow:rgba(45,212,191,0.18); }
        .fp-lead.cat-media { --accent:var(--c-media); --glow:rgba(244,114,182,0.18); }
        .fp-lead-headline {
            font-size:26px; font-weight:700; line-height:1.18; color:#f4f6fa; cursor:pointer;
            margin:6px 0 10px; transition:color 0.15s;
        }
        .fp-lead-headline:hover { color:var(--accent, #00d4ff); }
        .fp-lead-snippet { font-size:14px; line-height:1.55; color:#bcc3d2; margin-bottom:4px; }
        .fp-section { margin-bottom:22px; }
        .fp-section-head {
            display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;
            margin-bottom:10px; padding-bottom:6px;
            border-bottom:1px solid color-mix(in srgb, var(--accent, #00d4ff) 35%, transparent);
        }
        .fp-section-head.cat-tech { --accent:var(--c-tech); }
        .fp-section-head.cat-politics { --accent:var(--c-politics); }
        .fp-section-head.cat-local { --accent:var(--c-local); }
        .fp-section-head.cat-business { --accent:var(--c-business); }
        .fp-section-head.cat-science { --accent:var(--c-science); }
        .fp-section-head.cat-media { --accent:var(--c-media); }
        .fp-section-title {
            font-family:'Orbitron',monospace; font-size:13px; font-weight:600; text-transform:uppercase;
            letter-spacing:0.08em; color:var(--accent, #00d4ff);
        }
        .fp-section-ctx { font-size:11.5px; color:#9aa1b0; font-style:italic; }
        /* What-changed badges + thread updates */
        .fp-badge {
            display:inline-block; font-family:'Orbitron',monospace; font-size:8.5px;
            letter-spacing:0.08em; padding:1px 6px; border-radius:4px; margin-left:7px;
            vertical-align:middle; font-weight:700;
        }
        .fp-badge.new { color:#03130a; background:#00ff88; border:1px solid #00ff88; }
        .fp-badge.update { color:#0a0a14; background:#f59e0b; border:1px solid #f59e0b; }
        .fp-thread {
            margin-top:8px; padding:7px 10px; border-radius:7px; font-size:11px; line-height:1.45;
            color:#cfe8ff; background:rgba(0,212,255,0.07); border:1px solid rgba(0,212,255,0.2);
        }
        .fp-thread.sm { font-size:10.5px; margin-top:6px; padding:5px 8px; }
        .fp-thread b { color:#00d4ff; }

        /* Your day in context */
        .fp-daycontext {
            margin-bottom:18px; padding:14px 16px; border-radius:11px;
            background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(0,212,255,0.06));
            border:1px solid rgba(124,58,237,0.28);
        }
        .fp-daycontext-head {
            font-family:'Orbitron',monospace; font-size:12px; font-weight:600;
            letter-spacing:0.05em; color:#b794f6; margin-bottom:6px;
        }
        .fp-daycontext-body { font-size:13px; line-height:1.55; color:#d6d9e3; }

        /* Contrarian Corner */
        .fp-contrarian {
            position:relative; margin-bottom:20px; padding:16px 18px; border-radius:11px;
            background:rgba(244,114,182,0.06);
            border:1px solid rgba(244,114,182,0.3); border-left:4px solid #f472b6;
            box-shadow:0 0 22px rgba(244,114,182,0.12);
        }
        .fp-contrarian-head {
            font-family:'Orbitron',monospace; font-size:12px; font-weight:700;
            letter-spacing:0.05em; color:#f472b6; margin-bottom:7px;
        }
        .fp-contrarian-title { font-size:15px; font-weight:700; color:#f6e9f1; line-height:1.25; margin-bottom:6px; }
        .fp-contrarian-title:hover { color:#f472b6; }
        .fp-contrarian-note { font-size:12.5px; line-height:1.55; color:#e3c9d8; }
        .fp-contrarian-src { font-size:10.5px; color:#b07a96; margin-top:6px; font-style:italic; }

        /* Competitor Watch */
        .fp-competitor-head { border-bottom-color:color-mix(in srgb,#a78bfa 40%,transparent)!important; }
        .fp-competitor-head .fp-section-title { color:#a78bfa!important; }
        .fp-competitor-card { border-left:3px solid #a78bfa; }
        .fp-competitor-analysis {
            margin-top:8px; padding:7px 10px; border-radius:7px; font-size:11px; line-height:1.5;
            color:#dcd2f7; background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.2);
        }
        .fp-competitor-analysis b { color:#a78bfa; }

        /* Weekly Digest */
        .wk-stories { display:flex; flex-direction:column; gap:9px; }
        .wk-story {
            display:flex; gap:12px; align-items:flex-start; padding:11px 13px; border-radius:9px;
            background:rgba(10,14,26,0.7); border:1px solid rgba(255,255,255,0.06);
        }
        .wk-num {
            flex:0 0 auto; width:26px; height:26px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
            color:#03060d; background:#00d4ff;
        }
        .wk-story-title { font-size:13.5px; font-weight:600; color:#eef1f6; line-height:1.3; }
        .wk-story-why { font-size:11.5px; color:#9aa1b0; line-height:1.45; margin-top:3px; }
        .wk-trends { display:flex; flex-wrap:wrap; gap:7px; }
        .wk-trend {
            font-size:11.5px; padding:5px 11px; border-radius:14px;
            color:#9be7c4; background:rgba(45,212,191,0.1); border:1px solid rgba(45,212,191,0.28);
        }

        /* Friday's Weekly Editorial */
        .ed-disclaimer {
            padding:11px 15px; border-radius:10px; font-size:12px; line-height:1.5;
            color:#ffd9a8; background:rgba(245,158,11,0.09);
            border:1px solid rgba(245,158,11,0.32); border-left:4px solid #f59e0b;
        }
        .ed-body {
            margin:14px 0 4px; padding:20px 22px; border-radius:12px;
            background:rgba(10,14,26,0.7); border:1px solid rgba(255,255,255,0.06);
            border-left:3px solid #f472b6;
        }
        .ed-body blockquote {
            margin:12px 0; padding:8px 14px; border-left:3px solid rgba(244,114,182,0.5);
            color:#e3c9d8; background:rgba(244,114,182,0.05);
        }
        .ed-archive { display:flex; flex-direction:column; gap:8px; }
        .ed-archive-item {
            padding:11px 13px; border-radius:9px; cursor:pointer;
            background:rgba(10,14,26,0.6); border:1px solid rgba(255,255,255,0.05);
            transition:border-color .15s, background .15s;
        }
        .ed-archive-item:hover { border-color:rgba(244,114,182,0.4); background:rgba(244,114,182,0.05); }
        .ed-archive-item.active { border-color:#f472b6; background:rgba(244,114,182,0.08); }
        .ed-archive-week {
            font-family:'Orbitron',monospace; font-size:12px; font-weight:600; color:#f472b6;
        }
        .ed-archive-meta { font-size:10.5px; color:#8b93a4; margin-top:2px; }
        .ed-archive-preview { font-size:11.5px; color:#9aa1b0; line-height:1.45; margin-top:5px; }

        /* Briefing preview cards (past briefings) */
        .brief-card {
            margin-bottom:10px; border-radius:10px; padding:13px;
            background:rgba(10,14,26,0.72); backdrop-filter:blur(16px) saturate(1.2);
            -webkit-backdrop-filter:blur(16px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.06); cursor:pointer;
            transition:border-color 0.18s, box-shadow 0.18s;
        }
        .brief-card:hover { border-color:rgba(0,212,255,0.3); box-shadow:0 4px 24px rgba(0,0,0,0.32); }
        .brief-card.expanded { cursor:default; border-color:rgba(0,212,255,0.28); }
        .brief-cardhead { display:flex; align-items:center; justify-content:space-between; gap:10px; }
        .brief-date { font-family:'Orbitron',monospace; font-size:13px; color:#eef1f6; }
        .brief-preview { font-size:11.5px; line-height:1.55; color:#9aa1b0; margin-top:7px;
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

        /* Manage Sources / Customization slide-over panels */
        .news-backdrop {
            position:fixed; inset:0; background:rgba(3,3,8,0.5); backdrop-filter:blur(3px);
            z-index:40; animation:fadein 0.18s ease;
        }
        @keyframes fadein { from{opacity:0;} to{opacity:1;} }
        .news-side {
            position:fixed; top:0; right:0; bottom:0; width:340px; max-width:90vw;
            background:rgba(8,11,20,0.94); backdrop-filter:blur(20px) saturate(1.3);
            -webkit-backdrop-filter:blur(20px) saturate(1.3);
            border-left:1px solid rgba(0,212,255,0.18); box-shadow:-12px 0 40px rgba(0,0,0,0.5);
            padding:18px; overflow-y:auto; z-index:41;
            animation:slidein 0.22s ease;
        }
        @keyframes slidein { from{transform:translateX(28px);opacity:0;} to{transform:translateX(0);opacity:1;} }
        .news-side h3 { font-family:'Orbitron',monospace; font-size:12px; color:#00d4ff; letter-spacing:0.08em; margin:0 0 12px; }
        .manage-row {
            display:flex; align-items:center; justify-content:space-between; gap:8px;
            padding:8px 10px; margin-bottom:6px; border-radius:7px;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); font-size:12px; color:#d2d7e2;
        }
        .reorder-row {
            display:flex; align-items:center; gap:8px; padding:8px 10px; margin-bottom:6px;
            border-radius:7px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);
        }
        .toggle-pill {
            cursor:pointer; user-select:none; font-size:11px; padding:5px 11px; border-radius:14px;
            border:1px solid rgba(255,255,255,0.08); color:#8d94a3; background:rgba(255,255,255,0.03);
            transition:all 0.15s;
        }
        .toggle-pill.on { color:#031018; background:rgba(0,212,255,0.85); border-color:rgba(0,212,255,0.9); font-weight:600; }
        .icon-btn { background:none; border:none; cursor:pointer; color:#8d94a3; font-size:13px; padding:2px 5px; border-radius:5px; }
        .icon-btn:hover { color:#fff; background:rgba(255,255,255,0.07); }

        /* ═══════════════════════════════════════════════════════════
           MESSAGES — "Friday's Comms Center"
           Glassmorphism cards matching the News workspace, one accent
           color per triage lane.
           ═══════════════════════════════════════════════════════════ */
        .msg-ws {
            --lane-career:#00d4ff; --lane-finance:#22c55e;
            --lane-futurespeak:#a78bfa; --lane-family:#f472b6;
            --lane-subscriptions:#8a93a6; --lane-noise:#5b6373; --lane-all:#00d4ff;
        }
        .lane-tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
        .lane-tab {
            display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
            font-size:11px; padding:6px 12px; border-radius:18px; color:#aeb4c2;
            background:rgba(10,14,26,0.7); backdrop-filter:blur(16px) saturate(1.2);
            -webkit-backdrop-filter:blur(16px) saturate(1.2);
            border:1px solid rgba(255,255,255,0.06); transition:all 0.16s;
        }
        .lane-tab:hover { border-color:rgba(255,255,255,0.16); color:#e0e4ee; }
        .lane-tab.active {
            color:#031018; font-weight:650; border-color:var(--lc,#00d4ff);
            background:var(--lc,#00d4ff); box-shadow:0 0 16px color-mix(in srgb,var(--lc,#00d4ff) 45%,transparent);
        }
        .lane-tab .lane-count {
            font-family:'JetBrains Mono',monospace; font-size:10px; padding:0 6px;
            border-radius:9px; background:rgba(255,255,255,0.1);
        }
        .lane-tab.active .lane-count { background:rgba(3,16,24,0.22); }
        .lane-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--lc,#00d4ff); }

        .msg-pipeline {
            display:flex; gap:14px; flex-wrap:wrap; align-items:center;
            padding:12px 16px; margin-bottom:12px; border-radius:10px;
            background:rgba(0,212,255,0.06); border:1px solid rgba(0,212,255,0.18);
        }
        .msg-pipeline .pl-stat { display:flex; flex-direction:column; }
        .msg-pipeline .pl-num { font-family:'Orbitron',monospace; font-size:20px; color:#00d4ff; line-height:1; }
        .msg-pipeline .pl-lbl { font-size:10px; color:#8fb8c8; letter-spacing:0.04em; text-transform:uppercase; margin-top:3px; }
        .msg-pipeline .pl-arrow { color:#48586a; font-size:16px; }

        .msg-toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; margin-bottom:10px; }

<body>
    <style>
    /* Offline-first: desaturate the holographic scene when the network monitor
       reports we're offline, so the environment visibly (but calmly) reflects
       the degraded state. Eased in/out so the transition isn't jarring. */
    #friday-scene-canvas{transition:filter 1s ease}
    body.net-offline #friday-scene-canvas{filter:saturate(0.45) brightness(0.82)}
    body.net-degraded #friday-scene-canvas{filter:saturate(0.78) brightness(0.93)}
    </style>
    <!-- Hand Cursor -->
    <div id="hand-cursor" class="hidden">
        <svg id="pinch-progress">
            <circle class="pinch-circle" cx="17" cy="17" r="15" />
        </svg>
    </div>

    <!-- Parallax Tracker Dot -->
    <div id="camera-indicator"></div>

    <div id="hud-overlay">
        <!-- Minimalist Optical Arcs -->
        <div class="hud-corner top-left"><div class="dot"></div></div>
        <div class="hud-corner top-right"><div class="dot"></div></div>
        <div class="hud-corner bottom-left"><div class="dot"></div></div>
        <div class="hud-corner bottom-right"><div class="dot"></div></div>
        

        <!-- State / mood indicator: FIXED HTML overlay, anchored above the dock. Never drifts with the camera. -->
        <div id="state-indicator" style="position:fixed;bottom:130px;left:20px;z-index:80;display:inline-flex;align-items:center;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;pointer-events:none;padding:6px 12px;border-radius:10px;background:rgba(8,16,28,0.55);border:1px solid rgba(0,212,255,0.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,0.45),inset 0 0 0 1px rgba(255,255,255,0.04);text-shadow:0 0 8px rgba(0,0,0,0.9),0 1px 2px rgba(0,0,0,0.9);">
            <span id="mood-text" style="color:rgba(0,212,255,0.95);">STATE: LISTENING</span>
        </div>

    </div>

    <!-- Friday OS React UI Layer -->
    <div id="ui-root" style="position:fixed;inset:0;z-index:60;pointer-events:none">
        <div id="ui-inner" style="pointer-events:auto;height:100vh"></div>
    </div>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" integrity="sha384-q1KhAZhJcJXr3zfC3Tz07pBqQSabwFIZhXlmlUAB8s0zk4ETWERkIKGBCFQ5Jc3e" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4.1646425229/face_detection.js" integrity="sha384-oO3wOXOXIGBvHXjKwoF69nDtnGjqWIBuT+yCjjIAZmDek7qgjztCwK+WjCuL9O0a" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" integrity="sha384-oHwoZ9HyKv5ark5VOH+XWdbNfmhYtptAOBuV8plz6mAfXvTA6d8fULuYllWouEK2" crossorigin="anonymous"></script>

    <!-- Three.js + Post-Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js" integrity="sha384-GkidzTYmQg24v13sa3xhBBbvOLbVLO1QxfyKLdOWweQqNqS/iWwUst2T1fER2Xrg" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js" integrity="sha384-2EpLreWSFuZsk4hcSplXLhlHd/wzvDNF907bTGIXSXM0SlhJNzy4YK0DhBFvkFEs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js" integrity="sha384-I3lsvPeDJYFrEAzn/TA0yhc/SCYKwpyfyq8lKzHYKohu43H9f7xc/Q9ZWgSVUDl3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js" integrity="sha384-nhO9toQuMo5osCuA0l+YFpSqscZWxDu251Bnho2gD3kSPv1neEwHg0LyEmrA+mPj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js" integrity="sha384-mY+ii969jnDCI2HjRHftH2NZVkIO5ZGUkcnGCg3oVJ3kVstWQXwerYWBg+nbUG4R" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js" integrity="sha384-aVQ2QnWkoxhOefDB0YZB64OPVzujvccydpcC7UqMDJUK0ChwA382zOHmrWHGDRRa" crossorigin="anonymous"></script>

    <script>
        // --- UI INTERACTION LOGIC ---

        // Mouse Tracker Fallback
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            // Mouse responsiveness reduced 50% (range *2.0 -> *1.0): the camera
            // parallax and HUD tilt both derive from mouseX/mouseY, so halving the
            // normalized range here halves the scene's reaction to mouse movement.
            mouseX = (e.clientX / window.innerWidth - 0.5) * 1.0;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 1.0;
        });

        // --- COMPUTER VISION ENGINE (MediaPipe Shared Camera) ---
        let cameraMP = null;
        let videoElement = document.createElement('video');
        videoElement.setAttribute('autoplay', ''); videoElement.setAttribute('playsinline', '');
        
        // Hologram (Face) State
        let isHologramMode = false;
        let faceDetectionMP = null;
        let rawFaceX = 0, rawFaceY = 0, rawFaceZ = 0; 
        let currFaceX = 0, currFaceY = 0, currFaceZ = 0; 
        let isFaceVisible = false;
        let faceLostTimeout = null;

        // Hands State
        let isHandTrackingMode = false;
        let handsMP = null;
        let rawHandX = window.innerWidth/2, rawHandY = window.innerHeight/2;
        let currHandX = window.innerWidth/2, currHandY = window.innerHeight/2;
        let isPinching = false, wasPinching = false;
        let pinchStartTime = 0;
        let rightClickFired = false;
        let handVisible = false;
        const PINCH_HOLD_TIME = 1000; // ms for right click

        async function startSharedCamera() {
            if (!cameraMP) {
                cameraMP = new Camera(videoElement, {
                    onFrame: async () => { 
                        if (isHologramMode && faceDetectionMP) await faceDetectionMP.send({image: videoElement}); 
                        if (isHandTrackingMode && handsMP) await handsMP.send({image: videoElement});
                    },
                    width: 320, height: 240
                });
                await cameraMP.start();
            }
        }

        // --- HAND TRACKING (Minority Report) ---
        async function toggleHands() {
            isHandTrackingMode = !isHandTrackingMode;
            const cursor = document.getElementById('hand-cursor');
            if (isHandTrackingMode) {
                if (cursor) cursor.classList.add('active');
                if (!handsMP) {
                    handsMP = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                    handsMP.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                    handsMP.onResults(onHandsResults);
                }
                await startSharedCamera();
            } else {
                if (cursor) cursor.classList.remove('active');
            }
        }

        function onHandsResults(results) {
            const cursor = document.getElementById('hand-cursor');
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8]; const thumbTip = landmarks[4];
                const targetX = (1.0 - (indexTip.x + thumbTip.x) / 2) * window.innerWidth;
                const targetY = ((indexTip.y + thumbTip.y) / 2) * window.innerHeight;
                const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                isPinching = dist < 0.06;
                const isApproachingPinch = dist < 0.1;
                if (!handVisible) {
                    currHandX = targetX; currHandY = targetY;
                    rawHandX = targetX; rawHandY = targetY;
                    handVisible = true;
                    cursor.classList.remove('hidden');
                } else {
                    if (!isApproachingPinch) {
                        rawHandX = targetX; rawHandY = targetY;
                    } else {
                        rawHandX += (targetX - rawHandX) * 0.05;
                        rawHandY += (targetY - rawHandY) * 0.05;
                    }
                }
            } else {
                isPinching = false; handVisible = false;
                cursor.classList.add('hidden');
            }
        }

        function spawnRipple(x, y, color) {
            const r = document.createElement('div');
            r.className = 'ripple'; r.style.left = x + 'px'; r.style.top = y + 'px'; r.style.setProperty('--r-color', color);
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 600);
        }

        // --- FACE TRACKING (Parallax) ---
        async function toggleHologram() {
            isHologramMode = !isHologramMode;
            if (isHologramMode) {
                if (!faceDetectionMP) {
                    faceDetectionMP = new FaceDetection({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`});
                    faceDetectionMP.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
                    faceDetectionMP.onResults(onFaceResults);
                }
                await startSharedCamera();
            } else {
                isFaceVisible = false; updateCameraIndicator(false);
            }
            updateCameraIndicator(isHologramMode && isFaceVisible);
        }

        function onFaceResults(results) {
            if (results.detections.length > 0) {
                const bbox = results.detections[0].boundingBox;
                rawFaceX = (bbox.xCenter - 0.5) * 2.0; 
                rawFaceY = (bbox.yCenter - 0.5) * 2.0;
                let fw = Math.max(0.05, Math.min(bbox.width, 0.4)); 
                let targetZ = (fw - 0.18) * 3.0; 
                rawFaceZ += (targetZ - rawFaceZ) * 0.1;
                isFaceVisible = true; updateCameraIndicator(true);
                clearTimeout(faceLostTimeout);
                faceLostTimeout = setTimeout(() => { isFaceVisible = false; updateCameraIndicator(false); }, 2000); 
            }
        }

        function updateCameraIndicator(active) {
            const ind = document.getElementById('camera-indicator');
            if (!ind) return;
            if (active && isHologramMode) { ind.classList.add('holo-active'); }
            else { ind.classList.remove('holo-active'); }
        }

        // --- AESTHETIC CONFIGURATION ---
        const MOODS = {
            LISTENING: { baseColor: 0x00d2ff, accentColor: 0x8a2be2, rotationSpeed: 0.001, bloomStrength: 0.8, particleSpeedScale: 1.0, grain: 0.035 },
            REASONING: { baseColor: 0x4b0082, accentColor: 0x00ffff, rotationSpeed: 0.006, bloomStrength: 1.1, particleSpeedScale: 1.3, grain: 0.045 },
            SPEAKING:  { baseColor: 0x00ff80, accentColor: 0x00d4ff, rotationSpeed: 0.005, bloomStrength: 1.4, particleSpeedScale: 2.0, grain: 0.04 },
            CREATING:  { baseColor: 0xff00aa, accentColor: 0xff6600, rotationSpeed: 0.006, bloomStrength: 1.6, particleSpeedScale: 1.5, grain: 0.06 },
            IDLE:      { baseColor: 0x1e54c7, accentColor: 0x5fa8ff, rotationSpeed: 0.0003, bloomStrength: 1.3,  particleSpeedScale: 0.25, grain: 0.015 },
            EXECUTING: { baseColor: 0xffaa00, accentColor: 0xff3300, rotationSpeed: 0.008, bloomStrength: 1.2, particleSpeedScale: 1.8, grain: 0.05 },
            EXCITED:   { baseColor: 0xffffff, accentColor: 0x00e5ff, rotationSpeed: 0.015, bloomStrength: 1.8, particleSpeedScale: 2.5, grain: 0.08 },
            CALM:      { baseColor: 0x001133, accentColor: 0x0055aa, rotationSpeed: 0.0002, bloomStrength: 0.4, particleSpeedScale: 0.2, grain: 0.05 },
            CURIOUS:   { baseColor: 0x00b3b3, accentColor: 0x00ffff, rotationSpeed: 0.003, bloomStrength: 1.0, particleSpeedScale: 1.2, grain: 0.03 },
            CREATIVE:  { baseColor: 0x9b30ff, accentColor: 0xff00ff, rotationSpeed: 0.005, bloomStrength: 1.5, particleSpeedScale: 1.6, grain: 0.055 },

            renderer.setClearColor(0x000103, 1);
            renderer.domElement.id = 'friday-scene-canvas';
            document.body.appendChild(renderer.domElement);

            buildBackgroundEnvironment(); buildAllStructures();

            const renderScene = new THREE.RenderPass(scene, camera);
            // Bloom: wider radius + lower threshold so the holographic geometry visibly
            // glows at rest, not just the rare bright pixels. Strength is modulated below.
            bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.55, 0.25);
            holoPass = new THREE.ShaderPass(HolographicShader);
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene); composer.addPass(bloomPass); composer.addPass(holoPass);

            window.addEventListener('resize', onWindowResize);

            // Audio visualizer deliberately disabled — mic is reserved for voice mode.
            // setupAudio() uses getUserMedia which would show the mic indicator on page load.

            Object.values(structures).forEach(g => { if(g) { scene.add(g); g.visible = false; setGroupOpacity(g, 0); }});
            if (structures['CUBES']) { structures['CUBES'].visible = true; setGroupOpacity(structures['CUBES'], 1); }

            const _evo = document.getElementById('evolution-day-text');
            if (_evo) _evo.innerText = `DAY 1: ${EVOLUTION_PATH[0].name}`;

            processOrbManager = new ProcessOrbManager(scene, camera, renderer);
            animate();
        }

        function buildBackgroundEnvironment() {
            const particleCount = 800; const positions = new Float32Array(particleCount * 3); const colors = new Float32Array(particleCount * 3);
            const particleData = [];
            for (let i = 0; i < particleCount; i++) {
                const radius = 8 + Math.random() * 15; const theta = Math.random() * Math.PI * 2; const phi = Math.acos((Math.random() * 2) - 1);
                positions[i*3] = radius * Math.sin(phi) * Math.cos(theta); positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta); positions[i*3+2] = radius * Math.cos(phi);
                particleData.push({ radius, baseRadius: radius, theta, basePhi: phi, phi: phi, speed: 0.01 + Math.random() * 0.04 });
            }
            const pGeom = new THREE.BufferGeometry(); pGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3)); pGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            particleSystem = new THREE.Points(pGeom, new THREE.PointsMaterial({ size: 0.4, map: glowTexture, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false }));
            particleSystem.userData.data = particleData; scene.add(particleSystem);

            for (let i = 0; i < 20; i++) createEnergyFlare();

            for (let i = 0; i < 15; i++) {
                const material = new THREE.SpriteMaterial({ map: cloudTexture, color: 0x00ffff, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false });
                const sprite = new THREE.Sprite(material);
                const scale = 30 + Math.random() * 50; sprite.scale.set(scale, scale, 1);
                sprite.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*100, -50 - Math.random()*80);

                scene.add(sprite); nebulaClouds.push(sprite);

        }

        function createEnergyFlare() {
            const start = new THREE.Vector3((Math.random()-0.5)*8, (Math.random()-0.5)*8, (Math.random()-0.5)*8);
            const end = new THREE.Vector3((Math.random()-0.5)*30, (Math.random()-0.5)*30, (Math.random()-0.5)*30);
            const mid1 = start.clone().lerp(end, 0.3).add(new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10));
            const mid2 = start.clone().lerp(end, 0.7).add(new THREE.Vector3((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10));
            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.CatmullRomCurve3([start, mid1, mid2, end]).getPoints(50)), new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.05, blending: THREE.AdditiveBlending, linewidth: 2 }));
            line.userData = { pulse: Math.random()*Math.PI, pulseSpeed: 0.05+Math.random()*0.1, intensity: 0 }; 
            scene.add(line); energyLines.push(line);
        }


        function createMaterial(type, color, opacity, additive = true, wireframe = false, dashed = false) {
            let mat;
            if (dashed) mat = new THREE.LineDashedMaterial({ color: color, dashSize: 0.2, gapSize: 0.1 });
            else mat = type === 'line' ? new THREE.LineBasicMaterial() : new THREE.MeshBasicMaterial();
            mat.color.setHex(color); mat.transparent = true; mat.opacity = opacity; mat.wireframe = wireframe;
            mat.userData = { baseOpacity: opacity, isAccent: false };
            if (additive) { mat.blending = THREE.AdditiveBlending; mat.depthWrite = false; }
            return mat;
        }

        function setGroupOpacity(group, opacityMultiplier) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData && child.material.userData.baseOpacity !== undefined) {
                    child.material.opacity = child.material.userData.baseOpacity * opacityMultiplier;
                }
            });
        }

        function updateGroupColors(group) {
            if(!group) return;
            group.traverse(child => {
                if (child && child.material && child.material.userData) {
                    const targetColor = child.material.userData.isAccent || (child.userData && child.userData.isAccent) ? moodLerpValues.accentColor : moodLerpValues.baseColor;
                    
                    if (child === mandelbrotSystem && mandelbrotSystem && mandelbrotSystem.geometry && mandelbrotSystem.geometry.attributes.color) {
                        const colors = child.geometry.attributes.color.array; const mData = child.userData.data;
                        for(let i=0; i<mData.length; i++) {
                            const c = new THREE.Color().copy(moodLerpValues.baseColor).lerp(moodLerpValues.accentColor, mData[i].iterRatio);
                            colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                        }
                        child.geometry.attributes.color.needsUpdate = true;
                    } else if (child.material.userData.isTunnelSolid) {
                        child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.05);
                    } else if (child.material.userData.isBossSphere) {
                        child.material.color.copy(moodLerpValues.baseColor);
                    } else if (child.material.userData.isBossWire) {
                        child.material.color.copy(moodLerpValues.accentColor).multiplyScalar(0.3);
                    } else if (child.material.userData.isPlayerBody) {
                        child.material.color.setHex(0xffffff); 
                    } else if (child.material.color && targetStructure !== 'QUANTUM') {
                        child.material.color.copy(targetColor);
                        if(child.geometry && child.geometry.type === 'BoxGeometry' && !child.material.wireframe && (currentStructure === 'CUBES' || targetStructure === 'CUBES')) {
                            child.material.color.copy(moodLerpValues.baseColor).multiplyScalar(0.15); 
                        }
                    }
                }
            });
        }

        async function setupAudio() {
            if (audioContext) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);

        }

        function onWindowResize() {

            const delta = Math.min(clock.getDelta(), 0.1);

                moodLerpValues.rotationSpeed = THREE.MathUtils.lerp(moodLerpValues.rotationSpeed, _motionMood.rotationSpeed, moodLerp);

            nebulaClouds.forEach(cloud => {

            if(camera) {

                else if (targetStructure === 'CABLES' || targetStructure === 'ASTROLABE') { targetCamPos.set(Math.sin(elapsed*0.1)*12, Math.cos(elapsed*0.1)*12, 15 + Math.sin(elapsed*0.2)*5); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'MANDELBROT') { targetCamPos.set(Math.sin(elapsed*0.2)*14, 8 + Math.sin(elapsed*0.3)*3, Math.cos(elapsed*0.2)*14); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'NETWORK') { targetCamPos.set(Math.sin(elapsed*0.2)*10, Math.sin(elapsed*0.3)*6, Math.cos(elapsed*0.2)*10); targetCamLook.set(0, 0, 0); } 
                else if (targetStructure === 'EDEN') { targetCamPos.set(Math.sin(elapsed*0.5)*2, Math.cos(elapsed*0.3)*1.5, 28); targetCamLook.set(0, 0, 0); } 
                else { targetCamPos.set(Math.sin(elapsed*0.15)*6, 5 + Math.cos(elapsed*0.2)*2, 18 + Math.sin(elapsed*0.1)*3); targetCamLook.set(0, 0, 0); }

                baseCamPos.lerp(targetCamPos, delta * 0.8);

                const parallaxX = currFaceX * 5.0; 
                const parallaxY = currFaceY * -5.0; 
                const parallaxZ = currFaceZ * -8.0; 

                camera.position.x = baseCamPos.x + parallaxX;
                camera.position.y = baseCamPos.y + parallaxY;
                camera.position.z = baseCamPos.z + parallaxZ;

                const lookTarget = targetCamLook.clone();
                lookTarget.x += parallaxX * 0.15;

            }

            // --- ANIMATE ACTIVE STRUCTURES ---
            const activeGroup = structures[targetStructure];
            const interactionForce = Math.min(1.0, Math.abs(currFaceX) + Math.abs(currFaceY) + Math.abs(currFaceZ));

                }

                        tessNodes.geometry.attributes.position.needsUpdate = true;

            if (structures['NETWORK'] && structures['NETWORK'].visible && shannonLines && shannonLines.geometry && shannonNodes.length > 0) {

            if (structures['MOBIUS'] && structures['MOBIUS'].visible && mobiusSystem && mobiusSystem.geometry && mobiusSystem.geometry.attributes.position && mobiusSystem.userData) {

                    edenPlayer.rotation.x = 0.2;
                }
                edenDebris.forEach(d => {
                    if(d && d.position && d.userData) {
                        d.position.z += (d.userData.speed * moodLerpValues.particleSpeedScale) + (audioData.mid * 5);
                        if(d.position.z > 30) {
                            d.position.z = -100;
                            d.position.x = (Math.random()-0.5)*35;
                            d.position.y = (Math.random()-0.5)*35;
                        }
                    }
                });
            }

            if (structures['NONE'] && structures['NONE'].visible && matrixLines.length > 0) {
                matrixLines.forEach(line => { 
                    if(line && line.position && line.userData) {
                        line.position.y += line.userData.speed * (1 + audioData.mid * 3);

function fridayEscapeHtml(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ═══ VOICE TRANSCRIPT SANITIZER ═══
// Live voice replies sometimes carry the personality engine's internal
// scaffolding alongside the spoken words: affective stage directions
// (*chuckles*, (softly)), mood/affect annotations ([mood: playful], Tone: warm),
// and reasoning / system markers (<thinking>…</thinking>, [internal: …]). Those
// steer HOW Friday speaks — they must never appear in the chat transcript. Strip
// them here, leaving only the words Friday actually said. Conservative on purpose:
// only bracketed/parenthetical fragments that read as cues are removed, so real
// content like "(see your calendar)" survives.
function sanitizeVoiceTranscript(raw){
  if(raw==null)return'';
  let t=String(raw);
  const KIND='thinking|thought|reasoning|internal|mood|emotion|emotional|affect|tone|voice|persona|personality|system|meta|stage';
  // 1. Reasoning / personality XML-ish blocks — drop tag AND contents.
  t=t.replace(new RegExp('<('+KIND+')\\b[^>]*>[\\s\\S]*?<\\/\\1>','gi'),' ');
  // 2. Orphan tags of the same kind (streamed / unclosed).

  t=t.replace(/\*[^*\n]{0,60}\*/g,' ');
  // 4. Bracketed annotations that read as cues (not content).
  const CUE=/\b(mood|tone|affect|emotion|emotional|feeling|internal|reasoning|thinking|system|persona|personality|voice|note|stage|aside|whisper|softly|warmly|gently|laugh|chuckle|sigh|pause|beat|smil|grin|wink|excited|playful|warm|calm|cheer|sarcas|dramatic|breath|nervous|teasing)\b/i;
  t=t.replace(/\[[^\]\n]{0,80}\]/g,(m)=>CUE.test(m)?' ':m);
  // 5. Parenthetical stage directions — short verb/adverb cues only.
  const PCUE=/\b(mood|tone|affect|emotion|laugh|laughs|laughing|chuckle|chuckles|chuckling|sigh|sighs|pause|pauses|beat|smil|smiles|smiling|grin|grins|wink|winks|softly|warmly|gently|quietly|cheerfully|playfully|excitedly|teasingly|whisper|whispers|breath|breathes|exhal|inhal|nervously)\b/i;
  t=t.replace(/\([^()\n]{0,40}\)/g,(m)=>PCUE.test(m)?' ':m);
  // 6. Leading "label:" cue lines (Mood:/Tone:/Affect:/Internal:/Reasoning:…).
  t=t.replace(/^[ \t]*(?:mood|tone|affect|emotion|emotional|feeling|internal|reasoning|thinking|persona|personality|voice|system|note|stage direction)[ \t]*[:\-–][ \t]*.*$/gim,' ');
  // 7. Collapse whitespace the removals left behind.
  t=t.replace(/[ \t]{2,}/g,' ').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').replace(/^\s+|\s+$/g,'');
  return t;
}

// Live "data source" indicator shown in a workspace title bar when a connector
// powers it. Green = a source is live; amber = connecting; red = configured but
// failing. Nothing renders when no connector feeds this workspace.
function ConnectorDot({wsId}){
  const map=useConnByWs();
  const s=map[wsId];
  if(!s||s==='off')return null;
  const col=s==='connected'?'#00ff80':s==='connecting'?'#f59e0b':'#ff5470';
  const tip=s==='connected'?'Live data source connected':s==='connecting'?'Connecting data source…':'Data source error — check Settings → Connectors';
  return <span title={tip} style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:col,boxShadow:`0 0 6px ${col}`,marginLeft:7,verticalAlign:'middle'}}/>;
}

function FWin({id,title,emoji,children,onClose,zIndex,onFocus}){
  // Size & position persist per workspace and are clamped to the viewport so a
  // window can never be dragged or resized off-screen.
  const LSK='friday_fwin_'+id;
  const vw=()=>window.innerWidth||document.documentElement.clientWidth||1280;
  const vh=()=>window.innerHeight||document.documentElement.clientHeight||800;
  const clampW=w=>Math.max(400,Math.min(w,vw()-20));
  const clampH=h=>Math.max(280,Math.min(h,vh()-50));
  const clampX=x=>Math.max(0,Math.min(x,vw()-120));
  const clampY=y=>Math.max(30,Math.min(y,vh()-60));
  const saved=(()=>{try{return JSON.parse(localStorage.getItem(LSK))}catch(_){return null}})();
  const[pos,setPos]=useState(saved&&saved.x!=null?{x:clampX(saved.x),y:clampY(saved.y)}:{x:60+Math.random()*300,y:40+Math.random()*80});
  const[size,setSize]=useState(saved&&saved.w!=null?{w:clampW(saved.w),h:clampH(saved.h)}:{w:660,h:460});
  const[dragging,setDragging]=useState(false);const[resizing,setResizing]=useState(false);
  const dOff=useRef({x:0,y:0});const rStart=useRef({x:0,y:0,w:0,h:0});
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:clampX(e.clientX-dOff.current.x),y:clampY(e.clientY-dOff.current.y)});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  useEffect(()=>{if(!resizing)return;const mv=e=>setSize({w:clampW(rStart.current.w+e.clientX-rStart.current.x),h:clampH(rStart.current.h+e.clientY-rStart.current.y)});const up=()=>setResizing(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[resizing]);
  // Persist geometry whenever it settles.
  useEffect(()=>{try{localStorage.setItem(LSK,JSON.stringify({x:pos.x,y:pos.y,w:size.w,h:size.h}))}catch(_){}},[pos.x,pos.y,size.w,size.h]);
  // ── Live customization Friday applied to THIS workspace via the 💬 chat ──
  const {map:wsCustMap}=useContext(WsCustomCtx);
  const cust=wsCustMap[id]||{};
  const customized=cust&&Object.keys(cust).length>0;
  const scope=`.ws-custom-root[data-ws="${id}"]`;
  let custCss='';
  if(cust.css)custCss+=cust.css.split('.ws-custom-root').join(scope)+'\n';
  if(cust.hidden&&cust.hidden.length)custCss+=cust.hidden.map(s=>`${scope} ${s}`).join(',')+'{display:none!important}\n';
  if(cust.density==='compact')custCss+=`${scope} .card{padding:7px 9px!important;margin-bottom:4px!important}${scope}{font-size:12px}\n`;
  if(cust.accent)custCss+=`${scope}{--ws-accent:${cust.accent}}${scope} .card-title{color:${cust.accent}}${scope}>.ws-accent-bar{background:${cust.accent}}\n`;
  const openWsChat=(seed)=>window.fridayOpenWorkspaceChat&&window.fridayOpenWorkspaceChat(id,title,emoji,seed);
  return(<div className="fwin" style={{left:pos.x,top:pos.y,width:size.w,height:size.h,zIndex}} onClick={onFocus}>
    <div className="fwin-bar" onMouseDown={e=>{if(e.target.closest('.fwin-btns'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y};onFocus()}}>
      <span className="fwin-title">{emoji} {title}<ConnectorDot wsId={id}/>{customized&&<span title="Friday has customized this workspace — open 💬 to tweak or revert" style={{marginLeft:6,fontSize:10,opacity:.85}}>🛠️</span>}</span><div className="fwin-btns"><button title={`Chat with Friday about ${title} — tweak the layout, add features, undo changes`} aria-label={`Workspace chat for ${title}`} onClick={e=>{e.stopPropagation();openWsChat()}} style={{fontSize:12}}>💬</button><button title={`Talk to Friday about ${title}`} aria-label={`Start voice for ${title}`} onClick={e=>{e.stopPropagation();window.fridayStartWorkspaceVoice&&window.fridayStartWorkspaceVoice(id)}} style={{fontSize:12}}>🎤</button><button onClick={onClose}>×</button></div>
    </div><div className="fwin-body"><div className="ws-custom-root" data-ws={id} style={{position:'relative'}}>
      {custCss&&<style dangerouslySetInnerHTML={{__html:custCss}}/>}
      {cust.accent&&<div className="ws-accent-bar" style={{position:'absolute',left:0,right:0,top:-2,height:2,opacity:.75,borderRadius:2}}/>}
      {cust.note&&<div style={{background:'rgba(255,84,112,0.08)',border:'1px solid rgba(255,84,112,0.25)',borderRadius:8,padding:'7px 10px',marginBottom:10,fontSize:12,color:'#ffd0d8',display:'flex',gap:8,alignItems:'flex-start'}}><span style={{flexShrink:0}}>🛠️</span><div style={{flex:1,minWidth:0}}><FridayDoc text={cust.note} style={{margin:0}}/></div><button onClick={()=>openWsChat('remove the pinned note')} title="Ask Friday to remove this note" style={{background:'none',border:'none',color:'#ff8aa0',cursor:'pointer',fontSize:13,lineHeight:1,flexShrink:0}}>×</button></div>}
      {cust.actions&&cust.actions.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>{cust.actions.map((a,i)=><button key={i} className="btn" style={{fontSize:11}} onClick={()=>openWsChat(a.prompt)}>{a.label}</button>)}</div>}

  </div>);

// ═══ WORKSPACE STUDIO CHAT ═══
// Contextual chat scoped to ONE workspace (opened by the 💬 button on its
// window). Friday knows which workspace you're in, so you can give feedback,
// ask for features, have her apply changes live, and roll them back. Every
// change is snapshotted server-side; each applied message carries a Revert.
// History persists per-workspace so context survives across sessions.
function WorkspaceChat({wsId,label,emoji,seedPrompt,onClose}){
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[versions,setVersions]=useState([]);
  const[showVer,setShowVer]=useState(false);
  const[toast,setToast]=useState('');
  const[pos,setPos]=useState(()=>({x:Math.max(20,(window.innerWidth||1280)-410),y:90}));
  const[dragging,setDragging]=useState(false);
  const dOff=useRef({x:0,y:0});
  const {setCust}=useContext(WsCustomCtx);
  const endRef=useRef(null);const inRef=useRef(null);const seededRef=useRef(false);
  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2600)};
  useEffect(()=>{if(!dragging)return;const mv=e=>setPos({x:Math.max(0,Math.min(e.clientX-dOff.current.x,(window.innerWidth||1280)-120)),y:Math.max(28,Math.min(e.clientY-dOff.current.y,(window.innerHeight||800)-80))});const up=()=>setDragging(false);addEventListener('mousemove',mv);addEventListener('mouseup',up);return()=>{removeEventListener('mousemove',mv);removeEventListener('mouseup',up)}},[dragging]);
  const load=()=>fetch(`/api/workspace/${wsId}/chat`).then(r=>r.json()).then(d=>{setMsgs(d.chat||[]);setVersions(d.versions||[]);if(d.customization!==undefined)setCust(wsId,d.customization)}).catch(()=>{});
  useEffect(()=>{load()},[wsId]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs.length,loading]);
  const send=async(override)=>{const m=(override||input).trim();if(!m||loading)return;setInput('');
    setMsgs(p=>[...p,{role:'user',text:m,time:new Date().toISOString()}]);setLoading(true);
    try{
      const r=await fetch(`/api/workspace/${wsId}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m,label})});
      const d=await r.json();
      setMsgs(p=>[...p,{role:'friday',text:d.response||'[no response]',applied:d.applied,revert_to:d.revert_to,change:d.change,time:new Date().toISOString()}]);
      if(d.customization!==undefined)setCust(wsId,d.customization);
      if(d.versions)setVersions(d.versions);
      if(d.applied)flash('✨ Applied: '+(d.change||'change'));
    }catch(e){setMsgs(p=>[...p,{role:'friday',text:'[Connection error]'}])}
    setLoading(false);inRef.current?.focus();
  };
  // Auto-send a seed prompt (e.g. clicked quick-action) exactly once.
  useEffect(()=>{if(seedPrompt&&!seededRef.current){seededRef.current=true;send(seedPrompt)}},[seedPrompt]);
  const revert=async(vid)=>{try{const r=await fetch(`/api/workspace/${wsId}/revert`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({version_id:vid})});const d=await r.json();if(d.status!=='ok'){flash('Revert failed');return}if(d.customization!==undefined)setCust(wsId,d.customization);if(d.versions)setVersions(d.versions);flash('↩ Reverted')}catch(e){flash('Revert failed')}};
  const reset=async()=>{if(!window.confirm('Reset ALL of Friday’s changes to this workspace back to default?'))return;try{const r=await fetch(`/api/workspace/${wsId}/reset`,{method:'POST'});const d=await r.json();setCust(wsId,d.customization||{});if(d.versions)setVersions(d.versions);flash('Workspace reset to default')}catch(e){flash('Reset failed')}};
  const clearChat=()=>{fetch(`/api/workspace/${wsId}/chat/clear`,{method:'POST'}).then(()=>{setMsgs([]);flash('History cleared')}).catch(()=>{})};
  const STARTERS=['Make this layout more compact','I don’t like the colors — try a warmer accent','Pin a note reminding me what this workspace is for','Add quick-action buttons for my common tasks here'];
  return(<div style={{position:'fixed',left:pos.x,top:pos.y,width:390,maxWidth:'94vw',height:'min(620px,76vh)',zIndex:130,display:'flex',flexDirection:'column',background:'rgba(10,14,24,0.97)',border:'1px solid rgba(0,212,255,0.28)',borderRadius:14,boxShadow:'0 18px 60px rgba(0,0,0,0.6)',backdropFilter:'blur(14px)',overflow:'hidden'}}>
    <div onMouseDown={e=>{if(e.target.closest('button'))return;setDragging(true);dOff.current={x:e.clientX-pos.x,y:e.clientY-pos.y}}} style={{cursor:'grab',padding:'10px 12px',borderBottom:'1px solid rgba(0,212,255,0.18)',display:'flex',alignItems:'center',gap:8,background:'rgba(0,212,255,0.05)'}}>
      <span style={{fontSize:15}}>💬</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontFamily:'Orbitron',fontSize:12,color:'#00d4ff',letterSpacing:'.04em'}}>{emoji} {label} · Studio</div>
        <div style={{fontSize:10,color:'#8891a8'}}>Shape this workspace by talking to Friday</div>
      </div>
      <button onClick={()=>setShowVer(v=>!v)} title="Version history" style={{background:'none',border:'1px solid rgba(255,255,255,0.14)',borderRadius:6,color:'#aab',cursor:'pointer',fontSize:11,padding:'2px 7px'}}>🕘 {versions.length}</button>
      <button onClick={onClose} title="Close" style={{background:'none',border:'none',color:'#9aa',cursor:'pointer',fontSize:18,lineHeight:1}}>×</button>
    </div>
    {showVer&&<div style={{maxHeight:160,overflowY:'auto',borderBottom:'1px solid rgba(255,255,255,0.08)',padding:'6px 10px',background:'rgba(0,0,0,0.25)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontSize:10,color:'#8891a8',textTransform:'uppercase',letterSpacing:'.06em'}}>Snapshots</span>
        <button onClick={reset} style={{background:'none',border:'1px solid rgba(255,84,112,0.4)',borderRadius:6,color:'#ff8aa0',cursor:'pointer',fontSize:10,padding:'2px 7px'}}>Reset to default</button>
      </div>
      {versions.length===0?<div style={{fontSize:11,color:'#777',padding:'4px 0'}}>No changes yet.</div>:[...versions].reverse().map(v=>(
        <div key={v.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:11,borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
          <span style={{color:'#bbc',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginRight:6}}>{v.label}</span>
          <button onClick={()=>revert(v.id)} style={{background:'none',border:'1px solid rgba(0,212,255,0.3)',borderRadius:5,color:'#00d4ff',cursor:'pointer',fontSize:10,padding:'1px 7px',flexShrink:0}}>↩ revert</button>
        </div>
      ))}
    </div>}
    <div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
      {msgs.length===0&&!loading&&<div style={{color:'#8891a8',fontSize:12,lineHeight:1.6}}>
        <div style={{marginBottom:10}}>Tell Friday what you want this workspace to be. She can restyle it, pin notes, add quick actions, or build new features — and undo anything.</div>
        {STARTERS.map((s,i)=><div key={i} onClick={()=>send(s)} className="card" style={{cursor:'pointer',padding:'7px 10px',marginBottom:5,fontSize:11.5}}>{s}</div>)}
      </div>}
      {msgs.map((m,i)=>(<div key={i} style={{marginBottom:10,display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
        <div style={{maxWidth:'90%',padding:'7px 11px',borderRadius:10,fontSize:12.5,lineHeight:1.5,background:m.role==='user'?'rgba(0,212,255,0.12)':'rgba(255,255,255,0.05)',border:m.role==='user'?'1px solid rgba(0,212,255,0.22)':'1px solid rgba(255,255,255,0.07)',color:'#dde'}}>
          {m.role==='user'?m.text:<FridayDoc text={m.text} compact style={{margin:0}}/>}
        </div>
        {m.applied&&m.revert_to&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:4,fontSize:10.5,color:'#9aa'}}>
          <span style={{color:'#00ff80'}}>✨ Applied{m.change?' · '+m.change:''}</span>
          <button onClick={()=>revert(m.revert_to)} style={{background:'none',border:'1px solid rgba(255,84,112,0.4)',borderRadius:5,color:'#ff8aa0',cursor:'pointer',fontSize:10,padding:'1px 7px'}}>↩ revert this</button>
        </div>}
      </div>))}
      {loading&&<div style={{display:'flex',gap:4,alignItems:'center',color:'#00d4ff',fontSize:12,padding:'4px 2px'}}><span className="ws-typing-dot"/><span className="ws-typing-dot" style={{animationDelay:'.15s'}}/><span className="ws-typing-dot" style={{animationDelay:'.3s'}}/><span style={{marginLeft:4,color:'#8891a8'}}>Friday is working…</span></div>}
      <div ref={endRef}/>
    </div>
    {toast&&<div style={{padding:'4px 12px',fontSize:11,color:'#00d4ff',background:'rgba(0,212,255,0.06)'}}>{toast}</div>}
    <div style={{padding:'8px 10px',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',gap:6,alignItems:'flex-end'}}>
      <textarea ref={inRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}
        placeholder={`Ask Friday to change ${label}…`} rows={1}
        style={{flex:1,resize:'none',maxHeight:90,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(0,212,255,0.18)',borderRadius:8,color:'#dde',fontSize:12.5,padding:'7px 9px',fontFamily:'Inter',outline:'none'}}/>
      <button onClick={()=>send()} disabled={loading||!input.trim()} className="btn" style={{fontSize:12,fontWeight:600,opacity:(loading||!input.trim())?0.5:1}}>Send</button>
    </div>

  </div>);
}
