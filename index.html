// ═══ COMMAND PALETTE (Ctrl+K) ═══
function CommandPalette({onClose,onOpenWs,openWins}){
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);
  const[contacts,setContacts]=useState([]);
  const[routines,setRoutines]=useState([]);
  const inputRef=useRef(null);

  useEffect(()=>{inputRef.current?.focus()},[]);
  useEffect(()=>{
    fetch('/api/contacts').then(r=>r.json()).then(d=>setContacts(d.contacts||d.items||[])).catch(()=>{});
    fetch('/api/routines').then(r=>r.json()).then(d=>setRoutines(d.routines||d.items||[])).catch(()=>{});
  },[]);

  const query=q.trim().toLowerCase();
  const wsResults=WS.filter(w=>!query||w.label.toLowerCase().includes(query)||w.id.includes(query))
    .map(w=>({kind:'ws',id:w.id,ico:w.ico,label:w.label,meta:openWins.has(w.id)?'open':'open workspace'}));
  const contactResults=(query?contacts.filter(c=>(c.name||c.label||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(c=>({kind:'contact',id:c.id||c.name,ico:'👤',label:c.name||c.label,meta:c.email||c.role||'contact'}));
  const routineResults=(query?routines.filter(r=>(r.label||r.name||'').toLowerCase().includes(query)):[]).slice(0,6)
    .map(r=>({kind:'routine',id:r.id,ico:'⚡',label:r.label||r.name,meta:r.schedule||r.category||'routine'}));
  const sections=[
    {title:'Workspaces',items:wsResults},
    {title:'Contacts',items:contactResults},
    {title:'Routines',items:routineResults},
  ].filter(s=>s.items.length>0);
  const flat=sections.flatMap(s=>s.items);
  useEffect(()=>{setSel(0)},[q]);

  const activate=(item)=>{
    if(!item)return;
    if(item.kind==='ws')onOpenWs(item.id);
    else if(item.kind==='routine'){
      fetch(`/api/routines/${item.id}/run`,{method:'POST'}).catch(()=>{});
      onClose();
    }else if(item.kind==='contact'){
      onOpenWs('contacts');
    }
  };

  const onKey=(e)=>{
    if(e.key==='Escape'){e.preventDefault();onClose()}
    else if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(flat.length-1,s+1))}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(0,s-1))}
    else if(e.key==='Enter'){e.preventDefault();activate(flat[sel])}
  };

  return(<div className="cmd-palette-overlay" onClick={onClose}>
    <div className="cmd-palette" onClick={e=>e.stopPropagation()} onKeyDown={onKey}>
      <input ref={inputRef} className="cmd-palette-input" placeholder="Search workspaces, contacts, routines…"
        value={q} onChange={e=>setQ(e.target.value)}/>
      <div className="cmd-palette-results">
        {flat.length===0&&<div className="cmd-palette-empty">No matches</div>}
        {(()=>{let idx=-1;return sections.map(s=>(<div key={s.title}>
          <div className="cmd-palette-section">{s.title}</div>
          {s.items.map(it=>{idx++;const i=idx;return(
            <div key={`${it.kind}-${it.id}`} className={`cmd-palette-item ${i===sel?'selected':''}`}
              onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="ico">{it.ico}</span>
              <span>{it.label}</span>
              <span className="meta">{it.meta}</span>
            </div>
          )})}
        </div>))})()}
      </div>
    </div>
  </div>);
}

// ═══ SEND-TO DROPDOWN (Data Flow) ═══
function SendTo({content,personName,eventId,emailThreadId,dataType,options}){
  const[open,setOpen]=useState(false);const[status,setStatus]=useState(null);const ref=useRef(null);
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h)},[open]);
  const defaultOpts=[
    {label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},
    {label:'Save to Trust Graph',dest:'trust_graph',ico:'🔗',needsPerson:true},
    {label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},
    {label:'Add to Briefing',dest:'briefing',ico:'📰'},
    {label:'Draft Email',dest:'gmail_draft',ico:'✉️'},
  ];
  const opts=(options||defaultOpts).filter(o=>{
    if(o.needsPerson&&!personName)return false;
    if(o.needsEvent&&!eventId)return false;
    return true;
  });
  const send=async(dest)=>{
    setStatus('sending');setOpen(false);
    try{
      const r=await fetch('/api/flow',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        data_type:dataType||'general',content:typeof content==='function'?content():content,
        metadata:{person_name:personName||'',event_id:eventId||'',email_thread_id:emailThreadId||''},
        destinations:[dest]
      })});
      const d=await r.json();
      const ok=d.results&&d.results[0]&&d.results[0].ok;
      setStatus(ok?'ok':'fail');
    }catch(e){setStatus('fail')}
    setTimeout(()=>setStatus(null),2000);
  };
  if(opts.length===0)return null;
  return(<div ref={ref} style={{position:'relative',display:'inline-block'}}>
    <button onClick={e=>{e.stopPropagation();setOpen(!open)}} style={{background:'none',border:'1px solid rgba(0,212,255,0.15)',borderRadius:4,padding:'2px 6px',cursor:'pointer',fontSize:12,color:status==='ok'?'#00ff80':status==='fail'?'#ff0080':'#00d4ff',transition:'color .2s'}} title="Send to...">{status==='ok'?'✓':status==='fail'?'✗':status==='sending'?'⏳':'📤'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,background:'rgba(10,10,18,0.95)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:6,padding:4,minWidth:160,zIndex:9999,backdropFilter:'blur(12px)',boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
      {opts.map((o,i)=><div key={i} onClick={()=>send(o.dest)} style={{padding:'6px 10px',fontSize:11,color:'#ccc',cursor:'pointer',borderRadius:4,display:'flex',alignItems:'center',gap:6,transition:'background .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,212,255,0.08)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}><span>{o.ico}</span><span>{o.label}</span></div>)}
    </div>}
  </div>);
}

// Reusable glassmorphic button that triggers voice mode pre-loaded with context.
// contentType: 'article'|'briefing'|'editorial'|'creation'
// title/summary: strings used to prime Friday's opening question
function TalkToFridayButton({contentType,title,summary,style}){
  const[active,setActive]=useState(false);
  const onClick=(e)=>{
    e.stopPropagation();
    if(!window.fridayVoice){
      alert('Enable voice mode first, then try again.');
      return;
    }
    setActive(true);
    setTimeout(()=>setActive(false),2000);
    const typeLabel=contentType==='creation'?'creation':contentType==='briefing'?'briefing':contentType==='editorial'?'editorial':'article';
    const ctx=`The user wants to discuss a ${typeLabel}: "${title||'this content'}". ${summary?'Brief summary: '+String(summary).slice(0,350)+'. ':''}Please start by asking: "Would you like me to read this to you, or shall we discuss it?"`;
    const sourcesMd=`🎤 **Discussing with Friday** · ${title||''}${contentType?' · '+contentType:''}`;
    window.fridayVoice.startAnchor({prompt:ctx,sourcesMd});
  };
  return<button onClick={onClick} title={`Discuss "${title||'this'}" with Friday`} style={Object.assign({},{
    fontSize:10,padding:'3px 9px',cursor:'pointer',
    background:active?'rgba(124,58,237,0.35)':'rgba(124,58,237,0.1)',
    border:'1px solid rgba(124,58,237,'+(active?'0.7':'0.3')+')',
    borderRadius:5,color:active?'#e0c8ff':'#b794f6',
    display:'inline-flex',alignItems:'center',gap:4,
    transition:'all .2s',whiteSpace:'nowrap',fontFamily:'inherit',
    boxShadow:active?'0 0 10px rgba(124,58,237,0.35)':'none',
  },style||{})}>
    <span style={{fontSize:11}}>🎤</span>{active?'Starting…':'Discuss with Friday'}
  </button>;
}

  const doLog=async(status)=>{if(!selected)return;
    const body={contact:selected.type==='contact'?selected.name:'',company:selected.type==='company'?selected.name:'',channel,angle,message:draft,status};
    try{await fetch('/api/outreach/log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});setToast('Logged as '+status);load()}catch(e){setToast('Log failed')}
    setTimeout(()=>setToast(''),2000)};
  const doCopy=async()=>{if(!draft)return;try{await navigator.clipboard.writeText(draft);setToast('Copied')}catch(e){setToast('Copy failed')}setTimeout(()=>setToast(''),1500)};
  if(loading)return <div style={{color:'#999',textAlign:'center',padding:40}}>Loading outreach pipeline...</div>;
  const warm=sug?.warm_contacts||[];const targets=sug?.career_targets||[];const recent=pipe?.recent||[];
  return(<div>
    <FridaySays text={`${pipe?.total||0} outreach events logged · ${warm.length} warm contacts · ${targets.length} career targets.`}/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
      <div className="card"><div className="card-title">Warm Contacts</div>
        {warm.length===0?<div style={{color:'#999',fontSize:11}}>No warm leads (trust &lt; 55%).</div>:warm.slice(0,10).map((w,i)=>{const pct=Math.round((w.score||0)*100);const col=pct>70?'#00ff80':pct>55?'#f59e0b':'#888';return(<div key={i} style={{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',cursor:'pointer',opacity:w.already_contacted?0.5:1}} onClick={()=>pickContact(w.contact)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,color:'#ccc'}}>{w.contact}</span><span style={{fontFamily:'Orbitron',fontSize:11,color:col}}>{pct}%</span></div>
          <div style={{fontSize:11,color:'#a8a8b4'}}>{w.reason}{w.already_contacted?' · contacted':''}</div>
        </div>)})}
      </div>
      <div className="card"><div className="card-title">Career Targets</div>
        {targets.length===0?<div style={{color:'#999',fontSize:11}}>No applied/interviewing targets.</div>:targets.map((t,i)=>(<div key={i} style={{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',cursor:'pointer'}} onClick={()=>pickCompany(t.company)}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:12,color:'#ccc'}}>{t.company}</span><span className="badge-cyan" style={{fontSize:11}}>{t.status||''}</span></div>
          <div style={{fontSize:11,color:'#a8a8b4'}}>{t.reason}</div>
        </div>))}
      </div>
    </div>
    {selected&&<div className="card" style={{marginBottom:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div><span style={{fontSize:12,fontWeight:600,color:'#00d4ff'}}>Drafting → {selected.name}</span><span style={{fontSize:11,color:'#999',marginLeft:6}}>({selected.type})</span></div>
        <button className="btn" style={{fontSize:11}} onClick={()=>{setSelected(null);setDraft('')}}>Clear</button>
      </div>
      <div style={{display:'flex',gap:4,marginBottom:6,flexWrap:'wrap'}}>
        {['reconnect','intro','referral','follow-up','thank-you','ask'].map(a=><button key={a} className={'btn '+(angle===a?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setAngle(a)}>{a}</button>)}
      </div>
      <div style={{display:'flex',gap:4,marginBottom:6}}>
        {['email','linkedin','sms','call'].map(c=><button key={c} className={'btn '+(channel===c?'':'btn-magenta')} style={{fontSize:11,padding:'2px 6px'}} onClick={()=>setChannel(c)}>{c}</button>)}
      </div>
      <textarea className="input" style={{width:'100%',height:44,resize:'vertical',fontSize:11,marginBottom:6}} value={ctx} onChange={e=>setCtx(e.target.value)} placeholder="Context / specifics (optional)"/>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        <button className="btn" onClick={doDraft} disabled={drafting} style={{fontSize:11,fontWeight:600}}>{drafting?'Drafting...':'Draft'}</button>
        {draft&&<>
          <button className="btn" onClick={doCopy} style={{fontSize:11}}>📋 Copy</button>
          <button className="btn" onClick={()=>doLog('sent')} style={{fontSize:11}}>Log Sent</button>
          <button className="btn btn-magenta" onClick={()=>doLog('drafted')} style={{fontSize:11}}>Log Drafted</button>
        </>}
      </div>
      {toast&&<div style={{fontSize:11,color:'#00d4ff',marginTop:6}}>{toast}</div>}
      {draft&&<pre style={{whiteSpace:'pre-wrap',fontSize:11,color:'#ccc',fontFamily:'JetBrains Mono',marginTop:8,background:'rgba(255,255,255,0.05)',padding:8,borderRadius:6,lineHeight:1.5}}>{draft}</pre>}
    </div>}
    <div className="card"><div className="card-title">Recent Pipeline ({pipe?.total||0})</div>
      {recent.length===0?<div style={{color:'#999',fontSize:11}}>No outreach logged yet.</div>:recent.slice(0,15).map((e,i)=>(<div key={e.id||i} style={{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:11}}>
        <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:'#ccc'}}>{e.contact||e.company||'—'} <span style={{color:'#999'}}>· {e.channel}</span></span><span style={{fontSize:11,color:'#a8a8b4'}}>{(e.timestamp||'').slice(0,10)}</span></div>
        <div style={{fontSize:11,color:'#a8a8b4'}}>{e.angle||''} · <span className="badge-cyan" style={{fontSize:11}}>{e.status}</span></div>
      </div>))}
    </div>
  </div>);
}
function WikiWS(){
  const[struct,setStruct]=useState(null);
  const[recent,setRecent]=useState([]);
  const[pending,setPending]=useState([]);
  const[pendingOpen,setPendingOpen]=useState(true);
  const[content,setContent]=useState('Select a file from the sidebar');
  const[path,setPath]=useState('');
  const[loading,setLoading]=useState(true);
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState('');
  const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState('');
  const[query,setQuery]=useState('');
  const[searchResults,setSearchResults]=useState(null);
  const[searching,setSearching]=useState(false);
  const[confirmDelete,setConfirmDelete]=useState(null);
  const[confirmText,setConfirmText]=useState('');
  const searchTimer=useRef(null);

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),2200)};

  const refreshStructure=()=>fetch('/api/wiki/structure').then(r=>r.json()).then(d=>{
    const raw=d.structure||{};
    const sections=Object.entries(raw).map(([name,files])=>({name,files:Array.isArray(files)?files:[]}));
    setStruct({sections});
    setRecent(d.recent||[]);
  }).catch(()=>{});

  const refreshPending=()=>fetch('/api/wiki/pending').then(r=>r.json()).then(d=>setPending(d.pending||[])).catch(()=>setPending([]));

  useEffect(()=>{Promise.all([refreshStructure(),refreshPending()]).finally(()=>setLoading(false))},[]);

  const load=(s,f)=>{const fn=typeof f==='string'?f:(f.filename||f.name);
    setPath(`${s}/${fn}`);setEditing(false);setDraft('');setContent('Loading...');
    fetch(`/api/wiki/${s}/${fn}`).then(r=>r.json()).then(d=>setContent(d.content||d.error||'Empty')).catch(()=>setContent('Error loading file'));
  };

  const loadPath=(p)=>{const [s,...rest]=p.split('/');const fn=rest.join('/');load(s,fn)};

  const beginEdit=()=>{setDraft(content||'');setEditing(true)};
  const cancelEdit=()=>{setEditing(false);setDraft('')};
  const saveEdit=async()=>{if(!path)return;setSaving(true);
    try{const r=await fetch('/api/wiki/edit',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({file:path,content:draft})});
      const d=await r.json();
      if(d.status==='ok'){setContent(draft);setEditing(false);showToast('Saved · '+d.bytes+' bytes');refreshStructure()}
      else showToast('Save failed: '+(d.message||'unknown'))}
    catch(e){showToast('Save error')}
    setSaving(false);
  };

  // Debounced search
  useEffect(()=>{
    if(searchTimer.current)clearTimeout(searchTimer.current);
    if(!query.trim()){setSearchResults(null);return}
    setSearching(true);
    searchTimer.current=setTimeout(()=>{
      fetch('/api/wiki/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:query.trim()})})
        .then(r=>r.json()).then(d=>{setSearchResults(d.results||[]);setSearching(false)})
        .catch(()=>{setSearchResults([]);setSearching(false)});
    },300);
    return()=>{if(searchTimer.current)clearTimeout(searchTimer.current)};
  },[query]);

  const approvePending=async(id)=>{
    try{await fetch(`/api/wiki/pending/${id}/approve`,{method:'POST'});showToast('Approved');refreshPending();refreshStructure()}
    catch{showToast('Approve failed')}
  };
  const rejectPending=async(id)=>{
    try{await fetch(`/api/wiki/pending/${id}/reject`,{method:'POST'});showToast('Rejected');refreshPending()}
    catch{showToast('Reject failed')}
  };

  const deleteFile=async()=>{
    if(!confirmDelete||confirmText!=='DELETE'){showToast('Type DELETE to confirm');return}
    try{const r=await fetch('/api/wiki/file',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({file:confirmDelete,confirm:'DELETE'})});
      const d=await r.json();
      if(d.deleted){showToast('Deleted '+confirmDelete);if(path===confirmDelete){setPath('');setContent('Select a file from the sidebar')}}
      else showToast('Not deleted: '+(d.message||d.status));
      setConfirmDelete(null);setConfirmText('');refreshStructure()}
    catch{showToast('Delete failed')}
  };

  if(loading)return <div style={{color:'#999',textAlign:'center',padding:40}}>Loading wiki...</div>;
  const totalFiles=struct?.sections?.reduce((a,s)=>a+(s.files?.length||0),0)||0;

  const renderDiff=(p)=>{const oldV=p.old_value||'';const newV=p.new_value||'';
    return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:4}}>
      <div style={{background:'rgba(255,0,128,0.06)',border:'1px solid rgba(255,0,128,0.18)',borderRadius:4,padding:6,fontFamily:'JetBrains Mono',fontSize:11,color:'#ffb0c8',whiteSpace:'pre-wrap',maxHeight:160,overflowY:'auto'}}>{oldV||<em style={{color:'#666'}}>(empty — will append)</em>}</div>
      <div style={{background:'rgba(0,255,128,0.06)',border:'1px solid rgba(0,255,128,0.18)',borderRadius:4,padding:6,fontFamily:'JetBrains Mono',fontSize:11,color:'#b0ffc8',whiteSpace:'pre-wrap',maxHeight:160,overflowY:'auto'}}>{newV}</div>
    </div>);
  };

  return(<div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    {/* Search bar + toast */}
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 Search wiki..."
        style={{flex:1,background:'rgba(255,255,255,0.04)',border:'1px solid rgba(0,212,255,0.18)',borderRadius:6,padding:'6px 10px',color:'#ddd',fontSize:12,fontFamily:'Inter',outline:'none'}}/>
      {pending.length>0&&<span style={{fontSize:11,color:'#f59e0b',fontFamily:'Orbitron',letterSpacing:'.05em'}}>{pending.length} pending</span>}
    </div>
    {toast&&<div style={{fontSize:11,color:'#00d4ff',marginBottom:6,fontFamily:'JetBrains Mono'}}>✓ {toast}</div>}

    {/* Pending updates panel */}
    {pending.length>0&&<div style={{marginBottom:8,border:'1px solid rgba(245,158,11,0.25)',borderRadius:6,background:'rgba(245,158,11,0.04)'}}>
      <div onClick={()=>setPendingOpen(!pendingOpen)} style={{padding:'6px 10px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontFamily:'Orbitron',fontSize:11,color:'#f59e0b',letterSpacing:'.05em'}}>📋 PENDING UPDATES ({pending.length})</span>
        <span style={{color:'#888',fontSize:11}}>{pendingOpen?'▾':'▸'}</span>
      </div>
      {pendingOpen&&<div style={{padding:'4px 10px 10px',maxHeight:280,overflowY:'auto'}}>
        {pending.map(p=>(<div key={p.id} style={{padding:8,borderTop:'1px solid rgba(245,158,11,0.12)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:'#00d4ff',fontFamily:'JetBrains Mono'}}>{p.file}{p.section?` · §${p.section}`:''}</div>
              {p.reason&&<div style={{fontSize:11,color:'#a8a8b4',fontStyle:'italic',marginTop:2}}>{p.reason}</div>}
            </div>
            <div style={{display:'flex',gap:4,flexShrink:0}}>
              <button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#00ff80',borderColor:'rgba(0,255,128,0.4)'}} onClick={()=>approvePending(p.id)}>Approve</button>
              <button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#ff0080',borderColor:'rgba(255,0,128,0.4)'}} onClick={()=>rejectPending(p.id)}>Reject</button>
            </div>
          </div>
          {renderDiff(p)}
        </div>))}
      </div>}
    </div>}

    {/* Search results overlay */}
    {searchResults!==null&&<div style={{marginBottom:8,border:'1px solid rgba(0,212,255,0.18)',borderRadius:6,background:'rgba(0,212,255,0.03)',padding:8,maxHeight:240,overflowY:'auto'}}>
      <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff',marginBottom:6,letterSpacing:'.05em'}}>{searching?'Searching...':`${searchResults.length} match${searchResults.length===1?'':'es'} for "${query}"`}</div>
      {searchResults.map((r,i)=>(<div key={i} style={{padding:'6px 0',borderTop:i?'1px solid rgba(255,255,255,0.04)':'none',cursor:'pointer'}} onClick={()=>{loadPath(r.path);setQuery('');setSearchResults(null)}}>
        <div style={{fontSize:11,color:'#00d4ff',fontFamily:'JetBrains Mono'}}>{r.path} <span style={{color:'#888'}}>· {r.matches}</span></div>
        {(r.snippets||[]).map((s,j)=>(<div key={j} style={{fontSize:11,color:'#bbb',marginLeft:8,marginTop:2,fontFamily:'JetBrains Mono'}}>L{s.line}: {s.text}</div>))}
      </div>))}
    </div>}

    {/* Main split: sidebar + content */}
    <div style={{display:'flex',gap:12,flex:1,minHeight:0}}>
      <div style={{width:200,borderRight:'1px solid rgba(255,255,255,0.04)',paddingRight:8,overflowY:'auto',flexShrink:0}}>
        <div style={{fontSize:11,color:'#888',marginBottom:8,fontFamily:'JetBrains Mono'}}>{totalFiles} files · {struct?.sections?.length||0} sections</div>

        {recent.length>0&&<div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:'#7c3aed',fontFamily:'Orbitron',margin:'4px 0 3px',letterSpacing:'.05em'}}>RECENT</div>
          {recent.map(r=>(<div key={r.path} onClick={()=>loadPath(r.path)} style={{fontSize:11,color:path===r.path?'#00d4ff':'#888',cursor:'pointer',padding:'2px 0'}} title={r.modified_iso||''} onMouseOver={e=>e.currentTarget.style.color='#00d4ff'} onMouseOut={e=>{if(path!==r.path)e.currentTarget.style.color='#888'}}>{r.section}/{r.filename}</div>))}
        </div>}

        {struct?.sections?.map(s=><div key={s.name}>
          <div style={{fontSize:11,color:'#00d4ff',fontFamily:'Orbitron',margin:'8px 0 3px',letterSpacing:'.05em'}}>{s.name} <span style={{color:'#a8a8b4'}}>({(s.files||[]).length})</span></div>
          {(s.files||[]).map(f=>{const fn=typeof f==='string'?f:(f.filename||f.name);const p=`${s.name}/${fn}`;return(<div key={fn} onClick={()=>load(s.name,f)} style={{fontSize:11,color:path===p?'#00d4ff':'#a8a8b4',cursor:'pointer',padding:'2px 0',transition:'color .15s'}} onMouseOver={e=>e.currentTarget.style.color='#00d4ff'} onMouseOut={e=>{if(path!==p)e.currentTarget.style.color='#a8a8b4'}}>{fn}</div>)})}
        </div>)}
      </div>

      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>
        {path&&<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:11,color:'#999',fontFamily:'JetBrains Mono'}}>wiki/{path}</div>
          <div style={{display:'flex',gap:4}}>
            {!editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={beginEdit}>✎ Edit</button>}
            {editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#00ff80',borderColor:'rgba(0,255,128,0.4)'}} disabled={saving} onClick={saveEdit}>{saving?'Saving...':'💾 Save'}</button>}
            {editing&&<button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={cancelEdit}>Cancel</button>}
            {!editing&&path&&<button className="btn" style={{fontSize:11,padding:'2px 8px',color:'#ff0080',borderColor:'rgba(255,0,128,0.4)'}} onClick={()=>{setConfirmDelete(path);setConfirmText('')}}>🗑 Delete</button>}
          </div>
        </div>}
        {editing
          ?<textarea value={draft} onChange={e=>setDraft(e.target.value)} spellCheck={false}
            style={{flex:1,minHeight:300,width:'100%',background:'rgba(0,0,0,0.35)',color:'#ddd',border:'1px solid rgba(0,212,255,0.22)',borderRadius:6,padding:10,fontFamily:'JetBrains Mono',fontSize:12,lineHeight:1.6,resize:'vertical',outline:'none'}}/>
          :<FridayDoc text={content} style={{margin:0}}/>}
      </div>
    </div>

    {/* Delete confirmation modal */}
    {confirmDelete&&<div onClick={()=>{setConfirmDelete(null);setConfirmText('')}} style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'min(440px,90vw)',background:'rgba(15,5,15,0.97)',border:'1px solid rgba(255,0,128,0.45)',borderRadius:10,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.85)'}}>
        <div style={{fontFamily:'Orbitron',fontSize:12,color:'#ff0080',letterSpacing:'.1em',marginBottom:8}}>⚠ DELETE WIKI FILE</div>
        <div style={{fontSize:12,color:'#ddd',marginBottom:10,lineHeight:1.5}}>This will permanently delete <strong style={{color:'#ff0080'}}>{confirmDelete}</strong>. Type <strong>DELETE</strong> to confirm.</div>
        <input value={confirmText} onChange={e=>setConfirmText(e.target.value)} placeholder="DELETE" autoFocus
          style={{width:'100%',background:'rgba(0,0,0,0.4)',color:'#fff',border:'1px solid rgba(255,0,128,0.4)',borderRadius:6,padding:'8px 10px',fontFamily:'JetBrains Mono',fontSize:13,outline:'none',marginBottom:10}}/>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn" style={{fontSize:11}} onClick={()=>{setConfirmDelete(null);setConfirmText('')}}>Cancel</button>
          <button className="btn" style={{fontSize:11,color:'#ff0080',borderColor:'rgba(255,0,128,0.5)'}} disabled={confirmText!=='DELETE'} onClick={deleteFile}>Delete Permanently</button>
        </div>
      </div>
    </div>}
  </div>);
}
// ═══ FUTURESPEAK STUDIO — portfolio project / deployment cockpit ═══
// Project-management layer over the Dev Studio vibe-coding backend. Each
// deployed site gets an interactive card with live git/deploy status, an
// "Open in Replit" jump, scoped Quick Edit, and a one-click Apply+Deploy flow.
const FS_DEPLOY_META={
  green:{c:'#00ff80',label:'DEPLOYED'},
  yellow:{c:'#f59e0b',label:'UNCOMMITTED'},
  red:{c:'#ff0080',label:'ERROR'},
  remote:{c:'#00d4ff',label:'REPLIT-ONLY'},
};
const FS_CAT_META={
  company:{c:'#00d4ff',ico:'🚀'},
  client:{c:'#f59e0b',ico:'🤝'},
  personal:{c:'#7c3aed',ico:'💜'},
};
function FSProjectCard({p,onToast,onChanged}){
  const[expanded,setExpanded]=useState(false);
  const[editing,setEditing]=useState(false);
  const[instr,setInstr]=useState('');
  const[deploy,setDeploy]=useState(false);
  const[busy,setBusy]=useState(false);
  const st=p.status||{};
  const ds=FS_DEPLOY_META[st.deploy_status]||FS_DEPLOY_META.remote;
  const cat=FS_CAT_META[p.category]||FS_CAT_META.company;
  const cloned=st.cloned;
  const runEdit=async()=>{
    if(!instr.trim())return;setBusy(true);
    try{const r=await fetch('/api/futurespeak/project/'+encodeURIComponent(p.name)+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task:instr,deploy})});
      const d=await r.json();
      if(d.status==='ok'){onToast((deploy?'Deploy':'Quick Edit')+' launched for '+p.name+' — track in Code workspace');setInstr('');setEditing(false);setDeploy(false)}
      else onToast(d.message||'Launch failed')}
    catch(e){onToast('Launch failed')}
    setBusy(false);
  };
  const removeProject=async()=>{
    if(!window.confirm('Remove "'+p.name+'" from the portfolio? (Does not touch the repo.)'))return;
    try{await fetch('/api/futurespeak/project/'+encodeURIComponent(p.name),{method:'DELETE'});onToast(p.name+' removed');onChanged&&onChanged()}
    catch(e){onToast('Remove failed')}
  };
  return(<div className="card" style={{borderColor:ds.c+'33',display:'flex',flexDirection:'column',gap:6,transition:'all .2s',position:'relative'}}
    onMouseEnter={e=>e.currentTarget.style.borderColor=ds.c+'88'} onMouseLeave={e=>e.currentTarget.style.borderColor=ds.c+'33'}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:16}}>{cat.ico}</span>
          <span style={{fontSize:14,fontWeight:700,color:'#eee',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
        </div>
        {p.url?<a href={p.url} target="_blank" rel="noopener" style={{fontSize:11,color:'#00d4ff',textDecoration:'none'}}>{p.url.replace(/^https?:\/\//,'')} →</a>:<span style={{fontSize:11,color:'#666'}}>no public URL</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
        <span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,fontFamily:'Orbitron',color:ds.c}}>

        </span>

}
function FSStudio(){
  const[projects,setProjects]=useState([]);const[counts,setCounts]=useState({});
  const[loading,setLoading]=useState(true);const[scanning,setScanning]=useState(false);
  const[toast,setToast]=useState('');const[discovered,setDiscovered]=useState([]);
  const[wizard,setWizard]=useState(false);const[wMode,setWMode]=useState('describe');
  const[wDesc,setWDesc]=useState('');const[wBusy,setWBusy]=useState(false);
  const[wf,setWf]=useState({name:'',url:'',replit_url:'',repo:'',description:'',category:'company'});
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),2800)};
  const load=useCallback(()=>{fetch('/api/futurespeak/projects').then(r=>r.json()).then(d=>{setProjects(d.projects||[]);setCounts(d.by_deploy||{});setLoading(false)}).catch(()=>setLoading(false))},[]);
  useEffect(()=>{load()},[load]);
  const refreshAll=async()=>{setScanning(true);
    try{const r=await fetch('/api/futurespeak/scan').then(r=>r.json());setDiscovered(r.discovered||[]);showToast('Scanned '+(r.total||0)+' deployable repos · '+((r.discovered||[]).length)+' new');load()}
    catch(e){showToast('Scan failed')}
    setScanning(false);
  };
  const addDiscovered=async(c)=>{
    try{const r=await fetch('/api/futurespeak/project',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:c.repo,repo:c.repo,repo_path:c.repo_path,replit_url:'',description:(c.last_commit_msg||'').slice(0,80),category:'company'})}).then(r=>r.json());
      if(r.status==='ok'){showToast(c.repo+' added to portfolio');setDiscovered(d=>d.filter(x=>x.repo!==c.repo));load()}else showToast(r.message||'Add failed')}
    catch(e){showToast('Add failed')}
  };
  const scaffold=async()=>{
    if(!wDesc.trim())return;setWBusy(true);
    try{await fetch('/api/vibe-code/launch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tasks:['Scaffold a new web project: '+wDesc+'. Create a clean modern site, initialize a git repo, create a GitHub repo, push it, then print deploy instructions.'],cwd:'~\\Projects'})});
      showToast('Scaffold launched in Claude Code — watch the Code workspace');setWDesc('');setWizard(false)}
    catch(e){showToast('Launch failed')}
    setWBusy(false);
  };
  const addManual=async()=>{
    if(!wf.name.trim()){showToast('Name required');return}
    setWBusy(true);
    try{const r=await fetch('/api/futurespeak/project',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(wf)}).then(r=>r.json());
      if(r.status==='ok'){showToast(wf.name+' added');setWf({name:'',url:'',replit_url:'',repo:'',description:'',category:'company'});setWizard(false);load()}else showToast(r.message||'Add failed')}
    catch(e){showToast('Add failed')}
    setWBusy(false);
  };
  if(loading)return <div style={{color:'#999',textAlign:'center',padding:30}}>Loading portfolio…</div>;
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:6}}>
      <div style={{display:'flex',gap:10,fontSize:11,fontFamily:'Orbitron',alignItems:'center'}}>
        <span style={{color:'#00ff80'}}>● {counts.green||0} deployed</span>
        <span style={{color:'#f59e0b'}}>● {counts.yellow||0} uncommitted</span>
        {(counts.red||0)>0&&<span style={{color:'#ff0080'}}>● {counts.red} error</span>}
        <span style={{color:'#00d4ff'}}>● {counts.remote||0} replit-only</span>
      </div>
      <div style={{display:'flex',gap:4}}>
        <button className="btn" style={{fontSize:11}} onClick={refreshAll} disabled={scanning}>{scanning?'Scanning…':'🔄 Refresh All'}</button>
        <button className="btn" style={{fontSize:11,fontWeight:600}} onClick={()=>setWizard(!wizard)}>＋ New Project</button>
      </div>
    </div>
    {toast&&<div style={{fontSize:11,color:'#00d4ff',marginBottom:8}}>{toast}</div>}
    {wizard&&<div className="card" style={{marginBottom:10,borderColor:'rgba(0,212,255,0.3)'}}>
      <div style={{display:'flex',gap:4,marginBottom:8}}>
        <button className={'btn '+(wMode==='describe'?'':'btn-magenta')} style={{fontSize:11}} onClick={()=>setWMode('describe')}>🪄 Describe (scaffold)</button>
        <button className={'btn '+(wMode==='manual'?'':'btn-magenta')} style={{fontSize:11}} onClick={()=>setWMode('manual')}>✍️ Add existing</button>
      </div>
      {wMode==='describe'?<div>
        <textarea className="input" style={{width:'100%',height:60,resize:'vertical',fontSize:12}} value={wDesc} onChange={e=>setWDesc(e.target.value)} placeholder="Describe the site to create… (e.g. 'a landing page for a solar installer with a quote form')"/>
        <button className="btn" style={{fontSize:11,fontWeight:600,marginTop:6}} disabled={wBusy||!wDesc.trim()} onClick={scaffold}>{wBusy?'Launching…':'🚀 Scaffold & Create Repo'}</button>
        <div style={{fontSize:11,color:'#666',marginTop:4}}>Friday scaffolds via Claude Code, creates a GitHub repo, and prints Replit connect steps.</div>
      </div>:<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        <input className="input" style={{fontSize:11}} placeholder="Name *" value={wf.name} onChange={e=>setWf({...wf,name:e.target.value})}/>
        <input className="input" style={{fontSize:11}} placeholder="Live URL" value={wf.url} onChange={e=>setWf({...wf,url:e.target.value})}/>
        <input className="input" style={{fontSize:11}} placeholder="Repo dir name (under ~/Projects)" value={wf.repo} onChange={e=>setWf({...wf,repo:e.target.value})}/>
        <input className="input" style={{fontSize:11}} placeholder="Replit URL (optional)" value={wf.replit_url} onChange={e=>setWf({...wf,replit_url:e.target.value})}/>
        <input className="input" style={{fontSize:11,gridColumn:'1 / span 2'}} placeholder="Description" value={wf.description} onChange={e=>setWf({...wf,description:e.target.value})}/>
        <select className="input" style={{fontSize:11}} value={wf.category} onChange={e=>setWf({...wf,category:e.target.value})}>
          <option value="company">company</option><option value="client">client</option><option value="personal">personal</option>
        </select>
        <button className="btn" style={{fontSize:11,fontWeight:600}} disabled={wBusy} onClick={addManual}>{wBusy?'Adding…':'＋ Add to Portfolio'}</button>
      </div>}
    </div>}
    {discovered.length>0&&<div className="card" style={{marginBottom:10,borderColor:'rgba(245,158,11,0.3)'}}>
      <div className="card-title" style={{color:'#f59e0b'}}>Discovered — deployable repos not in your portfolio</div>
      <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:4}}>
        {discovered.map((c,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,padding:'3px 0'}}>
          <span style={{color:'#ccc'}}>{c.repo} <span style={{color:'#666'}}>· {c.last_commit_rel||''}</span></span>
          <button className="btn" style={{fontSize:11,padding:'2px 8px'}} onClick={()=>addDiscovered(c)}>＋ Add</button>
        </div>)}
      </div>
    </div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:8}}>
      {projects.map((p,i)=><FSProjectCard key={p.name||i} p={p} onToast={showToast} onChanged={load}/>)}
    </div>
    {projects.length===0&&<div className="card" style={{textAlign:'center',padding:20,color:'#999',fontSize:12}}>No projects in portfolio. Click 🔄 Refresh All to discover repos, or ＋ New Project.</div>}
  </div>);
}

// ── Shared: per-creation license selector (Layer 2 §10) ────────────────────
// The creator sets terms PER PIECE at creation — there is no account default.
// Commons (CC*) vs commerce (priced → a price in milli-Positrons, mψ). The
// chosen license is signed into the artifact's Content Credential.
const LICENSE_TERMS=[
  {id:'all-rights-reserved',label:'All rights reserved',hint:'you keep every right'},
  {id:'CC-BY-4.0',label:'CC BY 4.0',hint:'free · credit required'},
  {id:'CC-BY-SA-4.0',label:'CC BY-SA 4.0',hint:'free · credit + share-alike'},
  {id:'CC0',label:'CC0 / public domain',hint:'free · no rights reserved'},
  {id:'priced',label:'Priced (sell it)',hint:'commerce · set a price'},
];
const LIC_LBL={'all-rights-reserved':'All rights reserved','CC-BY-4.0':'CC BY 4.0','CC-BY-SA-4.0':'CC BY-SA 4.0','CC0':'CC0','priced':'Priced','custom':'Custom'};
function LicensePicker({value,onChange,label='License'}){
  const v=value||{terms:'all-rights-reserved'};
  const set=patch=>onChange&&onChange(Object.assign({},v,patch));
  const cur=LICENSE_TERMS.find(t=>t.id===v.terms)||LICENSE_TERMS[0];
  const price=(v.market&&v.market.price)||'';
  return(<div style={{marginBottom:10}}>
    <div style={{fontSize:10,color:'#7fb6c9',fontFamily:'JetBrains Mono',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:3}}>{label} <span style={{textTransform:'none',color:'#5a7a86'}}>· {cur.hint}</span></div>
    <div style={{display:'flex',gap:8}}>
      <select className="input" style={{flex:1}} value={v.terms} onChange={e=>set({terms:e.target.value})}>
        {LICENSE_TERMS.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
      </select>
      {v.terms==='priced'&&<div style={{display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}>
        <input className="input" type="number" min="0" style={{width:96}} value={price} onChange={e=>set({market:{price:Number(e.target.value)||0}})} placeholder="price"/>
        <span style={{fontSize:11,color:'#7fb6c9'}} title="milli-Positrons">mψ</span>
      </div>}
    </div>
  </div>);
}
// Small chip that shows a creation's current license (commons=teal, priced=gold).
function LicenseChip({terms,price}){
  if(!terms)return null;
  const free=['CC-BY-4.0','CC-BY-SA-4.0','CC0'].includes(terms);
  const priced=terms==='priced';
  const col=priced?'#f59e0b':free?'#22c55e':'#7fb6c9';
  return(<span style={{fontSize:9,fontFamily:'JetBrains Mono',color:col,border:'1px solid '+col+'55',background:col+'14',borderRadius:4,padding:'1px 5px',whiteSpace:'nowrap'}}>{LIC_LBL[terms]||terms}{priced&&price?` · ${price}mψ`:''}</span>);
}
// Provenance + license bar for the creation viewer. Shows the signed Content
// Credential (verification + creator) and lets the owner change the per-piece
// license (POST → re-signed). Self-contained: fetches its own provenance.
function ProvenanceBar({filename}){
  const[data,setData]=useState(null);const[edit,setEdit]=useState(false);
  const[lic,setLic]=useState(null);const[saving,setSaving]=useState(false);
  const load=()=>fetch('/api/provenance/by-file/'+encodeURIComponent(filename)).then(r=>r.json()).then(d=>{setData(d);const L=d&&d.manifest&&d.manifest.license;if(L)setLic({terms:L.terms,market:L.market});}).catch(()=>setData(null));
  useEffect(()=>{setData(null);setEdit(false);load();},[filename]);
  if(!data)return null;
  if(data.status!=='ok'||!data.manifest)return <div style={{fontSize:10,color:'#5a7a86',fontFamily:'JetBrains Mono',marginBottom:8}}>No signed provenance for this file yet.</div>;
  const m=data.manifest;const v=data.verification||{};const L=m.license||{};
  const verified=v.valid;const sig=v.checks&&v.checks.signature_ok;
  const save=async()=>{setSaving(true);try{await fetch('/api/provenance/by-file/'+encodeURIComponent(filename)+'/license',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({license:lic})});await load();setEdit(false);}catch(e){}setSaving(false);};
  return(<div style={{marginBottom:10,padding:'8px 10px',borderRadius:8,background:'rgba(127,182,201,0.05)',border:'1px solid rgba(127,182,201,0.14)'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
      <span title="Ed25519-signed Content Credential" style={{fontSize:10,fontFamily:'JetBrains Mono',color:verified?'#22c55e':sig===false?'#ff0080':'#7fb6c9'}}>{verified?'🔏 Signed & verified':sig===false?'⚠ signature mismatch':'🔏 Signed'}</span>
      <LicenseChip terms={L.terms} price={L.market&&L.market.price}/>
      {(m.media_type)&&<span style={{fontSize:9,color:'#5a7a86'}}>{m.media_type}</span>}
      <button className="btn btn-magenta" style={{fontSize:9,padding:'1px 7px',marginLeft:'auto'}} onClick={()=>setEdit(!edit)}>{edit?'Close':'Change license'}</button>
    </div>
    {edit&&lic&&<div style={{marginTop:8}}>
      <LicensePicker value={lic} onChange={setLic} label="Set license for this piece"/>
      <button className="btn" style={{fontSize:11,fontWeight:700,width:'100%'}} disabled={saving} onClick={save}>{saving?'Saving…':'Save license'}</button>
    </div>}
  </div>);
}

// Album-art-style audio player — gradient art keyed off the filename + controls.

// ── Studio › Full production pipeline tracker ──────────────────────────────
// Starts the built-in 'full-production' pipeline (script→sceneDNA→keyframe→clip
// →music→cut) and shows a VISUAL stage tracker polling the run — milestones, the
// active stage, and Approve-&-Continue at cost-gate checkpoints.
const PIPE_STATE_COL={completed:'#22c55e',running:'#00d4ff',awaiting_checkpoint:'#f59e0b',failed:'#ff0080',pending:'#5a7a86'};
function ProductionPanel({onCreated}){
  const[logline,setLogline]=useState('');const[runId,setRunId]=useState('');const[run,setRun]=useState(null);
  const[busy,setBusy]=useState(false);const[err,setErr]=useState('');

  const poll=(id)=>fetch('/api/pipelines/runs/'+id).then(r=>r.json()).then(d=>{const rn=d.run||d;setRun(rn);return rn;}).catch(()=>null);
  useEffect(()=>{if(!runId)return;let stop=false;const tick=async()=>{if(stop)return;const rn=await poll(runId);if(rn&&['completed','failed'].includes(rn.state)){onCreated&&onCreated();return;}setTimeout(tick,2000);};tick();return()=>{stop=true;};},[runId]);

    if(!logline.trim()||busy)return;setBusy(true);setErr('');setRun(null);

      const d=await r.json();const id=(d.run&&d.run.run_id)||d.run_id;

    }catch(e){setErr('Request failed: '+e);}setBusy(false);
  };
  const approve=async()=>{if(!runId)return;await fetch('/api/pipelines/runs/'+runId+'/resume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({run_to_end:false})});setTimeout(()=>poll(runId),400);};
  const stages=(run&&run.stages)||[];const idx=run?run.stage_index:0;const state=run&&run.state;

      <button className="btn" style={{fontSize:12,fontWeight:700,whiteSpace:'nowrap'}} disabled={busy||!logline.trim()} onClick={start}>{busy?'Starting…':'▶ Produce'}</button>
    </div>
    {err&&<div style={{padding:'8px 10px',borderRadius:6,background:'rgba(255,0,128,0.08)',border:'1px solid rgba(255,0,128,0.25)',color:'#ff7ab8',fontSize:11,marginBottom:10}}>{err}</div>}
    {stages.length>0&&<div>
      {/* horizontal stage stepper */}
      <div style={{display:'flex',alignItems:'stretch',gap:0,marginBottom:12,flexWrap:'wrap'}}>
        {stages.map((s,i)=>{const done=i<idx||state==='completed';const active=i===idx&&state!=='completed';const checkpoint=active&&state==='awaiting_checkpoint';
          const col=state==='failed'&&active?'#ff0080':done?'#22c55e':checkpoint?'#f59e0b':active?'#00d4ff':'#5a7a86';
          return(<div key={i} style={{flex:'1 1 90px',minWidth:80}}>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,border:'2px solid '+col,color:col,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,boxShadow:active?'0 0 10px '+col+'88':'none',background:done?col+'22':'transparent'}}>{done?'✓':i+1}</div>
              {i<stages.length-1&&<div style={{flex:1,height:2,background:done?'#22c55e':'rgba(127,182,201,0.2)'}}/>}
            </div>
            <div style={{fontSize:9,color:col,marginTop:4,fontFamily:'JetBrains Mono',lineHeight:1.2}}>{s.name}{checkpoint&&' ⏸'}</div>
          </div>);})}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:11,color:'#ccc'}}>Stage {Math.min(idx+(state==='completed'?0:1),stages.length)}/{stages.length}</span>
        <span style={{fontSize:10,fontFamily:'Orbitron',color:PIPE_STATE_COL[state]||'#888'}}>{state}</span>
      </div>
      {state==='awaiting_checkpoint'&&<button className="btn" style={{fontSize:11,fontWeight:700,width:'100%',marginBottom:8}} onClick={approve}>Approve &amp; Continue →</button>}

        <video controls src={prodFile.url} style={{width:'100%',borderRadius:8,background:'#0a0a0f',marginTop:4}}/>}
    </div>}
  </div>);

              <button className="btn" style={{fontSize:10,padding:'2px 8px'}} onClick={e=>{e.stopPropagation();window.open('/creation/'+f.name,'_blank')}} title="Open in new tab">⧉ Tab</button>

      })}

}
// ═══ DEFEDERATION PANEL ═══
function DefederationPanel(){
  const[assessments,setAssessments]=React.useState([]);
  const[myAssessments,setMyAssessments]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[form,setForm]=React.useState({agent_pubkey:'',harm_category:'coordinated_harassment',severity_score:0.5,recommendation:'MONITOR',reasoning:'',evidence_hash:'',evidence_ts:''});
  const[submitting,setSubmitting]=React.useState(false);
  const[msg,setMsg]=React.useState('');
  const HARM_CATS=['H1','H2','H3','H4','coordinated_harassment','radicalization_pattern','deceptive_content','epistemic_manipulation','sockpuppet_cluster'];
  const RECS=['MONITOR','RESTRICT','DEFEDERATE'];
  const recColor={MONITOR:'#f5a623',RESTRICT:'#ff6b35',DEFEDERATE:'#ff2244'};
  const statusColor={CLEAN:'#00cc88',MONITOR:'#f5a623',RESTRICT:'#ff6b35',DEFEDERATE:'#ff2244'};
  const load=()=>{
    setLoading(true);
    try{
      const identity=JSON.parse(sessionStorage.getItem('friday_identity')||'null');
      const myKey=identity?.agent_id||'';
      Promise.all([
        myKey?fetch(`/api/defederation/assessments?assessor_pubkey=${encodeURIComponent(myKey)}`).then(r=>r.json()).catch(()=>({assessments:[]})):Promise.resolve({assessments:[]}),
      ]).then(([mine])=>{
        setMyAssessments(mine.assessments||[]);
        setLoading(false);
      });
    }catch{setLoading(false);}
  };
  React.useEffect(()=>{
    fetch('/api/federation/identity').then(r=>r.json()).then(d=>{
      if(d.identity)sessionStorage.setItem('friday_identity',JSON.stringify(d.identity));
    }).catch(()=>{}).finally(()=>load());
  },[]);
  const submit=async()=>{
    if(!form.agent_pubkey.trim()||!form.reasoning.trim()||!form.evidence_hash.trim()){setMsg('agent_pubkey, reasoning, and at least one evidence hash are required');return;}
    setSubmitting(true);setMsg('');
    try{
      const evidence=[{content_hash:form.evidence_hash.trim(),timestamp:form.evidence_ts||new Date().toISOString(),violation_type:form.harm_category}];
      const r=await fetch('/api/defederation/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...form,severity_score:parseFloat(form.severity_score),evidence})});
      const d=await r.json();
      if(d.ok){setMsg('Assessment submitted. Consensus: '+d.consensus?.status);load();}
      else setMsg('Error: '+(d.error||'unknown'));
    }catch(e){setMsg('Error: '+e.message);}
    setSubmitting(false);
  };
  const withdraw=async(id)=>{
    if(!confirm('Withdraw this assessment? The signed withdrawal will be recorded.'))return;
    try{
      const r=await fetch(`/api/defederation/withdraw/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
      const d=await r.json();
      if(d.ok)load();else alert('Withdraw failed: '+(d.error||'unknown'));
    }catch(e){alert('Error: '+e.message);}
  };
  if(loading)return<div style={{color:'#999',fontSize:12,padding:'8px 0'}}>Loading defederation data...</div>;
  return(<div>
    <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',lineHeight:1.6,marginBottom:12}}>
      Defederation assessments are governed by the cLaws — evidence is required, political disagreement cannot be a harm category. Consensus requires ≥3 independent assessors spanning ≥24 hours before DEFEDERATE takes effect.
    </div>
    {/* New assessment form */}
    <div className="settings-subtitle">Submit Assessment</div>
    <div style={{display:'grid',gap:6,marginBottom:10}}>
      <input className="input" style={{fontSize:12}} value={form.agent_pubkey} onChange={e=>setForm(f=>({...f,agent_pubkey:e.target.value}))} placeholder="Agent pubkey (Ed25519 hex) *"/>
      <select className="input" style={{fontSize:12}} value={form.harm_category} onChange={e=>setForm(f=>({...f,harm_category:e.target.value}))}>
        {HARM_CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
      <div style={{display:'flex',gap:6}}>
        <select className="input" style={{fontSize:12,flex:1}} value={form.recommendation} onChange={e=>setForm(f=>({...f,recommendation:e.target.value}))}>
          {RECS.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <input className="input" style={{fontSize:12,width:90}} type="number" min="0" max="1" step="0.1" value={form.severity_score} onChange={e=>setForm(f=>({...f,severity_score:e.target.value}))} placeholder="Severity 0-1"/>
      </div>
      <input className="input" style={{fontSize:12}} value={form.evidence_hash} onChange={e=>setForm(f=>({...f,evidence_hash:e.target.value}))} placeholder="Evidence content hash (SHA-256) *"/>
      <input className="input" style={{fontSize:12}} value={form.evidence_ts} onChange={e=>setForm(f=>({...f,evidence_ts:e.target.value}))} placeholder="Evidence timestamp (ISO-8601)"/>
      <textarea className="input" style={{fontSize:12,resize:'vertical',minHeight:52}} value={form.reasoning} onChange={e=>setForm(f=>({...f,reasoning:e.target.value}))} placeholder="Reasoning — describe the violation *"/>
    </div>
    {msg&&<div style={{fontSize:11,color:msg.startsWith('Error')?'#f55':'#00cc88',marginBottom:8}}>{msg}</div>}
    <button className="settings-btn" disabled={submitting} onClick={submit}>{submitting?'Submitting...':'Submit Assessment'}</button>
    {/* My assessments */}
    {myAssessments.length>0&&<>
      <div className="settings-subtitle" style={{marginTop:14}}>My Assessments ({myAssessments.length})</div>
      {myAssessments.map((a,i)=><div key={a.id||i} style={{padding:'7px 10px',marginBottom:6,borderRadius:6,border:'1px solid rgba(255,255,255,0.07)',background:'rgba(255,255,255,0.03)',fontSize:11}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
          <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#888',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(a.agent_pubkey||'').slice(0,24)}…</span>
          <span style={{color:recColor[a.recommendation]||'#ccc',fontWeight:600,fontSize:10,flexShrink:0}}>{a.recommendation}</span>
          {a.withdrawn_at&&<span style={{color:'#666',fontSize:9}}>WITHDRAWN</span>}
        </div>
        <div style={{color:'#aab',marginBottom:2}}>{a.harm_category}</div>
        <div style={{color:'rgba(255,255,255,0.45)',fontSize:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.reasoning}</div>
        {!a.withdrawn_at&&<button style={{marginTop:5,fontSize:10,background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:4,color:'#888',cursor:'pointer',padding:'2px 8px'}} onClick={()=>withdraw(a.id)}>Withdraw</button>}
      </div>)}
    </>}
  </div>);
}

// ═══ CONTENT POLICIES PANEL ═══
function ContentPoliciesPanel(){
  const[available,setAvailable]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[msg,setMsg]=React.useState('');
  const load=()=>{
    setLoading(true);
    fetch('/api/policies/available').then(r=>r.json()).then(d=>{setAvailable(d.packs||[]);setLoading(false);}).catch(()=>setLoading(false));
  };
  React.useEffect(()=>load(),[]);
  const toggle=async(pack)=>{
    if(pack.always_on)return;
    setMsg('');
    try{
      let r,d;
      if(pack.subscribed){
        r=await fetch(`/api/policies/unsubscribe/${encodeURIComponent(pack.pack_id)}`,{method:'DELETE'});
        d=await r.json();
        if(!d.ok&&!r.ok){setMsg(d.error||'Unsubscribe failed');return;}
      }else{
        r=await fetch('/api/policies/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pack_id:pack.pack_id})});
        d=await r.json();
        if(!d.ok&&!r.ok){setMsg(d.error||'Subscribe failed');return;}
      }
      load();
    }catch(e){setMsg('Error: '+e.message);}
  };
  if(loading)return<div style={{color:'#999',fontSize:12,padding:'8px 0'}}>Loading content policies...</div>;
  return(<div>
    <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',lineHeight:1.6,marginBottom:12}}>
      Content policy packs are signed, shareable rule sets that stack on top of the Asimov Standard floor. BLOCK from any subscribed pack blocks the content; TAGs and WARNs are additive. The Asimov Standard (H1-H4) is always active and cannot be removed.
    </div>
    {msg&&<div style={{fontSize:11,color:'#f55',marginBottom:8}}>{msg}</div>}
    {available.map((pack,i)=>{
      const isOn=pack.subscribed||pack.always_on;
      return(<div key={pack.pack_id||i} style={{padding:'10px 12px',marginBottom:8,borderRadius:7,border:`1px solid ${pack.always_on?'rgba(0,212,255,0.25)':isOn?'rgba(0,200,100,0.2)':'rgba(255,255,255,0.07)'}`,background:pack.always_on?'rgba(0,212,255,0.04)':'rgba(255,255,255,0.02)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:'#dde',display:'flex',alignItems:'center',gap:5}}>
              {pack.name}
              {pack.always_on&&<span style={{fontSize:9,background:'rgba(0,212,255,0.15)',color:'#00d4ff',borderRadius:3,padding:'1px 5px',fontFamily:'JetBrains Mono'}}>ALWAYS ON</span>}
              {pack.builtin&&!pack.always_on&&<span style={{fontSize:9,background:'rgba(255,255,255,0.07)',color:'#888',borderRadius:3,padding:'1px 5px',fontFamily:'JetBrains Mono'}}>BUILT-IN</span>}
            </div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:2,lineHeight:1.5}}>{pack.description}</div>
            <div style={{fontSize:10,color:'#666',marginTop:3}}>v{pack.version} · {pack.rules?.length||0} rules · {pack.subscribers||0} subscribers</div>
          </div>
          <div style={{flexShrink:0}}>
            {pack.always_on
              ?<span style={{fontSize:10,color:'#00d4ff',fontFamily:'JetBrains Mono'}}>🔒 Required</span>
              :<button
                onClick={()=>toggle(pack)}
                style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,
                  background:isOn?'rgba(0,200,100,0.15)':'rgba(255,255,255,0.06)',
                  color:isOn?'#00cc66':'#aaa',
                  transition:'all 0.15s'}}>
                {isOn?'Subscribed ✓':'Subscribe'}
              </button>
            }
          </div>
        </div>
        {pack.rules?.length>0&&<details style={{marginTop:6}}>
          <summary style={{fontSize:10,color:'#666',cursor:'pointer'}}>Rules ({pack.rules.length})</summary>
          <div style={{marginTop:4,paddingLeft:8}}>
            {pack.rules.map((r,j)=>{
              const ac={BLOCK:'#ff2244',TAG:'#00d4ff',WARN:'#f5a623',ALLOW:'#00cc88'};
              return(<div key={j} style={{fontSize:10,color:'rgba(255,255,255,0.45)',padding:'2px 0',display:'flex',gap:6,alignItems:'baseline'}}>
                <span style={{fontFamily:'JetBrains Mono',color:ac[r.action]||'#ccc',flexShrink:0,fontSize:9}}>{r.action}</span>
                <span style={{color:'#aab'}}>{r.category}</span>
                {r.severity_threshold>0&&<span style={{color:'#666'}}>≥{r.severity_threshold}</span>}
                <span style={{color:'rgba(255,255,255,0.3)',fontSize:9}}>{r.description}</span>
              </div>);
            })}
          </div>
        </details>}
      </div>);
    })}
    {available.length===0&&<div style={{fontSize:11,color:'#666'}}>No packs found.</div>}
  </div>);
}
// ═══ FEDERATION PANEL (embedded in Settings) ═══
function FederationPanel(){
  const[identity,setIdentity]=useState(null);const[peers,setPeers]=useState([]);
  const[discoverUrl,setDiscoverUrl]=useState('');const[discovering,setDiscovering]=useState(false);
  const[toast,setToast]=useState('');const[loading,setLoading]=useState(true);
  const flash=t=>{setToast(t);setTimeout(()=>setToast(''),2800)};
  const load=()=>{
    Promise.all([
      fetch('/api/federation/identity').then(r=>r.json()).then(d=>{if(d.ok||d.identity)setIdentity(d.identity||d)}).catch(()=>{}),
      fetch('/api/federation/peers').then(r=>r.json()).then(d=>setPeers(d.peers||[])).catch(()=>{})
    ]).finally(()=>setLoading(false));
  };
  useEffect(()=>{load()},[]);
  const discover=async()=>{
    if(!discoverUrl.trim())return;
    setDiscovering(true);
    try{
      const r=await fetch('/api/federation/discover',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:discoverUrl.trim()})});
      const d=await r.json();
      if(d.ok){flash('Peer discovered: '+(d.peer?.label||d.peer?.agent_id||'unknown'));setDiscoverUrl('');load();}
      else flash('Discovery failed: '+(d.error||'unknown error'));
    }catch(e){flash('Discovery failed')}
    setDiscovering(false);
  };
  const setPref=async(agentId,pref)=>{
    try{await fetch('/api/federation/peers/'+encodeURIComponent(agentId)+'/pref',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fed_pref:pref})});load()}
    catch(e){}
  };
  const copyPeerCard=()=>{
    if(!identity)return;
    navigator.clipboard.writeText(JSON.stringify(identity,null,2)).then(()=>flash('Peer card copied to clipboard')).catch(()=>flash('Copy failed'));
  };
  const trunc=(s,n)=>(s||'').length>n?(s||'').slice(0,n)+'...':s||'—';
  const prefColor={ask:'#f59e0b',allow:'#00ff80',block:'#ff5470'};
  if(loading)return<div style={{color:'#999',fontSize:12,padding:'8px 0'}}>Loading federation data...</div>;
  return(<div>
    {toast&&<div style={{marginBottom:8,padding:'5px 8px',borderRadius:5,background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.2)',fontSize:11,color:'#00d4ff'}}>{toast}</div>}
    {/* Agent Identity Card */}
    <div className="settings-subtitle">Agent Identity</div>
    {identity?<div style={{background:'rgba(0,212,255,0.04)',border:'1px solid rgba(0,212,255,0.15)',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div style={{fontFamily:'Orbitron',fontSize:13,color:'#00d4ff',marginBottom:3}}>{identity.display_name||'Friday'}</div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'#888'}}>{trunc(identity.agent_id,16)} {identity.agent_id&&identity.agent_id.length>16?'...':''}</div>
        </div>
        <button className="settings-btn" style={{fontSize:10,padding:'3px 8px'}} onClick={copyPeerCard}>Copy Peer Card</button>
      </div>
      <div style={{fontSize:11,color:'#a8a8b4',marginBottom:6}}>Federation v{identity.federation_version||'1.0'}</div>
      {identity.capabilities&&identity.capabilities.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {identity.capabilities.map((c,i)=><span key={i} style={{fontSize:9,padding:'1px 6px',borderRadius:10,background:'rgba(124,58,237,0.15)',border:'1px solid rgba(124,58,237,0.35)',color:'#b794f6',fontFamily:'JetBrains Mono'}}>{c}</span>)}
      </div>}
    </div>:<div style={{fontSize:11,color:'#888',marginBottom:12}}>No identity data — federation not configured.</div>}
    {/* Peer Discovery */}
    <div className="settings-subtitle">Peer Discovery</div>
    <div style={{display:'flex',gap:6,marginBottom:12}}>
      <input className="input" style={{flex:1,fontSize:12}} value={discoverUrl} onChange={e=>setDiscoverUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&discover()} placeholder="https://agent.example.com/api/federation/identity"/>
      <button className="settings-btn" style={{flexShrink:0}} disabled={discovering||!discoverUrl.trim()} onClick={discover}>{discovering?'Discovering...':'Discover Agent'}</button>
    </div>
    {/* Known Peers */}
    <div className="settings-subtitle">Known Peers ({peers.length})</div>
    {peers.length===0?<div style={{fontSize:11,color:'#888',marginBottom:8}}>No peers discovered yet.</div>:
    <div style={{marginBottom:8}}>
      {peers.map((p,i)=><div key={p.agent_id||i} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:11}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:'#dde',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.label||p.display_name||'Unknown'}</div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'#888'}}>{trunc(p.agent_id,20)}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontFamily:'Orbitron',fontSize:11,color:'#00d4ff'}}>{typeof p.overall_score==='number'?(p.overall_score*100).toFixed(0)+'%':'—'}</div>
          {p.last_handshake&&<div style={{fontSize:9,color:'#666'}}>{new Date(p.last_handshake).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>}
        </div>
        <select value={p.fed_pref||'ask'} onChange={e=>setPref(p.agent_id,e.target.value)}
          style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:4,color:prefColor[p.fed_pref||'ask']||'#ccc',fontSize:10,padding:'2px 4px',fontFamily:'JetBrains Mono',cursor:'pointer',outline:'none'}}>
          {['ask','allow','block'].map(v=><option key={v} value={v} style={{background:'#0a0a14',color:'#ccc'}}>{v}</option>)}
        </select>
      </div>)}
    </div>}
  </div>);
}

      </div>
      <div className="card" style={{textAlign:'center'}}>
        <div style={{fontSize:10,color:'#888',fontFamily:'Orbitron',letterSpacing:'.06em',marginBottom:4}}>Q SCORE</div>
        <div style={{fontFamily:'Orbitron',fontSize:22,color:qCol}}>{(qScore/1000).toFixed(3)}</div>
        <div style={{fontSize:11,color:'#a8a8b4'}}>net worth</div>
      </div>
    </div>
    {toast&&<div style={{marginBottom:8,padding:'6px 10px',borderRadius:6,background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.2)',fontSize:12,color:'#00d4ff'}}>{toast}</div>}
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>

function TrustWS(){

  useEffect(()=>{fetch('/api/trust').then(r=>r.json()).then(d=>{setTrust(d);setLoading(false)}).catch(()=>{setError(true);setLoading(false)})},[]);

            <SendTo content={()=>JSON.stringify(p,null,2)} personName={p.name||p.Name} dataType="contact_research" options={[{label:'Send to Calendar',dest:'calendar_notes',ico:'📅',needsEvent:true},{label:'Copy to Clipboard',dest:'clipboard',ico:'📋'},{label:'Add to Briefing',dest:'briefing',ico:'📰'}]}/>
          </div>

        <div className="progress-bar" style={{marginTop:4}}><div className="progress-fill" style={{width:pct+'%',background:col}}/></div>
        {expanded===i&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.04)'}}>
          {dims.map(d=>{const val=p.scores&&typeof p.scores[d]==='number'?p.scores[d]:0.5;const v=Math.round(val*100);const dc=v>70?'#00ff80':v>40?'#f59e0b':'#ff0080';
            return(<div key={d} style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
              <span style={{width:120,fontSize:11,color:'#a8a8b4'}}>{d.replace(/_/g,' ')}</span>
              <div className="progress-bar" style={{flex:1}}><div className="progress-fill" style={{width:v+'%',background:dc}}/></div>
              <span style={{fontSize:11,fontFamily:'JetBrains Mono',color:dc,width:30,textAlign:'right'}}>{v}%</span>

          <div style={{fontSize:11,color:'#999',marginTop:4}}>Evidence: {(p.evidence&&Array.isArray(p.evidence))?p.evidence.length:0} records</div>

function SystemWS(){
  const[sys,setSys]=useState(null);const[loading,setLoading]=useState(true);
  // Context log state
  const[ctxStats,setCtxStats]=useState(null);
  const[ctxQuery,setCtxQuery]=useState('');
  const[ctxFrom,setCtxFrom]=useState('');
  const[ctxTo,setCtxTo]=useState('');
  const[ctxType,setCtxType]=useState('');
  const[ctxResults,setCtxResults]=useState(null);
  const[ctxSearching,setCtxSearching]=useState(false);
  const[ctxToast,setCtxToast]=useState('');
  const[ctxDelOpen,setCtxDelOpen]=useState(false);
  const[ctxDelConfirm,setCtxDelConfirm]=useState('');

  const showCtxToast=(m)=>{setCtxToast(m);setTimeout(()=>setCtxToast(''),2200)};
  const refreshCtxStats=()=>fetch('/api/context/stats').then(r=>r.json()).then(setCtxStats).catch(()=>{});
  const[compStats,setCompStats]=useState(null);
  // ── Weekly self-improvement report ──
  const[selfImp,setSelfImp]=useState(null);const[siBusy,setSiBusy]=useState(false);
  const siRef=useRef(null);
  const refreshSelfImp=()=>fetch('/api/self-improvement/latest').then(r=>r.json()).then(d=>setSelfImp(d?.report||null)).catch(()=>{});
  const runSelfImp=async()=>{if(siBusy)return;setSiBusy(true);
    // The run is async — it surfaces as a floating process orb. Poll until the
    // orb finishes (a cold ChromaDB load can make this take a couple of minutes),
    // then refresh the card. A `seen` guard avoids stopping before it registers.
    try{await fetch('/api/self-improvement/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})})}catch(e){setSiBusy(false);return}
    let tries=0,seen=false;
    const poll=setInterval(async()=>{
      tries++;let active=false;
      try{const pr=await fetch('/api/processes').then(r=>r.json());active=(pr.processes||[]).some(p=>String(p.id||'').startsWith('selfimprove')&&p.status==='running')}catch(e){}
      if(active)seen=true;
      if((seen&&!active)||(!seen&&tries>=6)||tries>150){clearInterval(poll);await refreshSelfImp();setSiBusy(false)}
    },2000);
  };
  // Deep-link: notifications target {workspace:'system',tab:'self-improvement'} → scroll the card into view.
  useNavTarget('system',t=>{if(t.tab==='self-improvement'&&siRef.current)setTimeout(()=>siRef.current.scrollIntoView({behavior:'smooth',block:'start'}),120)});

  useEffect(()=>{
    let done=false;
    const finish=(data)=>{if(done)return;done=true;setSys(data);setLoading(false)};
    fetch('/api/system').then(r=>r.json()).then(finish).catch(()=>finish(null));
    // Hard fallback so the UI never gets stuck on the loading state if the endpoint hangs.
    setTimeout(()=>finish(null),6000);
    refreshCtxStats();
    fetch('/api/context/compression-stats').then(r=>r.json()).then(d=>setCompStats(d.compression||null)).catch(()=>{});
    refreshSelfImp();
  },[]);

  const runCtxSearch=async()=>{setCtxSearching(true);
    try{const r=await fetch('/api/context/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:ctxQuery.trim(),date_from:ctxFrom||null,date_to:ctxTo||null,type:ctxType||null,limit:200})});
      const d=await r.json();setCtxResults(d.results||[])}catch{setCtxResults([])}
    setCtxSearching(false);
  };
  const toggleLogging=async()=>{
    const next=!ctxStats?.enabled;
    try{await fetch(next?'/api/context/resume':'/api/context/pause',{method:'POST'});showCtxToast(next?'Logging resumed':'Logging paused');refreshCtxStats()}catch{showCtxToast('Toggle failed')}
  };
  const deleteRange=async()=>{
    if(ctxDelConfirm!=='DELETE'){showCtxToast('Type DELETE to confirm');return}
    try{const r=await fetch('/api/context/range',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({date_from:ctxFrom||null,date_to:ctxTo||null,confirm:'DELETE'})});
      const d=await r.json();showCtxToast(`Deleted ${d.count} day${d.count===1?'':'s'}`);setCtxDelOpen(false);setCtxDelConfirm('');refreshCtxStats();setCtxResults(null)}catch{showCtxToast('Delete failed')}
  };
  const exportLog=()=>{window.open('/api/context/export','_blank')};

  const fmtBytes=(n)=>{if(!n)return'0 B';if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(2)+' MB'};
  const fmtTs=(s)=>{try{return new Date(s).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}catch{return s}};
  const typeColor=(t)=>({chat_user:'#7c3aed',chat_agent:'#00d4ff',tool_call:'#f59e0b',wiki_edit:'#00ff80',wiki_delete:'#ff0080',file_read:'#a8a8b4',task_spawn:'#ff6dd9'}[t]||'#888');

  if(loading)return <div style={{color:'#bbb',textAlign:'center',padding:40,fontFamily:'JetBrains Mono',fontSize:12}}>Scanning system...</div>;
  const disks=(sys?.disk||sys?.disks||[]);
  const procs=(sys?.processes||[]);
  return(<div>
    {compStats&&<div className="card" style={{marginBottom:10,padding:10}}>
      <div className="card-title">Context Compression (Headroom)</div>
      {compStats.available
        ?<div style={{display:'flex',gap:12,fontSize:11,color:'#aaa',flexWrap:'wrap'}}>
          <span>{compStats.calls||0} compressions</span>
          <span style={{color:'#00ff80'}}>{((compStats.tokens_saved||0)/1000).toFixed(1)}k tokens saved</span>
          <span>{Math.round((compStats.compression_ratio||0)*100)}% overall ratio</span>
          <span>last call {Math.round((compStats.last_ratio||0)*100)}%</span>
        </div>
        :<div style={{fontSize:11,color:'#888'}}>Headroom core not installed — compression passthrough (pip install headroom-ai).</div>}

// Six panels: live log stream (SSE), repo dashboard, vibe coding,
// git operations, file browser, process monitor. All endpoints under

function DevDiff({diff}){
  const lines=String(diff||'').split('\n');
  return(<pre style={{margin:0,maxHeight:'46vh',overflow:'auto',fontFamily:'JetBrains Mono',fontSize:11,lineHeight:1.5,background:'rgba(0,0,0,0.35)',borderRadius:8,padding:'8px 10px'}}>
    {lines.map((ln,i)=>{
      let col='#9aa';
      if(/^\+\+\+|^---/.test(ln))col='#888';
      else if(/^@@/.test(ln))col='#ff6dd9';
      else if(/^\+/.test(ln))col='#00ff80';
      else if(/^-/.test(ln))col='#ff5a7a';
      return <div key={i} style={{color:col,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{ln||' '}</div>;
    })}
  </pre>);
}
function CodeViewer({content,lang}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.textContent=content||'';
    ref.current.className='language-'+(lang||'plaintext');
    ref.current.removeAttribute('data-highlighted');
    try{if(window.hljs)window.hljs.highlightElement(ref.current)}catch(e){}
  },[content,lang]);
  return(<pre style={{margin:0,maxHeight:'60vh',overflow:'auto',borderRadius:8,fontSize:12,lineHeight:1.55}}>
    <code ref={ref} className={'language-'+(lang||'plaintext')}/>
  </pre>);
}

// ─── Vibe coding: NL → plan → diff → apply → commit ───
function DevVibe({repos,onLog}){
  const[repo,setRepo]=useState('');const[instr,setInstr]=useState('');
  const[plan,setPlan]=useState(null);const[busy,setBusy]=useState(false);
  const[err,setErr]=useState('');const[applied,setApplied]=useState(null);
  const[openFile,setOpenFile]=useState(0);const[committing,setCommitting]=useState(false);const[commitMsg,setCommitMsg]=useState('');
  useEffect(()=>{if(!repo&&repos.length)setRepo(repos[0].name)},[repos]);
  const genPlan=async()=>{
    if(!repo||!instr.trim())return;setBusy(true);setErr('');setPlan(null);setApplied(null);
    try{const r=await fetch('/api/code/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo,instruction:instr})});
      const d=await r.json();
      if(d.status==='ok'){setPlan(d.plan);setCommitMsg((d.plan.summary||instr).split('\n')[0].slice(0,72))}
      else setErr(d.message||'Plan failed');
    }catch(e){setErr('Request failed')}
    setBusy(false);
  };
  const applyPlan=async()=>{
    if(!plan)return;setBusy(true);setErr('');
    try{const r=await fetch('/api/code/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan_id:plan.id})});
      const d=await r.json();if(d.status==='ok'){setApplied(d);onLog&&onLog()}else setErr(d.message||'Apply failed');
    }catch(e){setErr('Apply failed')}
    setBusy(false);
  };
  const commit=async()=>{
    if(!plan||!commitMsg.trim())return;setCommitting(true);setErr('');
    try{const r=await fetch('/api/git/commit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({repo:plan.repo,message:commitMsg})});
      const d=await r.json();if(!d.ok)setErr(d.message||d.stderr||'Commit failed');else setApplied(a=>({...(a||{}),committed:true}));
    }catch(e){setErr('Commit failed')}
    setCommitting(false);
  };
  return(<div>
    <FridaySays text="Describe a change in plain English. Friday drafts a plan, you preview the diff, then apply and commit."/>
    <div className="card" style={{padding:10,marginBottom:10}}>
      <div style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
        <span style={{fontSize:11,color:'#9ad'}}>Repo</span>
        <select className="input" style={{flex:1,padding:'5px 8px'}} value={repo} onChange={e=>setRepo(e.target.value)}>
          {repos.length===0&&<option value="">(no repos)</option>}
          {repos.map((r,i)=><option key={i} value={r.name}>{r.name} · {r.branch}</option>)}
        </select>
      </div>
      <textarea className="input" style={{width:'100%',height:64,resize:'vertical',marginBottom:6}} value={instr} onChange={e=>setInstr(e.target.value)} placeholder="e.g. Add a /health endpoint that returns uptime and version as JSON"/>
      <div style={{display:'flex',gap:6}}>
        <button className="btn" style={{fontWeight:600}} disabled={busy||!repo||!instr.trim()} onClick={genPlan}>{busy?'Thinking…':'✨ Generate Plan'}</button>
        {plan&&<button className="btn btn-magenta" style={{fontSize:11}} onClick={()=>{setPlan(null);setApplied(null)}}>Clear</button>}
      </div>
    </div>
    {err&&<div className="card" style={{borderColor:'rgba(255,0,128,0.3)',color:'#ff8db3',fontSize:12,marginBottom:10}}>⚠ {err}</div>}
    {plan&&<div>
      <div className="card" style={{marginBottom:8}}>
        <div className="card-title" style={{marginTop:0}}>Plan — {plan.repo}</div>
        <FridayDoc text={plan.summary} compact/>
        {(plan.steps||[]).length>0&&<ul style={{margin:'4px 0 0 0',paddingLeft:18,fontSize:12,color:'#bcd'}}>{plan.steps.map((s,i)=><li key={i}>{s}</li>)}</ul>}
      </div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
        {(plan.files||[]).map((f,i)=><button key={i} className={'btn '+(openFile===i?'active':'')} style={{fontSize:11}} onClick={()=>setOpenFile(i)}>
          <span style={{color:f.action==='create'?'#00ff80':'#f59e0b'}}>{f.action==='create'?'+':'~'}</span> {f.path}</button>)}
      </div>
      {(plan.files||[])[openFile]&&<div className="card" style={{marginBottom:8}}>
        {plan.files[openFile].rationale&&<div style={{fontSize:11,color:'#9ad',marginBottom:6,fontStyle:'italic'}}>{plan.files[openFile].rationale}</div>}
        <DevDiff diff={plan.files[openFile].diff}/>
      </div>}
      {!applied&&<button className="btn" style={{fontWeight:600,borderColor:'rgba(0,255,128,0.4)',color:'#00ff80'}} disabled={busy} onClick={applyPlan}>{busy?'Applying…':'✓ Apply '+(plan.files||[]).length+' file change(s)'}</button>}
      {applied&&<div className="card" style={{borderColor:'rgba(0,255,128,0.3)'}}>
        <div style={{fontSize:12,color:'#00ff80',marginBottom:6}}>✓ Applied {applied.count} file(s){applied.failed&&applied.failed.length?' · '+applied.failed.length+' failed':''}</div>
        {applied.committed?<div style={{fontSize:12,color:'#00d4ff'}}>✓ Committed</div>:<div style={{display:'flex',gap:6}}>
          <input className="input" style={{flex:1,padding:'5px 8px'}} value={commitMsg} onChange={e=>setCommitMsg(e.target.value)} placeholder="Commit message"/>
          <button className="btn" style={{fontSize:11,whiteSpace:'nowrap'}} disabled={committing||!commitMsg.trim()} onClick={commit}>{committing?'…':'Commit'}</button>
        </div>}
      </div>}
    </div>}
  </div>);
}
// ─── Git operations panel ───
function DevGit({repos,onLog,onRefresh}){
  const[repo,setRepo]=useState('');const[branches,setBranches]=useState([]);const[current,setCurrent]=useState('');
  const[diff,setDiff]=useState('');const[toast,setToast]=useState('');const[busy,setBusy]=useState('');
  const[newBranch,setNewBranch]=useState('');const[prOpen,setPrOpen]=useState(false);const[prTitle,setPrTitle]=useState('');const[prBody,setPrBody]=useState('');
  useEffect(()=>{if(!repo&&repos.length)setRepo(repos[0].name)},[repos]);
  const loadBranches=()=>{if(!repo)return;fetch('/api/git/branches?repo='+encodeURIComponent(repo)).then(r=>r.json()).then(d=>{if(d.status==='ok'){setBranches(d.branches||[]);setCurrent(d.current||'')}}).catch(()=>{})};
  const loadDiff=()=>{if(!repo)return;fetch('/api/git/diff?repo='+encodeURIComponent(repo)).then(r=>r.json()).then(d=>setDiff(d.diff||'')).catch(()=>{})};
  useEffect(()=>{loadBranches();loadDiff()},[repo]);
  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(''),2600)};
  const op=async(label,url,body)=>{setBusy(label);
    try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{repo})});
      const d=await r.json();flash((d.ok||d.status==='ok')?('✓ '+label+(d.url?' → '+d.url:'')):('⚠ '+(d.message||d.stderr||label+' failed')));
      onLog&&onLog();loadBranches();loadDiff();onRefresh&&onRefresh();
    }catch(e){flash('⚠ '+label+' failed')}
    setBusy('');
  };
  return(<div>

const NEWS_GEN_STEPS=['Fetching news…','Checking calendar…','Scanning email…','Writing briefing…'];
// "Why Friday Picked This" — pure keyword matching against a generic reader
// profile. Each card gets one subtle relevance tag; the profile with the most
// keyword hits wins. No model call — title + snippet substring match only.
const NEWS_PROFILE=[
  {key:'ai',label:'AI & Tech',kw:['AI','LLM','agent','model','machine learning','openai','anthropic']},
  {key:'policy',label:'Policy & Regulation',kw:['regulation','policy','FTC','antitrust','congress']},
