name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # Install the package in editable mode so `import agent_friday` resolves
      # via the src/ layout. The heavy optional ML stack (sentence-transformers,
      # chromadb, headroom-ai) is deliberately excluded — the app degrades those
      # to no-ops, keeping CI under ~2 minutes instead of ~15.
      - name: Install core dependencies
        run: >
          pip install
          flask flask-sock anthropic google-genai
          google-api-python-client google-auth-oauthlib
          cryptography pynacl rich colorama beautifulsoup4 feedparser
          tzdata requests pyyaml pytest

      # Install the package itself (src layout, no heavy extras).
      - name: Install agent-friday (editable)
        run: pip install -e . --no-deps

      # GUI-automation deps import display machinery; only meaningful (and
      # only installable cleanly) on the Windows runner.
      - name: Install Windows-only dependencies
        if: runner.os == 'Windows'
        run: pip install pyautogui pynput

      - name: Run unit + API suites
        run: pytest tests/unit tests/api -q

  lint:
    name: ruff (fatal rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Fatal-only rule set: syntax errors (E9), invalid comparisons/format
      # strings (F63), forward-reference issues (F7), undefined names (F82).
      # The star-import architecture defeats full F-checking; this subset is
      # verified clean and stays that way.
      - run: pip install ruff
      - run: ruff check --select E9,F63,F7,F82 .
