[pytest]
# Default `pytest` runs the full OFFLINE suite: ~1850 unit + API tests that need
# no live server, no network, and no API keys (the LLM layer is stubbed in
# tests/api/conftest.py). The Playwright UI tests in tests/test_friday_ui.py and
# tests/test_ui_audit.py drive a real browser against a running server on
# localhost:3000 — run those explicitly, e.g.
#   pytest tests/test_friday_ui.py
testpaths = tests
addopts =
    -q
    --ignore=tests/test_friday_ui.py
    --ignore=tests/test_ui_audit.py
    --ignore=tests/friday.spec.ts
markers =
    ui: browser/Playwright tests requiring a live server at localhost:3000
    real_provider_paths: opt out of the autouse LLM kill-switch; the test stubs the network seam itself and exercises the real provider functions
# Keep run output readable: these are known, non-failing warnings from product
# code and third-party libs (tracked separately), not test problems.
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
